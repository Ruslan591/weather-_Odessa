name: Fetch PWS Solar Data

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run fetch script
        run: |
          mkdir -p data/pws
          python3 scripts/fetch_pws_solar.py
          echo "Exit code: $?"
          ls -la data/pws/ || echo "Папка пуста"

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/pws/ || true
          git diff --cached --quiet && echo "Нет изменений" && exit 0
          git commit -m "Add PWS solar calibration data"
          git push
