name: Полный облачный пайплайн (verification + AI + PWS)

on:
  workflow_dispatch:   # запускается ТОЛЬКО по триггеру с телефона (точное время),
                        # собственного schedule здесь нет специально

concurrency:
  group: full-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Восстановление шрифта Carlito из кэша
        id: font-cache
        uses: actions/cache@v4
        with:
          path: /usr/share/fonts/truetype/crosextra
          key: fonts-crosextra-carlito-v1

      - name: Установка шрифта (только при промахе кэша)
        if: steps.font-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y fonts-crosextra-carlito

      - name: Обновление кэша шрифтов ОС
        run: sudo fc-cache -f

      - name: Проверка ffmpeg (уже предустановлен в ubuntu-latest)
        run: |
          if command -v ffmpeg >/dev/null 2>&1; then
            echo "ffmpeg уже есть: $(ffmpeg -version | head -1)"
          else
            echo "ffmpeg не найден в образе — ставлю"
            sudo apt-get update -y
            sudo apt-get install -y ffmpeg
          fi

      - name: Установка Python-зависимостей
        run: pip install edge-tts Pillow requests numpy scipy

      - name: Настройка git для коммитов
        run: |
          git config user.name "gh-pipeline-bot"
          git config user.email "actions@users.noreply.github.com"

      - name: Запуск облачного пайплайна
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_ANALYSIS_ENABLED: "true"
          GEMINI_ANALYSIS_ENABLED: "true"
        run: python scripts/gh_pipeline.py
