name: Generate Video

on:
  push:
    paths:
      - 'data/blocks/blocks_meta.json'
      - 'data/blocks/*.mp3'

jobs:
  make-video:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get install -y ffmpeg fonts-dejavu
          pip install Pillow

      - name: Generate video
        run: python3 scripts/make_video.py

      - name: Commit video
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/forecast_video.mp4 || true
          git diff --cached --quiet || git commit -m "auto: generate forecast video"
          git push
