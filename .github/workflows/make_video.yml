name: Generate Video

on:
  push:
    paths:
      - 'data/blocks/blocks_meta.json'
      - 'data/blocks/*.mp3'
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

concurrency:
  group: video-generation
  cancel-in-progress: false

jobs:
  make-video:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check if mp3 newer than mp4
        id: check
        run: |
          MP3_TIME=$(git log --format="%ct" -- 'data/blocks/*.mp3' | head -1)
          MP4_TIME=$(git log --format="%ct" -- 'data/forecast_video.mp4' | head -1)
          echo "mp3_time=$MP3_TIME  mp4_time=$MP4_TIME"
          if [ -z "$MP3_TIME" ]; then
            echo "No mp3 commits found, skip"
            echo "should_run=false" >> $GITHUB_OUTPUT
          elif [ -z "$MP4_TIME" ] || [ "$MP3_TIME" -gt "$MP4_TIME" ]; then
            echo "mp3 is newer, will generate"
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "mp4 is up to date, skip"
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.check.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing ffmpeg fonts-dejavu
          pip install Pillow

      - name: Generate video
        if: steps.check.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        run: python3 scripts/make_video.py

      - name: Commit video
        if: steps.check.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/forecast_video.mp4
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "auto: generate forecast video"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Retry $i..."
            sleep 5
          done