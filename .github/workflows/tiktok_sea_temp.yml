name: TikTok Sea Temp

on:
  schedule:
    # Окно проверок ~7:00–12:00 по Киеву (UTC+3) — время выхода роликов
    # неизвестно точно, поэтому несколько попыток в час; дедуп по video_id
    # в самом скрипте гарантирует, что реальная обработка (скачивание+STT)
    # произойдёт только один раз в день на канал, когда появится новый ролик.
    - cron: '0 4,5,6,7,8,9 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg + tesseract
        run: sudo apt-get update && sudo apt-get install -y ffmpeg tesseract-ocr tesseract-ocr-rus

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install yt-dlp openai-whisper pytesseract Pillow

      - name: Run fetch script
        run: python3 scripts/fetch_tiktok_sea_temp.py

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/tiktok_sea_temp.json data/tiktok_channels.json
          git commit -m "TikTok sea temp: scheduled update" || echo "No changes"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "push failed (race with другой workflow), retry $i..."
            sleep $(( (RANDOM % 10) + 5 ))
          done
