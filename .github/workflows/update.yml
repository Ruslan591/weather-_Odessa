name: Обновление данных погоды

on:
  schedule:
    # Каждые 6 часов: 00:30, 06:30, 12:30, 18:30 UTC
    # +30 мин чтобы модели успели обновиться
    - cron: "50 * * * *"
  workflow_dispatch:   # ручной запуск через GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run update script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIST_TOKEN: ${{ secrets.GH_PAT }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: python scripts/update.py
