<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Построение истории моделей</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: #0d0d0d;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    padding: 24px;
    min-height: 100vh;
}

h1 {
    font-size: 1.1em;
    font-weight: normal;
    color: #888;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 24px;
    border-bottom: 1px solid #222;
    padding-bottom: 12px;
}

.controls {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
}

button {
    padding: 10px 24px;
    border: 1px solid #444;
    background: #1a1a1a;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    font-size: 0.9em;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.15s;
}

button:hover { background: #252525; border-color: #666; }
button:disabled { opacity: 0.3; cursor: not-allowed; }

#startBtn { border-color: #2a6; color: #2a6; }
#startBtn:hover { background: #0a1f12; }
#stopBtn { border-color: #a33; color: #a33; }
#stopBtn:hover { background: #1f0a0a; }
#retryBtn { border-color: #a83; color: #a83; }
#retryBtn:hover { background: #1f1508; }

.progress-bar-wrap {
    background: #1a1a1a;
    border: 1px solid #222;
    height: 4px;
    margin-bottom: 20px;
    display: none;
}

.progress-bar-fill {
    height: 100%;
    background: #2a6;
    width: 0%;
    transition: width 0.3s;
}

.stats-row {
    display: flex;
    gap: 32px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

.stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.stat-label {
    font-size: 0.7em;
    color: #555;
    letter-spacing: 0.12em;
    text-transform: uppercase;
}

.stat-value {
    font-size: 1.4em;
    color: #ccc;
}

#log {
    background: #111;
    border: 1px solid #1e1e1e;
    padding: 16px;
    height: 420px;
    overflow-y: auto;
    font-size: 0.82em;
    line-height: 1.7;
}

.log-ok   { color: #2a6; }
.log-warn { color: #a83; }
.log-err  { color: #a33; }
.log-info { color: #558; }
.log-dim  { color: #444; }

#currentStatus {
    font-size: 0.85em;
    color: #666;
    margin-bottom: 8px;
    min-height: 1.2em;
    letter-spacing: 0.05em;
}
</style>
</head>
<body>

<h1>// построение истории моделей</h1>

<div class="controls">
    <button id="startBtn" onclick="startBuild()">▶ Старт</button>
    <button id="stopBtn" onclick="stopBuild()" disabled>■ Стоп</button>
    <button onclick="retryErrors()" id="retryBtn" disabled>↻ Догрузить ошибки</button>
    <button onclick="downloadAll()" id="dlBtn" disabled>↓ Скачать все файлы</button>
</div>

<div class="stats-row">
    <div class="stat">
        <div class="stat-label">Месяц</div>
        <div class="stat-value" id="statMonth">—</div>
    </div>
    <div class="stat">
        <div class="stat-label">Прогресс</div>
        <div class="stat-value" id="statProgress">0 / 0</div>
    </div>
    <div class="stat">
        <div class="stat-label">Записей</div>
        <div class="stat-value" id="statRecords">0</div>
    </div>
    <div class="stat">
        <div class="stat-label">Статус</div>
        <div class="stat-value" id="statStatus">—</div>
    </div>
    <div class="stat">
        <div class="stat-label">Ошибок</div>
        <div class="stat-value" id="statErrors" style="color:#a33">0</div>
    </div>
</div>

<div class="progress-bar-wrap" id="progressWrap">
    <div class="progress-bar-fill" id="progressFill"></div>
</div>

<div id="currentStatus"></div>
<div id="log"></div>

<script>
const SYNOP_HOURS = [0, 3, 6, 9, 12, 15, 18, 21];
const SYNOP_FILES = ["synop_2023.txt", "synop_2024.txt", "synop_2025.txt", "synop_2026.txt"];
const MODELS = [
    "ecmwf_ifs",
    "icon_eu",
    "icon_global",
    "ukmo_global_deterministic_10km",
    "meteofrance_arpege_europe",
    "jma_gsm",
    "gfs_global",
    "gem_global",
    "cma_grapes_global"
];

let stopped = false;
// { "2023": [ {synopTime, obs, models}, ... ], ... }
let outputByYear = {};
let totalMonths = 0;
let doneMonths = 0;
let totalRecords = 0;
let totalErrors = 0;
// [ {year, month, model} ] — для догрузки
let failedModels = [];

function pad2(n) { return String(n).padStart(2, "0"); }

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function log(msg, cls = "") {
    const el = document.getElementById("log");
    const line = document.createElement("div");
    if (cls) line.className = cls;
    line.textContent = msg;
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
}

function setStatus(msg) {
    document.getElementById("currentStatus").textContent = msg;
}

function updateStats(month, records) {
    document.getElementById("statMonth").textContent = month || "—";
    document.getElementById("statProgress").textContent = `${doneMonths} / ${totalMonths}`;
    document.getElementById("statRecords").textContent = totalRecords;
    document.getElementById("statErrors").textContent = totalErrors;
    const pct = totalMonths ? Math.round(doneMonths / totalMonths * 100) : 0;
    document.getElementById("statStatus").textContent = pct + "%";
    document.getElementById("progressFill").style.width = pct + "%";
}

/* ---- Парсинг synop ---- */
function parseAllSynops(text) {
    const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
    const result = [];
    for (const line of lines) {
        const m = line.match(/^33837,(\d{4}),(\d{2}),(\d{2}),(\d{2}),\d{2},(AAXX\s.+)$/);
        if (!m) continue;
        const [, y, mo, dd, hh, synopLine] = m;
        if (synopLine.includes("NILL")) continue;
        const hour = parseInt(hh);
        if (!SYNOP_HOURS.includes(hour)) continue;
        const telegramKey = `${y}${mo}${dd}${hh}`;
        const parsed = parseSynop(synopLine, telegramKey);
        if (parsed && parsed.temp !== null) {
            result.push({ telegramKey, parsed });
        }
    }
    return result;
}

function parseSynop(line, telegramKey) {
    const parts = line.trim().split(/\s+/);
    let temp = null, pressure = null, wind = null, windDir = null;
    let cloudcover = null, precip = null, ww = null;

    parts.forEach(g => {
        if (/^1[01]\d{3}$/.test(g)) {
            const sign = g[1] === "1" ? -1 : 1;
            temp = sign * parseInt(g.slice(2)) / 10;
        }
        if (/^4\d{4}$/.test(g)) {
            const val = parseInt(g.slice(1));
            pressure = val < 5000 ? 1000 + val / 10 : 900 + val / 10;
        }
        if (/^6\d{4}$/.test(g)) {
            const rrr = parseInt(g.slice(1, 4));
            if (rrr >= 990) precip = 0.1;
            else if (rrr === 0) precip = 0;
            else precip = rrr;
        }
        if (/^7\d{4}$/.test(g)) {
            ww = parseInt(g.slice(1, 3));
        }
    });

    const aaxxi = parts.indexOf("AAXX");
    if (aaxxi >= 0 && parts.length > aaxxi + 4) {
        const wg = parts[aaxxi + 4];
        if (/^\d{5}$/.test(wg)) {
            const N = parseInt(wg[0]);
            cloudcover = N <= 8 ? Math.round(N / 8 * 100) : null;
            windDir = parseInt(wg.slice(1, 3)) * 10;
            wind    = parseInt(wg.slice(3, 5));
        }
    }
    // visibility из irixhvv (3-й токен после AAXX)
let visibility = null, dew = null;
const aaxxi2 = parts.indexOf("AAXX");
if (aaxxi2 >= 0 && parts.length > aaxxi2 + 3) {
    const irixhvv = parts[aaxxi2 + 3];
    if (irixhvv && irixhvv.length === 5 && !irixhvv.slice(3,5).includes("/")) {
        const vv = parseInt(irixhvv.slice(3,5));
        if (!isNaN(vv)) {
            if (vv <= 50) visibility = vv * 100;
            else if (vv <= 80) visibility = (vv - 50) * 1000;
            else if (vv === 89) visibility = 70000;
            else visibility = null;
        }
    }
}
// dew из группы 2sTTT
parts.forEach(g => {
    if (/^2[01]\d{3}$/.test(g)) {
        const sign = g[1] === "1" ? -1 : 1;
        dew = sign * parseInt(g.slice(2)) / 10;
    }
});
return { synopTime: telegramKey, temp, pressure, wind, windDir, cloudcover, precip, ww, visibility, dew, synop: line };
}

/* ---- Загрузка моделей за месяц ---- */
async function fetchModelMonth(model, startDate, endDate) {
    const url = "https://historical-forecast-api.open-meteo.com/v1/forecast" +
        "?latitude=46.4406&longitude=30.7703" +
        "&hourly=temperature_2m,pressure_msl,wind_speed_10m,wind_direction_10m,wind_gusts_10m,cloud_cover,precipitation,weather_code,visibility,dew_point_2m" +
        "&hourly_pressure_level=850" +
        "&pressure_level_variables=temperature" +
        "&models=" + model +
        "&start_date=" + startDate + "&end_date=" + endDate +
        "&timezone=UTC&wind_speed_unit=ms";

    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 30000);
    try {
        const r = await fetch(url, { signal: ctrl.signal });
        clearTimeout(timer);
        if (r.status === 429) throw new Error("429");
        const d = await r.json();
        if (!d.hourly) throw new Error(d.reason || "no hourly");
        return d.hourly;
    } catch(e) {
        clearTimeout(timer);
        throw e;
    }
}

/* ---- Обработка одного месяца ---- */
async function processMonth(year, month, synops) {
    const label = `${pad2(month)}.${year}`;
    const startDate = `${year}-${pad2(month)}-01`;
    const lastDay = new Date(year, month, 0).getDate();
    const endDate = `${year}-${pad2(month)}-${pad2(lastDay)}`;

    // фильтруем нужные сводки за этот месяц
    const mm = pad2(month);
    const prefix = `${year}${mm}`;
    const monthSynops = synops.filter(s => s.telegramKey.startsWith(prefix));

    if (!monthSynops.length) {
        log(`${label}: нет сводок`, "log-dim");
        return 0;
    }

    log(`${label}: ${monthSynops.length} сводок — загрузка моделей...`, "log-info");
    setStatus(`${label} — запрос моделей...`);

    // Загружаем каждую модель последовательно
    const hourlyByModel = {};
    for (const model of MODELS) {
        if (stopped) return 0;
        let retries = 3;
        while (retries > 0) {
            try {
                setStatus(`${label} — ${model}...`);
                const h = await fetchModelMonth(model, startDate, endDate);
                hourlyByModel[model] = h;
                log(`  ✓ ${model}`, "log-ok");
                break;
            } catch(e) {
                retries--;
                if (String(e).includes("429") && retries > 0) {
                    log(`  ⏳ ${model} — rate limit, жду 10с...`, "log-warn");
                    await sleep(10000);
                } else if (retries === 0) {
                    log(`  ✗ ${model} — ${e}`, "log-err");
                    hourlyByModel[model] = null;
                    failedModels.push({ year, month, model });
                    totalErrors++;
                    updateStats(null, 0);
                } else {
                    await sleep(2000);
                }
            }
        }
        await sleep(500);
    }

    // Собираем записи
    let saved = 0;
    const year4 = String(year);

    for (const s of monthSynops) {
        const tk = s.telegramKey;
        const targetTime = `${tk.slice(0,4)}-${tk.slice(4,6)}-${tk.slice(6,8)}T${tk.slice(8,10)}:00`;

        // берём time из любой доступной модели
        let timeArr = null;
        for (const m of MODELS) {
            if (hourlyByModel[m]) { timeArr = hourlyByModel[m].time; break; }
        }
        if (!timeArr) continue;

        const hourIndex = timeArr.findIndex(t => t.startsWith(targetTime));
        if (hourIndex === -1) continue;

        const modelsData = {};
        for (const m of MODELS) {
            const h = hourlyByModel[m];
            if (!h) continue;
            modelsData[m] = {
    temp:        h.temperature_2m        ? h.temperature_2m[hourIndex]        : null,
    pressure:    h.pressure_msl          ? h.pressure_msl[hourIndex]          : null,
    wind:        h.wind_speed_10m        ? h.wind_speed_10m[hourIndex]        : null,
    windDir:     h.wind_direction_10m && h.wind_direction_10m[hourIndex] != null
        ? Math.round(h.wind_direction_10m[hourIndex] / 10) * 10 : null,
    gusts:       h.wind_gusts_10m        ? h.wind_gusts_10m[hourIndex]        : null,
    cloudcover:  h.cloud_cover           ? h.cloud_cover[hourIndex]           : null,
    precip:      h.precipitation         ? h.precipitation[hourIndex]         : null,
    weatherCode: h.weather_code          ? h.weather_code[hourIndex]          : null,
    visibility:  h.visibility            ? h.visibility[hourIndex]            : null,
    dewPoint:    h.dew_point_2m          ? h.dew_point_2m[hourIndex]          : null,
    temp850:     h.temperature_850hPa    ? h.temperature_850hPa[hourIndex]    : null
};
        }

        if (!outputByYear[year4]) outputByYear[year4] = [];
outputByYear[year4].push({
    synopTime:    tk,
    forecastHour: null,
    obs:          s.parsed,
    models:       modelsData
});

        saved++;
        totalRecords++;
    }

    log(`${label}: сохранено ${saved} из ${monthSynops.length}`, saved > 0 ? "log-ok" : "log-warn");
    return saved;
}

/* ---- Главный процесс ---- */
async function startBuild() {
    stopped = false;
    outputByYear = {};
    totalRecords = 0;
    doneMonths = 0;
    totalErrors = 0;
    failedModels = [];

    document.getElementById("startBtn").disabled = true;
    document.getElementById("stopBtn").disabled = false;
    document.getElementById("dlBtn").disabled = true;
    document.getElementById("progressWrap").style.display = "block";
    document.getElementById("log").innerHTML = "";

    // Загружаем все synop файлы
    log("Загрузка локальных synop файлов...", "log-info");
    let allSynops = [];
    for (const file of SYNOP_FILES) {
        try {
            const r = await fetch(file);
            if (!r.ok) { log(`  ✗ ${file} — HTTP ${r.status}`, "log-warn"); continue; }
            const text = await r.text();
            const parsed = parseAllSynops(text);
            log(`  ✓ ${file} — ${parsed.length} сводок`, "log-ok");
            allSynops = allSynops.concat(parsed);
        } catch(e) {
            log(`  ✗ ${file} — ${e}`, "log-err");
        }
    }

    log(`Всего сводок: ${allSynops.length}`, "log-info");

    // Формируем список месяцев
    const months = [];
    const now = new Date();
    const startYear = 2023;
    for (let y = startYear; y <= now.getFullYear(); y++) {
        const maxM = (y === now.getFullYear()) ? now.getMonth() : 12;
        for (let m = 1; m <= maxM; m++) {
            months.push({ year: y, month: m });
        }
    }
    totalMonths = months.length;
    updateStats("—", 0);

    log(`Месяцев для обработки: ${totalMonths}`, "log-info");
    log("─────────────────────────────────────", "log-dim");

    for (const { year, month } of months) {
        if (stopped) { log("⛔ Остановлено", "log-warn"); break; }

        const label = `${pad2(month)}.${year}`;
        document.getElementById("statMonth").textContent = label;
        updateStats(label, totalRecords);

        await processMonth(year, month, allSynops);

        doneMonths++;
        updateStats(label, totalRecords);

        await sleep(2000); // пауза между месяцами
    }

    log("─────────────────────────────────────", "log-dim");
    log(`Готово. Всего записей: ${totalRecords}`, "log-ok");
    setStatus("Готово — " + totalRecords + " записей");

    document.getElementById("startBtn").disabled = false;
    document.getElementById("stopBtn").disabled = true;
    document.getElementById("dlBtn").disabled = false;
    if (failedModels.length > 0) {
        document.getElementById("retryBtn").disabled = false;
        log(`⚠️ Ошибок: ${totalErrors} — нажми «Догрузить ошибки»`, "log-warn");
    }
}

function stopBuild() {
    stopped = true;
    document.getElementById("stopBtn").disabled = true;
    document.getElementById("startBtn").disabled = false;
}

/* ---- Догрузка ошибок ---- */
async function retryErrors() {
    if (!failedModels.length) return;

    stopped = false;
    document.getElementById("retryBtn").disabled = true;
    document.getElementById("stopBtn").disabled = false;
    document.getElementById("startBtn").disabled = true;

    log("─────────────────────────────────────", "log-dim");
    log(`Догрузка ошибок: ${failedModels.length} моделей...`, "log-info");

    // Группируем по месяцу
    const byMonth = {};
    for (const f of failedModels) {
        const key = `${f.year}-${pad2(f.month)}`;
        if (!byMonth[key]) byMonth[key] = { year: f.year, month: f.month, models: [] };
        byMonth[key].models.push(f.model);
    }

    const retryFailed = [];

    for (const key of Object.keys(byMonth).sort()) {
        if (stopped) break;
        const { year, month, models: failedList } = byMonth[key];
        const label = `${pad2(month)}.${year}`;
        const startDate = `${year}-${pad2(month)}-01`;
        const lastDay = new Date(year, month, 0).getDate();
        const endDate = `${year}-${pad2(month)}-${pad2(lastDay)}`;

        log(`${label}: повтор ${failedList.join(", ")}`, "log-info");

        // Получаем существующие записи за этот месяц
        const mm = pad2(month);
        const prefix = `${String(year)}${mm}`;
        const year4 = String(year);

        for (const model of failedList) {
            if (stopped) break;
            let success = false;
            let retries = 3;
            while (retries > 0) {
                try {
                    setStatus(`${label} — повтор ${model}...`);
                    const h = await fetchModelMonth(model, startDate, endDate);

                    // Обновляем данные модели в существующих записях
                    if (outputByYear[year4]) {
                        for (const rec of outputByYear[year4]) {
                            if (!rec.synopTime.startsWith(prefix)) continue;
                            const tk = rec.synopTime;
                            const targetTime = `${tk.slice(0,4)}-${tk.slice(4,6)}-${tk.slice(6,8)}T${tk.slice(8,10)}:00`;
                            const hourIndex = h.time.findIndex(t => t.startsWith(targetTime));
                            if (hourIndex === -1) continue;
                            rec.models[model] = {
                                temp:        h.temperature_2m        ? h.temperature_2m[hourIndex]        : null,
                                pressure:    h.pressure_msl          ? h.pressure_msl[hourIndex]          : null,
                                wind:        h.wind_speed_10m        ? h.wind_speed_10m[hourIndex]        : null,
                                windDir:     h.wind_direction_10m && h.wind_direction_10m[hourIndex] != null
                                    ? Math.round(h.wind_direction_10m[hourIndex] / 10) * 10 : null,
                                cloudcover:  h.cloud_cover           ? h.cloud_cover[hourIndex]           : null,
                                precip:      h.precipitation         ? h.precipitation[hourIndex]         : null,
                                weatherCode: h.weather_code          ? h.weather_code[hourIndex]          : null
                            };
                        }
                    }

                    log(`  ✓ ${model}`, "log-ok");
                    totalErrors--;
                    updateStats(label, 0);
                    success = true;
                    break;
                } catch(e) {
                    retries--;
                    if (String(e).includes("429") && retries > 0) {
                        log(`  ⏳ ${model} — rate limit, жду 10с...`, "log-warn");
                        await sleep(10000);
                    } else if (retries === 0) {
                        log(`  ✗ ${model} — ${e}`, "log-err");
                        retryFailed.push({ year, month, model });
                    } else {
                        await sleep(2000);
                    }
                }
            }
            await sleep(500);
        }
        await sleep(2000);
    }

    failedModels = retryFailed;
    document.getElementById("stopBtn").disabled = true;
    document.getElementById("startBtn").disabled = false;

    if (failedModels.length > 0) {
        document.getElementById("retryBtn").disabled = false;
        log(`⚠️ Осталось ошибок: ${failedModels.length}`, "log-warn");
    } else {
        log("✅ Все ошибки устранены", "log-ok");
    }
}

/* ---- Скачивание по годам ---- */
function downloadYear(year, data) {
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `modelData_${year}.json`;
    a.click();
    URL.revokeObjectURL(url);
}

function downloadAll() {
    for (const year of Object.keys(outputByYear).sort()) {
        setTimeout(() => downloadYear(year, outputByYear[year]), 300 * (parseInt(year) - 2022));
    }
}
</script>
</body>
</html>
