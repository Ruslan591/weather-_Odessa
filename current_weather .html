<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Текущая погода</title>

<style>
body{
    background:#121212;
    color:#eee;
    font-family:sans-serif;
    padding:20px;
}

h1{
    text-align:center;
}

.card{
    max-width:420px;
    margin:20px auto;
    background:#1e1e1e;
    padding:15px;
    border-radius:10px;
}

.row{
    display:flex;
    justify-content:space-between;
    padding:8px 0;
    border-bottom:1px solid #333;
}

.value{
    font-weight:bold;
}

.synop{
    margin-top:15px;
    font-size:12px;
    color:#aaa;
    word-break:break-all;
}

button{
    margin-top:15px;
    padding:8px 14px;
    background:#333;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
</style>

</head>
<body>

<h1>Текущая погода</h1>

<div class="card" id="weather">
Загрузка...
</div>

<div style="text-align:center">
<button onclick="load()">Обновить</button>
</div>

<script>

async function load(){

    const el = document.getElementById("weather");
    el.innerHTML = "Загрузка...";

    try{

        const ogimet =
        "https://www.ogimet.com/display_synops2.php?lang=en&lugar=33837&tipo=ALL&ord=REV&nil=SI&fmt=txt";

        const url = "https://api.allorigins.win/raw?url=" + encodeURIComponent(ogimet);

        const r = await fetch(url);
        const text = await r.text();

        const line = text.split("\n").find(l => l.includes("AAXX"));

        if(!line) throw "SYNOP не найден";

        const data = parseSynop(line);

        render(data);

    }catch(e){
        el.innerHTML = "Ошибка: " + e;
    }

}

function parseSynop(line){

    const parts = line.trim().split(" ");

    let temp = null;
    let pressure = null;
    let wind = null;
    let windDir = null;

    parts.forEach(g => {

        if(g.startsWith("1")){
            const sign = g[1] === "1" ? -1 : 1;
            temp = sign * parseInt(g.slice(2)) / 10;
        }

        if(g.startsWith("4")){
            pressure = 1000 + parseInt(g.slice(1)) / 10;
        }

    });

    const aaxxi = parts.indexOf("AAXX");

    if(aaxxi >= 0 && parts.length > aaxxi + 4){
        const w = parts[aaxxi + 4];

        windDir = parseInt(w.slice(1,3)) * 10;
        wind = parseInt(w.slice(3,5));
    }

    return {
        temp,
        pressure,
        wind,
        windDir,
        raw: line
    };

}

function degToText(d){

    const dirs = [
        "С","СВ","В","ЮВ",
        "Ю","ЮЗ","З","СЗ"
    ];

    return dirs[Math.round(d/45)%8];
}

function render(d){

    const el = document.getElementById("weather");

    el.innerHTML = `

    <div class="row">
        <div>Температура</div>
        <div class="value">${d.temp ?? "-"} °C</div>
    </div>

    <div class="row">
        <div>Давление</div>
        <div class="value">${d.pressure ?? "-"} гПа</div>
    </div>

    <div class="row">
        <div>Ветер</div>
        <div class="value">
            ${d.wind ?? "-"} м/с
            ${d.windDir ? `(${degToText(d.windDir)})` : ""}
        </div>
    </div>

    <div class="synop">
        ${d.raw}
    </div>

    `;
}

load();

</script>

</body>
</html>
