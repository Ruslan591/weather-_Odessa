<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Текущая погода</title>

<style>
body{
    background:#121212;
    color:#eee;
    font-family:sans-serif;
    margin:0;
    padding:0;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 15px;
    background:#1e1e1e;
    position:sticky;
    top:0;
    z-index:10;
}

.nav a{
    margin-left:12px;
    color:#aaa;
    text-decoration:none;
}

.nav a:hover{
    color:#fff;
}

.container{
    padding:15px;
    max-width:900px;
    margin:auto;
}

.card{
    background:#1e1e1e;
    border-radius:12px;
    padding:15px;
    margin-bottom:15px;
}

.row{
    display:flex;
    justify-content:space-between;
    gap:15px;
    padding:8px 0;
    border-bottom:1px solid #333;
}

.row:last-child{
    border-bottom:none;
}

.value{
    font-weight:bold;
    text-align:right;
}

.big{
    font-size:32px;
    text-align:center;
    margin:10px 0 15px;
}

.small{
    color:#aaa;
    font-size:12px;
    line-height:1.45;
}

.buttons{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    flex:1;
    min-width:180px;
    padding:10px;
    background:#333;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#444;
}

h3{
    margin-top:0;
}

.raw{
    margin-top:12px;
    word-break:break-word;
}

.logbox{
    margin-top:10px;
    padding:10px;
    background:#181818;
    border-radius:8px;
    min-height:20px;
}

@media (max-width:640px){
    .header{
        flex-direction:column;
        align-items:flex-start;
        gap:8px;
    }

    .row{
        flex-direction:column;
        gap:4px;
    }

    .value{
        text-align:left;
    }

    .buttons{
        flex-direction:column;
    }

    button{
        width:100%;
    }
}
</style>
</head>
<body>

<div class="header">
    <div><b>Погода сейчас</b></div>
    <div class="nav">
        <a href="index.html">Рейтинг</a>
        <a href="forecast.html">Прогноз</a>
    </div>
</div>

<div class="container">

    <div class="card" id="main">
        Загрузка SYNOP...
    </div>

    <div class="card">
        <h3>SYNOP</h3>
        <div id="synopLog" class="small logbox"></div>
        <div class="buttons">
            <button onclick="loadSynopUI()">Обновить SYNOP</button>
        </div>
    </div>

    <div class="card" id="districts">
        Загрузка районов...
    </div>

    <div class="card">
        <h3>Районы</h3>
        <div id="districtsLog" class="small logbox"></div>
        <div class="buttons">
            <button onclick="loadDistrictsUI()">Обновить районы</button>
        </div>
    </div>

</div>

<script>
// ========================================
// 1. ЛОГИ
// ========================================
function logTo(elId, msg){
    const el = document.getElementById(elId);
    if(!el) return;

    const time = new Date().toLocaleTimeString("ru-RU");
    el.innerHTML += `[${time}] ${msg}<br>`;
    console.log(msg);
}

function clearLogLater(elId, delay = 7000){
    setTimeout(()=>{
        const el = document.getElementById(elId);
        if(el) el.innerHTML = "";
    }, delay);
}

// ========================================
// 2. ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
// ========================================
function setMainStatus(text){
    document.getElementById("main").innerHTML = text;
}

function tempColor(t){
    if(t == null) return "#eee";
    if(t < 0) return "#4da3ff";
    if(t < 10) return "#90caf9";
    if(t < 20) return "#81c784";
    if(t < 30) return "#ffb74d";
    return "#ff5252";
}

function windArrow(deg){
    if(deg == null) return "";
    return `<span style="display:inline-block;transform:rotate(${deg}deg);font-size:18px;">↑</span>`;
}

function degToText(d){
    if(d == null) return "-";
    const dirs = ["С","СВ","В","ЮВ","Ю","ЮЗ","З","СЗ"];
    return dirs[Math.round(d / 45) % 8];
}

function cloudText(c){
    if(c == null) return "-";
    return `${c}/8`;
}

function weatherText(code){
    if(!code) return "-";

    const map = {
        "00":"Ясно",
        "01":"Малооблачно",
        "02":"Переменная облачность",
        "03":"Пасмурно",
        "04":"Дымка",
        "05":"Мгла",
        "10":"Дымка",
        "45":"Туман",
        "48":"Туман с изморозью",
        "51":"Слабая морось",
        "53":"Морось",
        "55":"Сильная морось",
        "61":"Слабый дождь",
        "63":"Дождь",
        "65":"Сильный дождь",
        "71":"Слабый снег",
        "73":"Снег",
        "75":"Сильный снег",
        "80":"Ливневый дождь",
        "81":"Ливень",
        "82":"Сильный ливень",
        "95":"Гроза"
    };

    return map[code] || `Код ${code}`;
}

function pressureTrendText(code){
    const map = {
        "0":"Рост, затем падение; выше чем 3 часа назад",
        "1":"Рост, затем без изменений; выше",
        "2":"Рост; выше",
        "3":"Падение или без изменений, затем рост; выше",
        "4":"Без изменений; как 3 часа назад",
        "5":"Падение, затем рост; ниже",
        "6":"Падение; ниже",
        "7":"Рост или без изменений, затем падение; ниже",
        "8":"Без изменений или неравномерно; ниже",
    };
    return map[code] || "-";
}

function formatLocalApiTime(s){
    if(!s) return "-";
    const [date, time] = s.split("T");
    return `${date} ${time}`;
}

function formatSynopLocalTime(timeUTC){
    if(!timeUTC) return "-";

    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();

    const dt = new Date(Date.UTC(
        year,
        month,
        parseInt(timeUTC.day, 10),
        parseInt(timeUTC.hour, 10),
        0,
        0
    ));

    return dt.toLocaleString("ru-RU", {
        day: "2-digit",
        month: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
    });
}

// ========================================
// 3. ЗАГРУЗКА SYNOP
// ========================================
async function loadSynop(){

    const ogimet = "https://www.ogimet.com/display_synops2.php?lang=en&lugar=33837&tipo=ALL&ord=REV&nil=SI&fmt=txt";
    const url = "https://api.allorigins.win/raw?url=" + encodeURIComponent(ogimet);

    const controller = new AbortController();
    const timeout = setTimeout(()=>controller.abort(), 20000);

    let r;

    try{
        r = await fetch(url, { signal: controller.signal });
    }catch(e){
        throw "Ошибка сети или таймаут";
    }

    clearTimeout(timeout);

    const text = await r.text();
    const line = text.split("\n").find(l => l.includes("AAXX"));

    if(!line){
        throw "SYNOP не найден";
    }

    return parseSynop(line);
}

// ========================================
// 4. ПАРСИНГ SYNOP
// ========================================
function parseSynop(line){

    const parts = line.trim().split(/\s+/);
    const aaxxIndex = parts.indexOf("AAXX");

    if(aaxxIndex === -1){
        throw "В строке нет AAXX";
    }

    const yyggiw = parts[aaxxIndex + 1] || null;
    const station = parts[aaxxIndex + 2] || null;
    const group3 = parts[aaxxIndex + 3] || null;
    const group4 = parts[aaxxIndex + 4] || null;
    const group5 = parts[aaxxIndex + 5] || null;
    const group6 = parts[aaxxIndex + 6] || null;
    const group7 = parts[aaxxIndex + 7] || null;
    const group8 = parts[aaxxIndex + 8] || null;
    const group9 = parts[aaxxIndex + 9] || null;

    let temp = null;
    let dew = null;
    let pressureStation = null;
    let pressureSea = null;
    let pressureTrendCode = null;
    let pressureTrendValue = null;
    let wind = null;
    let windDir = null;
    let cloud = null;
    let visibility = null;
    let weatherNow = null;
    let weatherBetween = null;
    let cloudGroup = null;
    let precipGroup = null;

    let timeUTC = null;
    if(yyggiw && yyggiw.length >= 4){
        timeUTC = {
            day: yyggiw.slice(0,2),
            hour: yyggiw.slice(2,4),
            raw: yyggiw
        };
    }

    if(group3 && group3.length === 5){
        cloud = group4 && group4[0] !== "/" ? parseInt(group4[0], 10) : null;
        visibility = group3.slice(3,5);
    }

    if(group4 && group4.length === 5){
        const dd = group4.slice(1,3);
        const ff = group4.slice(3,5);

        windDir = dd.includes("/") ? null : parseInt(dd, 10) * 10;
        wind = ff.includes("/") ? null : parseInt(ff, 10);
    }

    if(group5 && group5.startsWith("1") && group5.length === 5){
        const sign = group5[1] === "1" ? -1 : 1;
        temp = sign * parseInt(group5.slice(2), 10) / 10;
    }

    if(group6 && group6.startsWith("2") && group6.length === 5){
        const sign = group6[1] === "1" ? -1 : 1;
        dew = sign * parseInt(group6.slice(2), 10) / 10;
    }

    if(group7 && group7.startsWith("3") && group7.length === 5){
        const p = parseInt(group7.slice(1), 10) / 10;
        pressureStation = p < 100 ? 1000 + p : 900 + p;
    }

    if(group8 && group8.startsWith("4") && group8.length === 5){
        const p = parseInt(group8.slice(1), 10) / 10;
        pressureSea = p < 500 ? 1000 + p : 900 + p;
    }

    if(group9 && group9.startsWith("5") && group9.length === 5){
        pressureTrendCode = group9[1];
        pressureTrendValue = parseInt(group9.slice(2), 10) / 10;
    }

    let ptr = aaxxIndex + 10;

    if(parts[ptr] && parts[ptr].startsWith("6")){
        precipGroup = parts[ptr];
        ptr++;
    }

    if(parts[ptr] && parts[ptr].startsWith("7")){
        weatherNow = parts[ptr].slice(1,3);
        weatherBetween = parts[ptr].slice(3,5);
        ptr++;
    }

    if(parts[ptr] && parts[ptr].startsWith("8")){
        cloudGroup = parts[ptr];
        ptr++;
    }

    return {
        raw: line,
        station,
        timeUTC,
        cloud,
        visibility,
        wind,
        windDir,
        temp,
        dew,
        pressureStation,
        pressureSea,
        pressureTrendCode,
        pressureTrendValue,
        precipGroup,
        weatherNow,
        weatherBetween,
        cloudGroup
    };
}

// ========================================
// 5. ОТРИСОВКА SYNOP
// ========================================
function renderSynop(d){
    const el = document.getElementById("main");

    el.innerHTML = `
        <div class="small">Наблюдение: ${formatSynopLocalTime(d.timeUTC)}</div>
        <div class="small">Станция: ${d.station ?? "-"}</div>

        <div class="big" style="color:${tempColor(d.temp)}">
            ${d.temp ?? "-"}°C
        </div>

        <div class="row">
            <div>Точка росы</div>
            <div class="value">${d.dew ?? "-"}°C</div>
        </div>

        <div class="row">
            <div>Давление на станции</div>
            <div class="value">${d.pressureStation ?? "-"} гПа</div>
        </div>

        <div class="row">
            <div>Давление к уровню моря</div>
            <div class="value">${d.pressureSea ?? "-"} гПа</div>
        </div>

        <div class="row">
            <div>Барическая тенденция</div>
            <div class="value">
                ${pressureTrendText(d.pressureTrendCode)}<br>
                <span class="small">${d.pressureTrendValue ?? "-"} гПа за 3 часа</span>
            </div>
        </div>

        <div class="row">
            <div>Ветер</div>
            <div class="value">
                ${d.wind ?? "-"} м/с
                ${d.windDir != null ? degToText(d.windDir) : ""}
                ${windArrow(d.windDir)}
            </div>
        </div>

        <div class="row">
            <div>Общая облачность</div>
            <div class="value">${cloudText(d.cloud)}</div>
        </div>

        <div class="row">
            <div>Видимость</div>
            <div class="value">${d.visibility ?? "-"}</div>
        </div>

        <div class="row">
            <div>Явления в срок наблюдения</div>
            <div class="value">${weatherText(d.weatherNow)}</div>
        </div>

        <div class="row">
            <div>Между сроками</div>
            <div class="value">${d.weatherBetween ?? "-"}</div>
        </div>

        <div class="row">
            <div>Осадки</div>
            <div class="value">${d.precipGroup ?? "-"}</div>
        </div>

        <div class="row">
            <div>Группа облаков</div>
            <div class="value">${d.cloudGroup ?? "-"}</div>
        </div>

        <div class="small raw">${d.raw}</div>
    `;
}

// ========================================
// 6. UI-ОБЁРТКА SYNOP
// ========================================
async function loadSynopUI(){
    const logId = "synopLog";
    document.getElementById(logId).innerHTML = "";

    setMainStatus("Загрузка SYNOP...");

    try{
        logTo(logId, "Старт загрузки SYNOP");
        logTo(logId, "Подготовка URL Ogimet");
        logTo(logId, "Отправка запроса на прокси");

        const synop = await loadSynop();

        logTo(logId, "Ответ получен");
        logTo(logId, "Разбор SYNOP");
        renderSynop(synop);
        logTo(logId, "SYNOP успешно отображён");

        clearLogLater(logId);
    }catch(e){
        setMainStatus("Ошибка загрузки SYNOP");
        logTo(logId, "Ошибка: " + e);
    }
}

// ========================================
// 7. РАЙОНЫ
// ========================================
const locations = {
    "Котовского": [46.560, 30.800],
    "Центр": [46.482, 30.723],
    "Таирова": [46.400, 30.650],
    "Аркадия": [46.430, 30.760],
    "Застава": [46.520, 30.650]
};

async function loadCurrentWeather(lat, lon){
    const today = new Date().toISOString().slice(0,10);

    const url =
        `https://api.open-meteo.com/v1/forecast` +
        `?latitude=${lat}` +
        `&longitude=${lon}` +
        `&current=temperature_2m,weather_code,cloud_cover,pressure_msl,wind_speed_10m,wind_direction_10m,wind_gusts_10m,precipitation,is_day,relative_humidity_2m,rain,apparent_temperature,showers,snowfall,surface_pressure` +
        `&timezone=auto` +
        `&wind_speed_unit=ms` +
        `&start_date=${today}` +
        `&end_date=${today}`;

    const r = await fetch(url);
    const d = await r.json();

    if(!d.current){
        throw new Error("Нет current в ответе Open-Meteo");
    }

    return d.current;
}

function weatherCodeText(code){
    const map = {
        0:"Ясно",
        1:"Преимущественно ясно",
        2:"Переменная облачность",
        3:"Пасмурно",
        45:"Туман",
        48:"Туман с изморозью",
        51:"Слабая морось",
        53:"Морось",
        55:"Сильная морось",
        61:"Слабый дождь",
        63:"Дождь",
        65:"Сильный дождь",
        71:"Слабый снег",
        73:"Снег",
        75:"Сильный снег",
        80:"Ливневый дождь",
        81:"Ливень",
        82:"Сильный ливень",
        95:"Гроза"
    };
    return map[code] || `Код ${code}`;
}

function renderDistricts(results){
    let html = `<h3>Погода по районам</h3>`;

    results.forEach(({name, w})=>{
        html += `
            <div class="card" style="margin-bottom:12px;">
                <div><b>${name}</b></div>
                <div class="small" style="margin-top:4px;">Обновление: ${formatLocalApiTime(w.time)}</div>

                <div class="row">
                    <div>Температура</div>
                    <div class="value">${w.temperature_2m ?? "-"}°C</div>
                </div>

                <div class="row">
                    <div>Ощущается как</div>
                    <div class="value">${w.apparent_temperature ?? "-"}°C</div>
                </div>

                <div class="row">
                    <div>Погода</div>
                    <div class="value">${weatherCodeText(w.weather_code)}</div>
                </div>

                <div class="row">
                    <div>Облачность</div>
                    <div class="value">${w.cloud_cover ?? "-"}%</div>
                </div>

                <div class="row">
                    <div>Влажность</div>
                    <div class="value">${w.relative_humidity_2m ?? "-"}%</div>
                </div>

                <div class="row">
                    <div>Давление MSL</div>
                    <div class="value">${w.pressure_msl ?? "-"} гПа</div>
                </div>

                <div class="row">
                    <div>Давление у поверхности</div>
                    <div class="value">${w.surface_pressure ?? "-"} гПа</div>
                </div>

                <div class="row">
                    <div>Ветер</div>
                    <div class="value">
                        ${w.wind_speed_10m ?? "-"} м/с
                        ${w.wind_direction_10m != null ? degToText(w.wind_direction_10m) : ""}
                        ${windArrow(w.wind_direction_10m)}
                    </div>
                </div>

                <div class="row">
                    <div>Порывы</div>
                    <div class="value">${w.wind_gusts_10m ?? "-"} м/с</div>
                </div>

                ${(w.precipitation > 0 || w.rain > 0 || w.showers > 0 || w.snowfall > 0) ? `
                <div class="row">
                    <div>Осадки</div>
                    <div class="value">
                        ${w.precipitation ?? 0} мм
                        ${w.rain > 0 ? `<br><span class="small">дождь: ${w.rain} мм</span>` : ""}
                        ${w.showers > 0 ? `<br><span class="small">ливень: ${w.showers} мм</span>` : ""}
                        ${w.snowfall > 0 ? `<br><span class="small">снег: ${w.snowfall} мм</span>` : ""}
                    </div>
                </div>
                ` : ""}
            </div>
        `;
    });

    document.getElementById("districts").innerHTML = html;
}

async function loadDistrictsUI(){
    const logId = "districtsLog";
    document.getElementById(logId).innerHTML = "";
    document.getElementById("districts").innerHTML = "Загрузка районов...";

    try{
        logTo(logId, "Старт загрузки районов");
        logTo(logId, "Подготовка координат");
        logTo(logId, "Отправка запросов в Open-Meteo");

        const entries = Object.entries(locations);

        const results = await Promise.all(
            entries.map(async ([name, coords])=>{
                const [lat, lon] = coords;
                const w = await loadCurrentWeather(lat, lon);
                return { name, w };
            })
        );

        logTo(logId, "Данные районов получены");
        renderDistricts(results);
        logTo(logId, "Карточки районов построены");

        clearLogLater(logId);
    }catch(e){
        document.getElementById("districts").innerHTML = "Ошибка загрузки районов";
        logTo(logId, "Ошибка: " + e);
    }
}

// ========================================
// 8. АВТОЗАГРУЗКА
// ========================================
loadSynopUI();
loadDistrictsUI();

setInterval(loadSynopUI, 1800000);
setInterval(loadDistrictsUI, 900000);
</script>

</body>
</html>
