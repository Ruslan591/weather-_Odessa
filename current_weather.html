<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Текущая погода</title>

<style>
:root{
    --bg:#121212;
    --card:#1e1e1e;
    --card2:#181818;
    --text:#eee;
    --muted:#aaa;
    --line:#333;
    --accent:#4da3ff;
    --good:#81c784;
    --warm:#ffb74d;
    --hot:#ff5252;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:sans-serif;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    padding:12px 16px;
    background:var(--card);
    position:sticky;
    top:0;
    z-index:10;
    border-bottom:1px solid var(--line);
}

.nav{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
}

.nav a{
    color:var(--muted);
    text-decoration:none;
    font-size:14px;
}

.nav a:hover{
    color:#fff;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:14px;
}

.card{
    background:var(--card);
    border-radius:14px;
    padding:14px;
    margin-bottom:14px;
}

.cardTitle{
    font-size:15px;
    font-weight:bold;
    margin-bottom:10px;
}

.hero{
    display:grid;
    grid-template-columns: 1.15fr 1fr;
    gap:14px;
    align-items:stretch;
}

.mainTemp{
    display:flex;
    flex-direction:column;
    justify-content:center;
    min-height:170px;
    background:linear-gradient(180deg,#202020,#1a1a1a);
    border-radius:14px;
    padding:16px;
}

.mainTempTop{
    color:var(--muted);
    font-size:12px;
    margin-bottom:10px;
}

.tempLine{
    display:flex;
    align-items:baseline;
    gap:12px;
    flex-wrap:wrap;
}

.tempBig{
    font-size:54px;
    font-weight:700;
    line-height:1;
}

.tempFeel{
    font-size:18px;
    color:var(--muted);
}

.weatherLine{
    margin-top:10px;
    font-size:16px;
}

.windHero{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:14px;
}

.miniStat{
    background:var(--card2);
    border-radius:12px;
    padding:12px;
}

.miniLabel{
    color:var(--muted);
    font-size:12px;
    margin-bottom:4px;
}

.miniValue{
    font-size:20px;
    font-weight:bold;
}

.grid2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
}

.rowsCompact{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px 14px;
}

.stat{
    background:var(--card2);
    border-radius:12px;
    padding:10px 12px;
    min-height:64px;
}

.stat .label{
    color:var(--muted);
    font-size:12px;
    margin-bottom:5px;
}

.stat .value{
    font-size:16px;
    font-weight:600;
}

.small{
    color:var(--muted);
    font-size:12px;
    line-height:1.45;
}

.logbox{
    background:var(--card2);
    border-radius:10px;
    padding:10px;
    min-height:20px;
    margin-top:10px;
}

.buttons{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:10px;
}

button{
    padding:10px 12px;
    background:#333;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#444;
}

details{
    background:var(--card2);
    border-radius:12px;
    padding:12px;
}

summary{
    cursor:pointer;
    font-weight:600;
}

.raw{
    word-break:break-word;
    margin-top:10px;
}

.districtList{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.districtCard{
    background:var(--card2);
    border-radius:12px;
    padding:12px;
}

.districtHead{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
    margin-bottom:8px;
}

.districtName{
    font-weight:bold;
}

.districtTemp{
    font-size:24px;
    font-weight:700;
}

.line2{
    display:flex;
    justify-content:space-between;
    gap:12px;
    margin-top:6px;
    font-size:14px;
}

.badge{
    display:inline-block;
    padding:3px 8px;
    border-radius:999px;
    background:#2a2a2a;
    font-size:12px;
    color:#ddd;
}

@media (max-width:850px){
    .hero,
    .grid2,
    .districtList,
    .rowsCompact{
        grid-template-columns:1fr;
    }

    .tempBig{
        font-size:46px;
    }
}

@media (max-width:560px){
    .header{
        flex-direction:column;
        align-items:flex-start;
    }

    .tempBig{
        font-size:42px;
    }

    .windHero{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<div class="header">
    <div><b>Погода сейчас</b></div>
    <div class="nav">
        <a href="index.html">Рейтинг</a>
        <a href="forecast.html">Прогноз</a>
    </div>
</div>

<div class="container">

    <div id="synopBlock" class="card">Загрузка SYNOP...</div>

    <div class="grid2">
        <div class="card">
            <div class="cardTitle">Обновление SYNOP</div>
            <div id="synopLog" class="small logbox"></div>
            <div class="buttons">
                <button onclick="loadSynopUI()">Обновить SYNOP</button>
            </div>
        </div>

        <div class="card">
            <div class="cardTitle">Обновление районов</div>
            <div id="districtsLog" class="small logbox"></div>
            <div class="buttons">
                <button onclick="loadDistrictsUI()">Обновить районы</button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="cardTitle">Погода по районам</div>
        <div id="districts">Загрузка районов...</div>
    </div>

</div>

<script>
// ========================================
// 1. ЛОГИ
// ========================================
function logTo(elId, msg){
    const el = document.getElementById(elId);
    if(!el) return;
    const time = new Date().toLocaleTimeString("ru-RU");
    el.innerHTML += `[${time}] ${msg}<br>`;
    console.log(msg);
}

function clearLogLater(elId, delay = 7000){
    setTimeout(()=>{
        const el = document.getElementById(elId);
        if(el) el.innerHTML = "";
    }, delay);
}

// ========================================
// 2. ВСПОМОГАТЕЛЬНОЕ
// ========================================
function tempColor(t){
    if(t == null) return "#eee";
    if(t < 0) return "#4da3ff";
    if(t < 10) return "#90caf9";
    if(t < 20) return "#81c784";
    if(t < 30) return "#ffb74d";
    return "#ff5252";
}

function windArrow(deg){
    if(deg == null) return "";
    return `<span style="display:inline-block;transform:rotate(${deg}deg);font-size:18px;">↑</span>`;
}

function degToText(d){
    if(d == null) return "-";
    const dirs = ["С","СВ","В","ЮВ","Ю","ЮЗ","З","СЗ"];
    return dirs[Math.round(d / 45) % 8];
}

function pressureTrendText(code){
    const map = {
        "0":"рост, затем падение",
        "1":"рост, затем стабильно",
        "2":"рост",
        "3":"падение/стабильно, затем рост",
        "4":"без изменений",
        "5":"падение, затем рост",
        "6":"падение",
        "7":"рост/стабильно, затем падение",
        "8":"неустойчиво"
    };
    return map[code] || "-";
}

function weatherText(code){
    if(!code) return "-";
    const map = {
        "00":"Ясно",
        "01":"Малооблачно",
        "02":"Переменная облачность",
        "03":"Пасмурно",
        "04":"Дымка",
        "05":"Мгла",
        "10":"Дымка",
        "45":"Туман",
        "48":"Туман с изморозью",
        "51":"Слабая морось",
        "53":"Морось",
        "55":"Сильная морось",
        "56":"Переохлаждённая морось",
        "57":"Сильная переохлаждённая морось",
        "61":"Слабый дождь",
        "63":"Дождь",
        "65":"Сильный дождь",
        "66":"Переохлаждённый дождь",
        "67":"Сильный переохлаждённый дождь",
        "71":"Слабый снег",
        "73":"Снег",
        "75":"Сильный снег",
        "77":"Снежные зёрна",
        "80":"Слабый ливень",
        "81":"Ливень",
        "82":"Сильный ливень",
        "85":"Слабый снежный заряд",
        "86":"Сильный снежный заряд",
        "95":"Гроза",
        "96":"Гроза с градом",
        "99":"Сильная гроза с градом"
    };
    return map[code] || `Код ${code}`;
}

function weatherCodeText(code){
    const map = {
        0:"Ясно",
        1:"Преимущественно ясно",
        2:"Переменная облачность",
        3:"Пасмурно",
        45:"Туман",
        48:"Туман с изморозью",
        51:"Слабая морось",
        53:"Морось",
        55:"Сильная морось",
        61:"Слабый дождь",
        63:"Дождь",
        65:"Сильный дождь",
        71:"Слабый снег",
        73:"Снег",
        75:"Сильный снег",
        77:"Снежные зёрна",
        80:"Слабый ливень",
        81:"Ливень",
        82:"Сильный ливень",
        85:"Слабый снежный заряд",
        86:"Сильный снежный заряд",
        95:"Гроза"
    };
    return map[code] || `Код ${code}`;
}

function cloudText(c){
    if(c == null) return "-";
    return `${c}/8`;
}

function cloudAmountText(n){
    const map = {
        0:"Ясно",
        1:"1/8 или меньше",
        2:"2/8",
        3:"3/8",
        4:"4/8",
        5:"5/8",
        6:"6/8",
        7:"7/8 или более",
        8:"8/8",
        9:"Небо не видно"
    };
    return map[n] || `${n}/8`;
}

function visibilityText(code){
    if(code == null) return "-";
    return code;
}

function formatSynopLocalTime(timeUTC){
    if(!timeUTC) return "-";

    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();

    const dt = new Date(Date.UTC(
        year,
        month,
        parseInt(timeUTC.day,10),
        parseInt(timeUTC.hour,10),
        0,
        0
    ));

    return dt.toLocaleString("ru-RU", {
        day:"2-digit",
        month:"2-digit",
        hour:"2-digit",
        minute:"2-digit"
    });
}

function formatLocalApiTime(s){
    if(!s) return "-";
    const [date,time] = s.split("T");
    return `${date} ${time}`;
}

// ========================================
// 3. SYNOP ЗАГРУЗКА
// ========================================
async function loadSynop(){
    const ogimet = "https://www.ogimet.com/display_synops2.php?lang=en&lugar=33837&tipo=ALL&ord=REV&nil=SI&fmt=txt";
    const url = "https://api.allorigins.win/raw?url=" + encodeURIComponent(ogimet);

    const controller = new AbortController();
    const timeout = setTimeout(()=>controller.abort(), 25000);

    let r;
    try{
        r = await fetch(url,{signal:controller.signal});
    }catch(e){
        throw "Ошибка сети или таймаут";
    }

    clearTimeout(timeout);

    const text = await r.text();
    const line = text.split("\n").find(l => l.includes("AAXX"));
    if(!line) throw "SYNOP не найден";

    return parseSynop(line);
}

// ========================================
// 4. ПАРСИНГ SYNOP
// ========================================
function parseSynop(line){
    const parts = line.trim().split(/\s+/);
    const aaxxIndex = parts.indexOf("AAXX");

    if(aaxxIndex === -1){
        throw "В строке нет AAXX";
    }

    const yyggiw = parts[aaxxIndex + 1] || null;
    const station = parts[aaxxIndex + 2] || null;
    const iRiXhVV = parts[aaxxIndex + 3] || null;
    const Nddff = parts[aaxxIndex + 4] || null;
    const g1 = parts[aaxxIndex + 5] || null;
    const g2 = parts[aaxxIndex + 6] || null;
    const g3 = parts[aaxxIndex + 7] || null;
    const g4 = parts[aaxxIndex + 8] || null;
    const g5 = parts[aaxxIndex + 9] || null;

    let timeUTC = null;
    let precipIndicator = null;
    let stationType = null;
    let cloudBase = null;
    let visibility = null;
    let cloud = null;
    let windDir = null;
    let wind = null;
    let temp = null;
    let dew = null;
    let pressureStation = null;
    let pressureSea = null;
    let pressureTrendCode = null;
    let pressureTrendValue = null;
    let precipGroup = null;
    let weatherNow = null;
    let weatherBetween = null;
    let cloudGroup = null;

    if(yyggiw && yyggiw.length >= 5){
        timeUTC = {
            day: yyggiw.slice(0,2),
            hour: yyggiw.slice(2,4),
            iw: yyggiw.slice(4,5),
            raw: yyggiw
        };
        precipIndicator = yyggiw[4];
    }

    if(iRiXhVV && iRiXhVV.length === 5){
        stationType = iRiXhVV[0];
        cloudBase = iRiXhVV[2];
        visibility = iRiXhVV.slice(3,5);
    }

    if(Nddff && Nddff.length === 5){
        cloud = Nddff[0] !== "/" ? parseInt(Nddff[0],10) : null;
        windDir = Nddff.slice(1,3).includes("/") ? null : parseInt(Nddff.slice(1,3),10) * 10;
        wind = Nddff.slice(3,5).includes("/") ? null : parseInt(Nddff.slice(3,5),10);
    }

    if(g1 && g1.startsWith("1") && g1.length === 5){
        temp = (g1[1] === "1" ? -1 : 1) * parseInt(g1.slice(2),10) / 10;
    }

    if(g2 && g2.startsWith("2") && g2.length === 5){
        dew = (g2[1] === "1" ? -1 : 1) * parseInt(g2.slice(2),10) / 10;
    }

    if(g3 && g3.startsWith("3") && g3.length === 5){
        const p = parseInt(g3.slice(1),10) / 10;
        pressureStation = p < 100 ? 1000 + p : 900 + p;
    }

    if(g4 && g4.startsWith("4") && g4.length === 5){
        const p = parseInt(g4.slice(1),10) / 10;
        pressureSea = p < 500 ? 1000 + p : 900 + p;
    }

    if(g5 && g5.startsWith("5") && g5.length === 5){
        pressureTrendCode = g5[1];
        pressureTrendValue = parseInt(g5.slice(2),10) / 10;
    }

    let ptr = aaxxIndex + 10;

    if(parts[ptr] && parts[ptr].startsWith("6")){
        precipGroup = parts[ptr];
        ptr++;
    }

    if(parts[ptr] && parts[ptr].startsWith("7")){
        weatherNow = parts[ptr].slice(1,3);
        weatherBetween = parts[ptr].slice(3,5);
        ptr++;
    }

    if(parts[ptr] && parts[ptr].startsWith("8")){
        cloudGroup = parts[ptr];
        ptr++;
    }

    let cloudLow = null;
    let cloudMid = null;
    let cloudHigh = null;

    if(cloudGroup && cloudGroup.length === 5){
        cloudLow = cloudGroup[2];
        cloudMid = cloudGroup[3];
        cloudHigh = cloudGroup[4];
    }

    return {
        raw: line,
        station,
        timeUTC,
        precipIndicator,
        stationType,
        cloudBase,
        visibility,
        cloud,
        windDir,
        wind,
        temp,
        dew,
        pressureStation,
        pressureSea,
        pressureTrendCode,
        pressureTrendValue,
        precipGroup,
        weatherNow,
        weatherBetween,
        cloudGroup,
        cloudLow,
        cloudMid,
        cloudHigh
    };
}

// ========================================
// 5. ОТРИСОВКА SYNOP
// ========================================
function renderSynop(d){
    const apparent = (d.temp != null && d.wind != null)
        ? Math.round((d.temp - (d.wind * 0.7)) * 10) / 10
        : null;

    document.getElementById("synopBlock").innerHTML = `
        <div class="hero">
            <div class="mainTemp">
                <div class="mainTempTop">
                    Станция ${d.station ?? "-"} · Наблюдение: ${formatSynopLocalTime(d.timeUTC)}
                </div>

                <div class="tempLine">
                    <div class="tempBig" style="color:${tempColor(d.temp)}">${d.temp ?? "-"}°C</div>
                    <div class="tempFeel">ощущается как ${apparent ?? "-"}°C</div>
                </div>

                <div class="weatherLine">
                    <span class="badge">${weatherText(d.weatherNow)}</span>
                </div>

                <div class="windHero">
                    <div class="miniStat">
                        <div class="miniLabel">Ветер</div>
                        <div class="miniValue">
                            ${d.wind ?? "-"} м/с
                            ${d.windDir != null ? degToText(d.windDir) : ""}
                            ${windArrow(d.windDir)}
                        </div>
                    </div>

                    <div class="miniStat">
                        <div class="miniLabel">Точка росы</div>
                        <div class="miniValue">${d.dew ?? "-"}°C</div>
                    </div>
                </div>
            </div>

            <div class="card" style="margin:0;">
                <div class="cardTitle">Основное</div>
                <div class="rowsCompact">
                    <div class="stat">
                        <div class="label">Давление MSL</div>
                        <div class="value">${d.pressureSea ?? "-"} гПа</div>
                    </div>

                    <div class="stat">
                        <div class="label">Давление станции</div>
                        <div class="value">${d.pressureStation ?? "-"} гПа</div>
                    </div>

                    <div class="stat">
                        <div class="label">Облачность</div>
                        <div class="value">${cloudText(d.cloud)}</div>
                    </div>

                    <div class="stat">
                        <div class="label">Видимость</div>
                        <div class="value">${visibilityText(d.visibility)}</div>
                    </div>

                    <div class="stat">
                        <div class="label">Тенденция давления</div>
                        <div class="value">${pressureTrendText(d.pressureTrendCode)}</div>
                    </div>

                    <div class="stat">
                        <div class="label">Изменение за 3 часа</div>
                        <div class="value">${d.pressureTrendValue ?? "-"} гПа</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid2" style="margin-top:14px;">
            <details open>
                <summary>Полная расшифровка SYNOP</summary>
                <div class="rowsCompact" style="margin-top:12px;">
                    <div class="stat">
                        <div class="label">YYGGiw</div>
                        <div class="value">${d.timeUTC?.raw ?? "-"}</div>
                    </div>

                    <div class="stat">
                        <div class="label">Код станции</div>
                        <div class="value">${d.station ?? "-"}</div>
                    </div>

                    <div class="stat">
                        <div class="label">iRiXhVV</div>
                        <div class="value">${d.stationType ?? "-"} / h=${d.cloudBase ?? "-"} / VV=${d.visibility ?? "-"}</div>
                    </div>

                    <div class="stat">
                        <div class="label">Nddff</div>
                        <div class="value">${d.cloud ?? "-"} / ${d.windDir ?? "-"}° / ${d.wind ?? "-"} м/с</div>
                    </div>

                    <div class="stat">
                        <div class="label">Температура (1snTTT)</div>
                        <div class="value">${d.temp ?? "-"}°C</div>
                    </div>

                    <div class="stat">
                        <div class="label">Точка росы (2snTdTdTd)</div>
                        <div class="value">${d.dew ?? "-"}°C</div>
                    </div>

                    <div class="stat">
                        <div class="label">Давление станции (3PoPoPoPo)</div>
                        <div class="value">${d.pressureStation ?? "-"} гПа</div>
                    </div>

                    <div class="stat">
                        <div class="label">Давление MSL (4PPPP)</div>
                        <div class="value">${d.pressureSea ?? "-"} гПа</div>
                    </div>

                    <div class="stat">
                        <div class="label">Тенденция (5appp)</div>
                        <div class="value">${pressureTrendText(d.pressureTrendCode)} · ${d.pressureTrendValue ?? "-"} гПа</div>
                    </div>

                    <div class="stat">
                        <div class="label">Осадки (группа 6)</div>
                        <div class="value">${d.precipGroup ?? "нет"}</div>
                    </div>

                    <div class="stat">
                        <div class="label">Явления в срок (группа 7)</div>
                        <div class="value">${weatherText(d.weatherNow)}</div>
                    </div>

                    <div class="stat">
                        <div class="label">Между сроками</div>
                        <div class="value">${d.weatherBetween ?? "-"}</div>
                    </div>

                    <div class="stat">
                        <div class="label">Группа облачности (8NhCLCMCH)</div>
                        <div class="value">${d.cloudGroup ?? "нет"}</div>
                    </div>

                    <div class="stat">
                        <div class="label">Количество общей облачности</div>
                        <div class="value">${d.cloud != null ? cloudAmountText(d.cloud) : "-"}</div>
                    </div>

                    <div class="stat">
                        <div class="label">Облака нижнего яруса</div>
                        <div class="value">${d.cloudLow ?? "-"}</div>
                    </div>

                    <div class="stat">
                        <div class="label">Облака среднего яруса</div>
                        <div class="value">${d.cloudMid ?? "-"}</div>
                    </div>

                    <div class="stat">
                        <div class="label">Облака верхнего яруса</div>
                        <div class="value">${d.cloudHigh ?? "-"}</div>
                    </div>
                </div>

                <div class="small raw"><b>Исходная строка:</b><br>${d.raw}</div>
            </details>

            <details>
                <summary>Технические данные</summary>
                <div class="rowsCompact" style="margin-top:12px;">
                    <div class="stat">
                        <div class="label">Индикатор осадков (iw)</div>
                        <div class="value">${d.precipIndicator ?? "-"}</div>
                    </div>

                    <div class="stat">
                        <div class="label">Нижняя граница облаков (h)</div>
                        <div class="value">${d.cloudBase ?? "-"}</div>
                    </div>

                    <div class="stat">
                        <div class="label">Видимость (VV)</div>
                        <div class="value">${d.visibility ?? "-"}</div>
                    </div>

                    <div class="stat">
                        <div class="label">Направление ветра</div>
                        <div class="value">${d.windDir ?? "-"}° ${d.windDir != null ? degToText(d.windDir) : ""}</div>
                    </div>
                </div>
            </details>
        </div>
    `;
}

// 6. UI SYNOP
// ========================================
async function loadSynopUI(){
    const logId = "synopLog";
    document.getElementById(logId).innerHTML = "";

    try{
        logTo(logId,"Старт загрузки SYNOP");
        logTo(logId,"Подготовка URL Ogimet");
        logTo(logId,"Отправка запроса на прокси");

        const synop = await loadSynop();

        logTo(logId,"Ответ получен");
        logTo(logId,"Разбор SYNOP");

        logTo(logId,"SYNOP успешно отображён");

        clearLogLater(logId);

        logTo(logId,"Ошибка: " + e);

}

// ========================================
// 7. РАЙОНЫ
// ========================================
const locations = {
    "Котовского": [46.560, 30.800],
    "Центр": [46.482, 30.723],
    "Таирова": [46.400, 30.650],
    "Аркадия": [46.430, 30.760],
    "Застава": [46.520, 30.650]
};

async function loadCurrentWeather(lat, lon){
    const today = new Date().toISOString().slice(0,10);

    const url =
        `https://api.open-meteo.com/v1/forecast` +
        `?latitude=${lat}` +
        `&longitude=${lon}` +
        `&current=temperature_2m,weather_code,cloud_cover,pressure_msl,wind_speed_10m,wind_direction_10m,wind_gusts_10m,precipitation,is_day,relative_humidity_2m,rain,apparent_temperature,showers,snowfall,surface_pressure` +
        `&timezone=auto` +
        `&wind_speed_unit=ms` +
        `&start_date=${today}` +
        `&end_date=${today}`;

    const r = await fetch(url);
    const d = await r.json();

    if(!d.current){
        throw new Error("Нет current в ответе Open-Meteo");
    }

    return d.current;
}

function renderDistricts(results){
    let html = `<div class="districtList">`;

    results.forEach(({name,w})=>{
        const hasPrecip = (w.precipitation > 0 || w.rain > 0 || w.showers > 0 || w.snowfall > 0);

        html += `
            <div class="districtCard">
                <div class="districtHead">
                    <div>
                        <div class="districtName">${name}</div>
                        <div class="small">${formatLocalApiTime(w.time)}</div>
                    </div>
                    <div class="districtTemp">${w.temperature_2m ?? "-"}°C</div>
                </div>

                <div class="line2">
                    <div>Ощущается</div>
                    <div>${w.apparent_temperature ?? "-"}°C</div>
                </div>

                <div class="line2">
                    <div>Погода</div>
                    <div>${weatherCodeText(w.weather_code)}</div>
                </div>

                <div class="line2">
                    <div>Ветер</div>
                    <div>
                        ${w.wind_speed_10m ?? "-"} м/с
                        ${w.wind_direction_10m != null ? degToText(w.wind_direction_10m) : ""}
                        ${windArrow(w.wind_direction_10m)}
                    </div>
                </div>

                <div class="line2">
                    <div>Порывы</div>
                    <div>${w.wind_gusts_10m ?? "-"} м/с</div>
                </div>

                <div class="line2">
                    <div>Давление</div>
                    <div>${w.pressure_msl ?? "-"} гПа</div>
                </div>

                <div class="line2">
                    <div>Облачность</div>
                    <div>${w.cloud_cover ?? "-"}%</div>
                </div>

                <div class="line2">
                    <div>Влажность</div>
                    <div>${w.relative_humidity_2m ?? "-"}%</div>
                </div>

                ${hasPrecip ? `
                <div class="line2">
                    <div>Осадки</div>
                    <div>
                        ${w.precipitation ?? 0} мм
                        ${w.rain > 0 ? ` · дождь ${w.rain} мм` : ""}
                        ${w.showers > 0 ? ` · ливень ${w.showers} мм` : ""}
                        ${w.snowfall > 0 ? ` · снег ${w.snowfall} мм` : ""}
                    </div>
                </div>
                ` : ""}
            </div>
        `;
    });

    html += `</div>`;
    document.getElementById("districts").innerHTML = html;
}

async function loadDistrictsUI(){
    const logId = "districtsLog";
    document.getElementById(logId).innerHTML = "";
    document.getElementById("districts").innerHTML = "Загрузка районов...";

    try{
        logTo(logId,"Старт загрузки районов");
        logTo(logId,"Подготовка координат");
        logTo(logId,"Отправка запросов в Open-Meteo");

        const entries = Object.entries(locations);

        const results = await Promise.all(
            entries.map(async ([name,coords])=>{
                const [lat,lon] = coords;
                const w = await loadCurrentWeather(lat,lon);
                return {name,w};
            })
        );

        logTo(logId,"Данные районов получены");
        renderDistricts(results);
        logTo(logId,"Карточки районов построены");

        clearLogLater(logId);
    }catch(e){
        document.getElementById("districts").innerHTML = `<div class="small">Ошибка загрузки районов: ${e}</div>`;
        logTo(logId,"Ошибка: " + e);
    }
}

// ========================================
// 8. СТАРТ
// ========================================
loadSynopUI();
loadDistrictsUI();

setInterval(loadSynopUI, 1800000);
setInterval(loadDistrictsUI, 900000);
</script>
