function logTo(elId, msg){
    const el = document.getElementById(elId);

    const time = new Date().toLocaleTimeString("ru-RU");
    el.innerHTML += `[${time}] ${msg}<br>`;
    console.log(msg);
}

function clearLogLater(elId, delay = 5000){
    const el = document.getElementById(elId);
    if(!el) return;

    el.classList.remove("fadeout");

    setTimeout(()=>{
        el.classList.add("fadeout");

        setTimeout(()=>{
            el.innerHTML = "";
            el.classList.remove("fadeout");
        }, 800);
    }, delay);
}

function formatSynopLocalTime(timeUTC){
    if(!timeUTC) return "-";

    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();

    const dt = new Date(Date.UTC(
        year,
        month,
        parseInt(timeUTC.day,10),
        parseInt(timeUTC.hour,10),
        0,
        0
    ));

    return dt.toLocaleString("ru-RU", {
        day:"2-digit",
        month:"2-digit",
        hour:"2-digit",
        minute:"2-digit"
    });
}

function formatLocalApiTime(s){
    if(!s) return "-";
    const [date,time] = s.split("T");
    return `${date} ${time}`;

// 3. SYNOP ЗАГРУЗКА
// ========================================
async function loadSynop(){
    const ogimet = "https://www.ogimet.com/display_synops2.php?lang=en&lugar=33837&tipo=ALL&ord=REV&nil=SI&fmt=txt";
    const url = "https://api.allorigins.win/raw?url=" + encodeURIComponent(ogimet);

    const controller = new AbortController();
    const timeout = setTimeout(()=>controller.abort(), 25000);

    let r;
    try{
        r = await fetch(url,{signal:controller.signal});
    }catch(e){
        throw "Ошибка сети или таймаут";
    }

    clearTimeout(timeout);

    const text = await r.text();
    const line = text.split("\n").find(l => l.includes("AAXX"));
    if(!line) throw "SYNOP не найден";

    const sec333 = [];
    const sec555 = [];

    const i333 = parts.indexOf("333");
    const i555 = parts.indexOf("555");

    if(i333 !== -1){
        const end333 = i555 !== -1 && i555 > i333 ? i555 : parts.length;
        for(let i = i333 + 1; i < end333; i++){
            sec333.push(parts[i]);
        }
    }

    if(i555 !== -1){
        for(let i = i555 + 1; i < parts.length; i++){
            sec555.push(parts[i]);
        }
    }
    
    return parseSynop(line,sec333,
        sec555);
}

// ========================================
// 4. ПАРСИНГ SYNOP
// ========================================
function parseSynop(line){

    const parts = line.trim().split(/\s+/);

    let temp = null;
    let dew = null;
    let pressureStation = null;
    let pressureSea = null;
    let wind = null;
    let windDir = null;

    let cloud = null;
    let cloudBase = null;
    let visibility = null;

    let weatherNow = null;
    let weatherBetween = null;

    let pressureTrendCode = null;
    let pressureTrendValue = null;

    let precipGroup = null;
    let precipIndicator = null;

    let cloudGroup = null;
    let cloudLow = null;
    let cloudMid = null;
    let cloudHigh = null;

    let sec333 = [];
    let sec555 = [];

    const aaxxIndex = parts.indexOf("AAXX");

    if(aaxxIndex === -1){
        throw "AAXX не найден";
    }

    // ===== время наблюдения =====
    let time = null;
    if(parts[aaxxIndex + 1]){
        const t = parts[aaxxIndex + 1];
        time = {
            day: t.slice(0,2),
            hour: t.slice(2,4),
            windUnits: t.slice(4,5)
        };
        precipIndicator = t.slice(4,5);
    }

    // ===== базовые обязательные группы =====
    // после AAXX:
    // +1 ddhhiw
    // +2 station
    // +3 iRiXhVV
    // +4 Nddff

    const group3 = parts[aaxxIndex + 3];
    const group4 = parts[aaxxIndex + 4];

    if(group3 && /^\d{5}$/.test(group3)){
        cloudBase = group3.slice(3,4);
        visibility = group3.slice(4,5) === "/" ? null : group3.slice(3,5);
        // правильнее:
        visibility = group3.slice(3,5);
    }

    if(group4 && /^\d{5}$/.test(group4)){
        cloud = group4.slice(0,1);
        windDir = parseInt(group4.slice(1,3), 10) * 10;
        wind = parseInt(group4.slice(3,5), 10);
    }

    // ===== основной блок до 333 / 555 =====
    let sectionEnd = parts.length;
    const idx333 = parts.indexOf("333");
    const idx555 = parts.indexOf("555");

    if(idx333 !== -1 && idx333 < sectionEnd) sectionEnd = idx333;
    if(idx555 !== -1 && idx555 < sectionEnd) sectionEnd = idx555;

    for(let i = aaxxIndex + 5; i < sectionEnd; i++){
        const g = parts[i];

        if(!g || g.length < 5) continue;

        if(g.startsWith("1") && temp === null){
            const sign = g[1] === "1" ? -1 : 1;
            temp = sign * parseInt(g.slice(2), 10) / 10;
            continue;
        }

        if(g.startsWith("2") && dew === null){
            const sign = g[1] === "1" ? -1 : 1;
            dew = sign * parseInt(g.slice(2), 10) / 10;
            continue;
        }

        if(g.startsWith("3") && pressureStation === null){
            const p = parseInt(g.slice(1), 10) / 10;
            pressureStation = p < 500 ? 1000 + p : 900 + p;
            continue;
        }

        if(g.startsWith("4") && pressureSea === null){
            const p = parseInt(g.slice(1), 10) / 10;
            pressureSea = p < 500 ? 1000 + p : 900 + p;
            continue;
        }

        if(g.startsWith("5") && pressureTrendCode === null){
            pressureTrendCode = g.slice(1,2);
            pressureTrendValue = parseInt(g.slice(2), 10) / 10;
            continue;
        }

        if(g.startsWith("6") && precipGroup === null){
            precipGroup = g;
            continue;
        }

        if(g.startsWith("7") && weatherNow === null){
            weatherNow = g.slice(1,3);
            weatherBetween = g.slice(3,5);
            continue;
        }

        if(g.startsWith("8") && cloudGroup === null){
            cloudGroup = g;
            cloudLow = g.slice(2,3);
            cloudMid = g.slice(3,4);
            cloudHigh = g.slice(4,5);
            continue;
        }
    }

    // ===== секции 333 и 555 =====
    if(idx333 !== -1){
        const end333 = (idx555 !== -1 && idx555 > idx333) ? idx555 : parts.length;
        sec333 = parts.slice(idx333 + 1, end333);
    }

    if(idx555 !== -1){
        sec555 = parts.slice(idx555 + 1);
    }

    return {
        raw: line,
        parts,

        time,
        temp,
        dew,

        pressureStation,
        pressureSea,

        wind,
        windDir,

        cloud,
        cloudBase,
        visibility,

        weatherNow,
        weatherBetween,

        pressureTrendCode,
        pressureTrendValue,

        precipGroup,
        precipIndicator,

        cloudGroup,
        cloudLow,
        cloudMid,
        cloudHigh,

        sec333,
        sec555
    };
}

// ≠=======================================
// отрисовка температуры районов
// ========================================
function tempClass(t){
    if(t == null) return "";
    if(t < 0) return "cold";
    if(t < 10) return "cool";
    if(t < 20) return "mild";
    if(t < 30) return "warm";
    return "hot";
}

const locations = {
    "Котовского": [46.560, 30.800],
    "Центр": [46.482, 30.723],
    "Таирова": [46.400, 30.650],
    "Аркадия": [46.430, 30.760],
    "Застава": [46.520, 30.650]
};

async function loadCurrentWeather(lat, lon){
    const today = new Date().toISOString().slice(0,10);

    const url =
        `https://api.open-meteo.com/v1/forecast` +
        `?latitude=${lat}` +
        `&longitude=${lon}` +
        `&current=temperature_2m,weather_code,cloud_cover,pressure_msl,wind_speed_10m,wind_direction_10m,wind_gusts_10m,precipitation,is_day,relative_humidity_2m,rain,apparent_temperature,showers,snowfall,surface_pressure` +
        `&timezone=auto` +
        `&wind_speed_unit=ms` +
        `&start_date=${today}` +
        `&end_date=${today}`;

    const r = await fetch(url);
    const d = await r.json();

    if(!d.current){
        throw new Error("Нет current в ответе Open-Meteo");
    }

    return d.current;
}

function renderDistricts(results){
    let html = `<div class="districtList">`;

    results.forEach(({name,w})=>{
        const hasPrecip = (w.precipitation > 0 || w.rain > 0 || w.showers > 0 || w.snowfall > 0);

        html += `
            <div class="districtCard">
                <div class="districtHead">
                    <div>
                        <div class="districtName">${name}</div>
                        <div class="small">${formatLocalApiTime(w.time)}</div>
                    </div>
                    <div class="districtTemp ${tempClass(w.temperature_2m)}">${w.temperature_2m ?? "-"}°C</div>
                </div>

                <div class="line2">
                    <div>Ощущается</div>
                    <div>${w.apparent_temperature ?? "-"}°C</div>
                </div>

                <div class="line2">
                    <div>Погода</div>
                    <div>${weatherCodeText(w.weather_code)}</div>
                </div>

                <div class="line2">
                    <div>Ветер</div>
                    <div>
                        ${w.wind_speed_10m ?? "-"} м/с
                        ${w.wind_direction_10m != null ? degToText(w.wind_direction_10m) : ""}
                        ${windArrow(w.wind_direction_10m)}
                    </div>
                </div>

                <div class="line2">
                    <div>Порывы</div>
                    <div>${w.wind_gusts_10m ?? "-"} м/с</div>
                </div>

                <div class="line2">
                    <div>Давление</div>
                    <div>${w.pressure_msl ?? "-"} гПа</div>
                </div>

                <div class="line2">
                    <div>Облачность</div>
                    <div>${w.cloud_cover ?? "-"}%</div>
                </div>

                <div class="line2">
                    <div>Влажность</div>
                    <div>${w.relative_humidity_2m ?? "-"}%</div>
                </div>

                ${hasPrecip ? `
                <div class="line2">
                    <div>Осадки</div>
                    <div>
                        ${w.precipitation ?? 0} мм
                        ${w.rain > 0 ? ` · дождь ${w.rain} мм` : ""}
                        ${w.showers > 0 ? ` · ливень ${w.showers} мм` : ""}
                        ${w.snowfall > 0 ? ` · снег ${w.snowfall} мм` : ""}
                    </div>
                </div>
                ` : ""}
            </div>
        `;
    });

    html += `</div>`;
    document.getElementById("districts").innerHTML = html;
}

async function loadDistrictsUI(){
    const logId = "districtsLog";
    document.getElementById(logId).innerHTML = "";
    document.getElementById("districts").innerHTML = "Загрузка районов...";

    try{
        logTo(logId,"Старт загрузки районов");
        logTo(logId,"Подготовка координат");
        logTo(logId,"Отправка запросов в Open-Meteo");

        const entries = Object.entries(locations);

        const results = await Promise.all(
            entries.map(async ([name,coords])=>{
                const [lat,lon] = coords;
                const w = await loadCurrentWeather(lat,lon);
                return {name,w};
            })
        );

        logTo(logId,"Данные районов получены");
        renderDistricts(results);
        logTo(logId,"Карточки районов построены");

        clearLogLater(logId);
    }catch(e){
        document.getElementById("districts").innerHTML = `<div class="small">Ошибка загрузки районов: ${e}</div>`;
        logTo(logId,"Ошибка: " + e);
    }
}

loadDistrictsUI();

setInterval(loadSynopUI, 1800000);
