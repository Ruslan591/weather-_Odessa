<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Текущая погода</title>
<link rel="stylesheet" href="current_weather.css">
</head>
<body>

<!-- Верхняя панель -->
<div class="header">
    <div class="headerTitle">Погода сейчас</div>
    <div class="nav">
        <a href="forecast.html">Прогноз</a>
        <a href="index.html">Рейтинг</a>
    </div>
</div>

<div class="container">

    <!-- Кнопки обновления -->
    <div class="card">
        <div class="btnRow">
            <button onclick="loadSynopUI()">Обновить SYNOP</button>
            <button onclick="loadDistrictsUI()">Обновить районы</button>
        </div>
    </div>

    <!-- Логи -->
    <div id="synopLogBox" class="card logBox hidden">
        <div class="cardTitle">Загрузка SYNOP</div>
        <div id="synopLog"></div>
    </div>
    <div id="districtsLogBox" class="card logBox hidden">
        <div class="cardTitle">Загрузка районов</div>
        <div id="districtsLog"></div>
    </div>

    <!-- Основные карточки -->
    <div id="main" class="card">Загрузка SYNOP...</div>
    <div id="districts" class="card">Загрузка районов...</div>
</div>

<script>
/* =========================================================
   Настройки
========================================================= */
const STATION_CODE = "33837";
const locations = {
    "пос. Котовского": [46.560, 30.800],
    "Центр": [46.482, 30.723],
    "Таирова": [46.400, 30.650],
    "Аркадия": [46.430, 30.760],
    "Застава": [46.520, 30.650]
};

/* =========================================================
   Утилиты
========================================================= */
function escapeHtml(str){
    if(str == null) return "";
    return String(str).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
}

function tempClass(t){
    if(t == null) return "";
    if(t < 0) return "tempCold";
    if(t < 10) return "tempCool";
    if(t < 20) return "tempMild";
    if(t < 30) return "tempWarm";
    return "tempHot";
}

function fmt1(v, unit=""){
    if(v == null || Number.isNaN(v)) return "-";
    return `${Number(v).toFixed(1)}${unit}`;
}

function fmt0(v, unit=""){
    if(v == null || Number.isNaN(v)) return "-";
    return `${Math.round(Number(v))}${unit}`;
}

function safeNum(v){
    const n = Number(v);
    return Number.isFinite(n) ? n : null;
}

function signedTenths(group){
    if(!group || group.length !== 5) return null;
    const sign = group[1] === "1" ? -1 : 1;
    const val = parseInt(group.slice(2), 10);
    if(Number.isNaN(val)) return null;
    return sign * val / 10;
}

function localTimeFromSynopYYGGi(yyggi){
    if(!yyggi || yyggi.length < 4) return "-";
    const day = parseInt(yyggi.slice(0,2),10);
    const hour = parseInt(yyggi.slice(2,4),10);
    if(Number.isNaN(day) || Number.isNaN(hour)) return "-";

    const now = new Date();
    const year = now.getUTCFullYear();
    const month = now.getUTCMonth();
    const utcDate = new Date(Date.UTC(year, month, day, hour, 0, 0));
    const local = new Date(utcDate.getTime() + 2 * 3600 * 1000);
    return `${String(local.getUTCDate()).padStart(2,"0")}.${String(local.getUTCMonth()+1).padStart(2,"0")} ${String(local.getUTCHours()).padStart(2,"0")}:00 местное`;
}

/* =========================================================
   Логи
========================================================= */
function showLogBox(boxId){ document.getElementById(boxId)?.classList.remove("hidden"); }
function hideLogBoxLater(boxId, delay=2600){ setTimeout(()=>document.getElementById(boxId)?.classList.add("hidden"), delay); }
function clearLog(logId){ const el=document.getElementById(logId); if(el) el.innerHTML=""; }
function logTo(logId, msg){ 
    const el = document.getElementById(logId); 
    if(!el) return;
    const line = document.createElement("div"); 
    line.className="logLine"; 
    line.textContent=msg; 
    el.appendChild(line);
}

/* =========================================================
   Парсинг SYNOP
========================================================= */
function parseSynop(line){
    const parts=line.trim().split(/\s+/);
    const aaxxIndex=parts.indexOf("AAXX");
    if(aaxxIndex===-1) throw new Error("AAXX не найден");
    const yyggi = parts[aaxxIndex+1];
    const bodyGroups = parts.slice(aaxxIndex+5);
    let temp=null;
    for(const g of bodyGroups){
        if(/^1\d{4}$/.test(g)) temp=signedTenths(g);
    }
    return { temp, obsHour: localTimeFromSynopYYGGi(yyggi) };
}

/* =========================================================
   UI SYNOP
========================================================= */
async function loadSynopUI(){
    showLogBox("synopLogBox");
    clearLog("synopLog");
    logTo("synopLog","Старт загрузки SYNOP");

    try{
        const url=`https://www.ogimet.com/display_synops2.php?lang=en&lugar=${STATION_CODE}&tipo=ALL&ord=REV&nil=SI&fmt=txt`;
        const res=await fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(url));
        const text=await res.text();
        const lines=text.split("\n").filter(l=>l.trim());
        const data=parseSynop(lines.find(l=>l.includes("AAXX")));
        document.getElementById("main").innerHTML=`Температура: <span class="${tempClass(data.temp)}">${fmt1(data.temp)}°C</span><br>Время наблюдения: ${data.obsHour}`;
        logTo("synopLog","SYNOP обновлён");
    } catch(e){
        logTo("synopLog","Ошибка: "+e.message);
    }
    hideLogBoxLater("synopLogBox");
}

/* =========================================================
   UI Районы
========================================================= */
async function loadDistrictsUI(){
    showLogBox("districtsLogBox");
    clearLog("districtsLog");
    logTo("districtsLog","Старт загрузки районов");
    // Симуляция
    setTimeout(()=>{
        document.getElementById("districts").innerHTML="Районы обновлены";
        logTo("districtsLog","Районы обновлены");
        hideLogBoxLater("districtsLogBox");
    },800);
}

/* =========================================================
   Автозапуск
========================================================= */
loadSynopUI();
loadDistrictsUI();
setInterval(loadSynopUI,30*60*1000);
setInterval(loadDistrictsUI,15*60*1000);
</script>

</body>
</html>
