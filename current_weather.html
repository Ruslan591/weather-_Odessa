<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Текущая погода</title>

<style>

body{
    background:#121212;
    color:#eee;
    font-family:sans-serif;
    margin:0;
}

/* --- верхняя панель --- */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 15px;
    background:#1e1e1e;
    position:sticky;
    top:0;
}

.nav a{
    margin-left:10px;
    color:#aaa;
    text-decoration:none;
}

.nav a:hover{
    color:#fff;
}

/* --- контейнер --- */
.container{
    padding:15px;
    max-width:600px;
    margin:auto;
}

/* --- карточки --- */
.card{
    background:#1e1e1e;
    border-radius:12px;
    padding:15px;
    margin-bottom:15px;
}

.row{
    display:flex;
    justify-content:space-between;
    padding:8px 0;
    border-bottom:1px solid #333;
}

.row:last-child{
    border-bottom:none;
}

.value{
    font-weight:bold;
}

/* --- крупные значения --- */
.big{
    font-size:28px;
    text-align:center;
    margin:10px 0;
}

/* --- мелкий текст --- */
.small{
    color:#aaa;
    font-size:12px;
}

/* кнопка */
button{
    width:100%;
    padding:10px;
    background:#333;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
    <div><b>Погода сейчас</b></div>
    <div class="nav">
        <a href="index.html">Рейтинг</a>
        <a href="forecast.html">Прогноз</a>
    </div>
</div>

<div class="container">

<div class="card" id="main">
Загрузка...
</div>

<div class="card">
<button onclick="load()">Обновить</button>
</div>

</div>

<script>

// ===== загрузка =====
async function load(){

    const el = document.getElementById("main");
    el.innerHTML = "Загрузка...";

    try{

        const ogimet =
        "https://www.ogimet.com/display_synops2.php?lang=en&lugar=33837&tipo=ALL&ord=REV&nil=SI&fmt=txt";

        const url = "https://api.allorigins.win/raw?url=" + encodeURIComponent(ogimet);

        const r = await fetch(url);
        const text = await r.text();

        const line = text.split("\n").find(l => l.includes("AAXX"));

        if(!line) throw "SYNOP не найден";

        const d = parseSynop(line);

        render(d);

    }catch(e){
        el.innerHTML = "Ошибка: " + e;
    }

}

// ===== парсинг =====
function parseSynop(line){

    const parts = line.trim().split(" ");

    let temp=null, dew=null, pressure=null;
    let wind=null, windDir=null;
    let weather=null, cloud=null;

    parts.forEach(g=>{

        if(g.startsWith("1")){
            const sign = g[1]==="1" ? -1 : 1;
            temp = sign * parseInt(g.slice(2))/10;
        }

        if(g.startsWith("2")){
            const sign = g[1]==="1" ? -1 : 1;
            dew = sign * parseInt(g.slice(2))/10;
        }

        if(g.startsWith("4")){
            pressure = 1000 + parseInt(g.slice(1))/10;
        }

        if(g.startsWith("7")){
            weather = g.slice(1,3);
        }

        if(g.startsWith("8")){
            cloud = g.slice(1,2);
        }

    });

    const aaxxi = parts.indexOf("AAXX");

    if(aaxxi>=0 && parts.length>aaxxi+4){
        const w = parts[aaxxi+4];
        windDir = parseInt(w.slice(1,3))*10;
        wind = parseInt(w.slice(3,5));
    }

    const time = parts[1]; // 16091

return {temp,dew,pressure,wind,windDir,weather,cloud,raw:line,time};

}

// ===== расшифровки =====
function weatherText(code){

    if(!code) return "-";

    const map = {
        "00":"Ясно",
        "01":"Малооблачно",
        "02":"Переменная облачность",
        "03":"Пасмурно",

        "45":"Туман",
        "48":"Туман с изморосью",

        "51":"Морось",
        "61":"Дождь",
        "63":"Сильный дождь",

        "71":"Снег",
        "73":"Сильный снег",

        "80":"Ливень",
        "95":"Гроза"
    };

    return map[code] || "Код " + code;
}
function formatTime(t){

    if(!t) return "-";

    const day = t.slice(0,2);
    const hour = t.slice(2,4);

    return `${day} число, ${hour}:00 UTC`;
}
function windArrow(deg){

    if(deg == null) return "";

    return `<span style="
        display:inline-block;
        transform:rotate(${deg}deg);
        font-size:18px;
    ">↑</span>`;
}

function tempColor(t){

    if(t == null) return "#eee";

    if(t < 0) return "#4da3ff";
    if(t < 10) return "#90caf9";
    if(t < 20) return "#81c784";
    if(t < 30) return "#ffb74d";

    return "#ff5252";
}

function cloudText(c){
    if(!c) return "-";
    return c + "/8";
}

function degToText(d){
    const dirs=["С","СВ","В","ЮВ","Ю","ЮЗ","З","СЗ"];
    return dirs[Math.round(d/45)%8];
}

// ===== вывод =====
function render(d){

    const el = document.getElementById("main");

    el.innerHTML = `

    <div class="small">Наблюдение: ${formatTime(d.time)}</div>
    <div class="big" style="color:${tempColor(d.temp)}">
    ${d.temp ?? "-"}°C
</div>

    <div class="row">
        <div>Ощущение (точка росы)</div>
        <div class="value">${d.dew ?? "-"}°C</div>
    </div>

    <div class="row">
        <div>Давление</div>
        <div class="value">${d.pressure ?? "-"} гПа</div>
    </div>

    <div class="row">
    <div>Ветер</div>
    <div class="value">
        ${d.wind ?? "-"} м/с 
        ${d.windDir ? degToText(d.windDir) : ""}
        ${windArrow(d.windDir)}
    </div>
</div>

    <div class="row">
        <div>Облачность</div>
        <div class="value">${cloudText(d.cloud)}</div>
    </div>

    <div class="row">
        <div>Явления</div>
        <div class="value">${weatherText(d.weather)}</div>
    </div>

    <div class="small">${d.raw}</div>
    `;
}

load();
setInterval(load, 1800000); // 30 мин

</script>

</body>
</html>
