function escapeHtml(str){
    if(str == null) return "";
    return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;");
}

function tempClass(t){
    if(t == null) return "";
    if(t < 0) return "tempCold";
    if(t < 10) return "tempCool";
    if(t < 20) return "tempMild";
    if(t < 30) return "tempWarm";
    return "tempHot";
}

function fmt1(v, unit=""){
    if(v == null || Number.isNaN(v)) return "-";
    return `${Number(v).toFixed(1)}${unit}`;
}

function fmt0(v, unit=""){
    if(v == null || Number.isNaN(v)) return "-";
    return `${Math.round(Number(v))}${unit}`;
}

function safeNum(v){
    const n = Number(v);
    return Number.isFinite(n) ? n : null;
}

function degToText(d) {
    if (d == null || Number.isNaN(d)) return "-";
    const dirs = ["С","ССВ","СВ","ВСВ","В","ВЮВ","ЮВ","ЮЮВ","Ю","ЮЮЗ","ЮЗ","ЗЮЗ","З","ЗСЗ","ССЗ","СССЗ"];
    return dirs[Math.round(d / 22.5) % 16];
}

function visibilityText(code){
    if(code == null) return "-";
    const n = Number(code);
    if(Number.isNaN(n)) return "-";

    if(n === 0) return "< 100 м";
    if(n >= 1 && n <= 50) return `${n * 100} м`;
    if(n >= 56 && n <= 80) return `${n - 50} км`;
    if(n >= 81 && n <= 88) return `${(n - 80) * 5 + 30} км`;
    if(n === 89) return "> 70 км";
    if(n === 90) return "< 50 м";
    if(n === 91) return "50 м";
    if(n === 92) return "200 м";
    if(n === 93) return "500 м";
    if(n === 94) return "1 км";
    if(n === 95) return "2 км";
    if(n === 96) return "4 км";
    if(n === 97) return "10 км";
    if(n === 98) return "20 км";
    if(n === 99) return "≥ 50 км";
    return "код " + code;
}

function pressureFromGroup(group4){
    if(!group4) return null;
    const p = parseInt(group4.slice(1), 10) / 10;
    if(Number.isNaN(p)) return null;
    return p < 500 ? 1000 + p : 900 + p;
}

function stationPressureFromGroup(group3){
    if(!group3) return null;
    const p = parseInt(group3.slice(1), 10) / 10;
    if(Number.isNaN(p)) return null;
    return p < 500 ? 1000 + p : 900 + p;
}

function signedTenths(group){
    if(!group || group.length !== 5) return null;
    const sign = group[1] === "1" ? -1 : 1;
    const val = parseInt(group.slice(2), 10);
    if(Number.isNaN(val)) return null;
    return sign * val / 10;
}

function localTimeFromSynopYYGGi(yyggi){
    if(!yyggi || yyggi.length < 4) return "-";
    const day = parseInt(yyggi.slice(0,2),10);
    const hour = parseInt(yyggi.slice(2,4),10);

    if(Number.isNaN(day) || Number.isNaN(hour)) return "-";

    const now = new Date();
    const year = now.getUTCFullYear();
    const month = now.getUTCMonth();

    const utcDate = new Date(Date.UTC(year, month, day, hour, 0, 0));

    const local = new Date(utcDate.getTime() + 2 * 3600 * 1000);

    const dd = String(local.getUTCDate()).padStart(2,"0");
    const mm = String(local.getUTCMonth() + 1).padStart(2,"0");
    const hh = String(local.getUTCHours()).padStart(2,"0");

    return `${dd}.${mm} ${hh}:00 местное`;
}

function formatAutoTime(isoString){
    if(!isoString) return "-";
    const d = new Date(isoString);
    if(Number.isNaN(d.getTime())) return "-";

    return d.toLocaleString("ru-RU",{
        day:"2-digit",
        month:"2-digit",
        hour:"2-digit",
        minute:"2-digit"
    });
}

// ===== Ощущается как =====
function calcRelativeHumidity(tempC, dewC){
    const t = Number(tempC);
    const td = Number(dewC);

    if(!Number.isFinite(t) || !Number.isFinite(td)) return null;

    const es = 6.112 * Math.exp((17.62 * t) / (243.12 + t));
    const e = 6.112 * Math.exp((17.62 * td) / (243.12 + td));
    const rh = (e / es) * 100;

    if(!Number.isFinite(rh)) return null;
    return Math.max(0, Math.min(100, rh));
}

function calcFeelsLike(tempC, windMs, dewC){
    const t = Number(tempC);
    const vMs = Number(windMs);
    const td = Number(dewC);

    if(!Number.isFinite(t)) return null;

    const rh = calcRelativeHumidity(t, td);

    /* Жара: heat index */
    if(Number.isFinite(rh) && t >= 27){
        const tf = t * 9/5 + 32;
        const hiF =
            -42.379 +
            2.04901523 * tf +
            10.14333127 * rh -
            0.22475541 * tf * rh -
            0.00683783 * tf * tf -
            0.05481717 * rh * rh +
            0.00122874 * tf * tf * rh +
            0.00085282 * tf * rh * rh -
            0.00000199 * tf * tf * rh * rh;

        const hiC = (hiF - 32) * 5/9;
        if(Number.isFinite(hiC)) return hiC;
    }

    /* Холод: wind chill */
    if(Number.isFinite(vMs)){
        const vKmh = vMs * 3.6;

        if(t <= 10 && vKmh > 4.8){
            const wc =
                13.12 +
                0.6215 * t -
                11.37 * Math.pow(vKmh, 0.16) +
                0.3965 * t * Math.pow(vKmh, 0.16);

            if(Number.isFinite(wc)) return wc;
        }
    }

    return t;
}

function showLogBox(boxId){
    const box = document.getElementById(boxId);
    if(!box) return;
    box.classList.remove("hidden");
}

function hideLogBoxLater(boxId, delay=2600){
    const box = document.getElementById(boxId);
    if(!box) return;

    setTimeout(()=>{
        box.classList.add("hidden");
    }, delay);
}

function clearLog(logId){
    const el = document.getElementById(logId);
    if(el) el.innerHTML = "";
}

function logTo(logId, msg){
    const el = document.getElementById(logId);
    if(!el) return;

    const line = document.createElement("div");
    line.className = "logLine";
    line.textContent = msg;
    el.appendChild(line);
}

/* =========================================================
   5. ПАРСИНГ SYNOP
========================================================= */
function parseSynop(line){
    const parts = line.trim().split(/\s+/);
    const aaxxIndex = parts.indexOf("AAXX");

    if(aaxxIndex === -1){
        throw new Error("AAXX не найден");
    }

    const yyggi = parts[aaxxIndex + 1] || null;
    const station = parts[aaxxIndex + 2] || null;
    const optionalCloudInstrument = parts[aaxxIndex + 3] || null;
    const windGroup = parts[aaxxIndex + 4] || null;

    const bodyGroups = [];
    let section333 = [];
    let section555 = [];
    let currentSection = "main";

    for(let i = aaxxIndex + 5; i < parts.length; i++){
        const g = parts[i];
        if(g === "333"){
            currentSection = "333";
            continue;
        }
        if(g === "555"){
            currentSection = "555";
            continue;
        }

        if(currentSection === "main") bodyGroups.push(g);
        else if(currentSection === "333") section333.push(g);
        else if(currentSection === "555") section555.push(g);
    }

    let temp = null;
    let dew = null;
    let stationPressure = null;
    let seaPressure = null;
    let tendencyCode = null;
    let tendencyValue = null;
    let precipGroup = null;
    let weatherNow = null;
    let weatherPast = null;
    let cloudGroup = null;

    for(const g of bodyGroups){
        if(/^1\d{4}$/.test(g)) temp = signedTenths(g);
        else if(/^2\d{4}$/.test(g)) dew = signedTenths(g);
        else if(/^3\d{4}$/.test(g)) stationPressure = stationPressureFromGroup(g);
        else if(/^4\d{4}$/.test(g)) seaPressure = pressureFromGroup(g);
        else if(/^5\d{4}/.test(g)){
            tendencyCode = g[1];
            tendencyValue = parseInt(g.slice(2),10) / 10;
        }
        else if(/^6\d{4}$/.test(g)) precipGroup = g;
        else if(/^7\d{4}$/.test(g)){
            weatherNow = g.slice(1,3);
            weatherPast = g.slice(3,5);
        }
        else if(/^8[\d/]{4}/.test(g)) cloudGroup = g;
    }

    let windDir = null;
    let windSpeed = null;
    let totalCloud = null;
    let lowCloudBase = null;
    let visibility = null;

    if(windGroup && /^\d{5}$/.test(windGroup)){
        totalCloud = safeNum(windGroup[0]);
        windDir = safeNum(windGroup.slice(1,3));
        if(windDir != null) windDir *= 10;
        windSpeed = safeNum(windGroup.slice(3,5));
    }

    if(optionalCloudInstrument && /^\d{2}[\d/]{1}\d{2}$/.test(optionalCloudInstrument)){
        lowCloudBase = optionalCloudInstrument[0];
        visibility = optionalCloudInstrument.slice(3,5);
    }

    let cloudTotalOkta = null;
    let cloudLowCode = null;
    let cloudMidCode = null;
    let cloudHighCode = null;

    if (cloudGroup && /^8[\d/]{4}/.test(cloudGroup)) {
    // окта
    cloudTotalOkta = cloudGroup[1] === "/" ? "/" : safeNum(cloudGroup[1]);

    // ярусы — просто символы, без safeNum
    cloudLowCode  = cloudGroup[2];
    cloudMidCode  = cloudGroup[3];
    cloudHighCode = cloudGroup[4];

    // расшифровка
    cloudLowDesc  = cloudGenusLow(cloudLowCode);
    cloudMidDesc  = cloudGenusLow(cloudMidCode);
    cloudHighDesc = cloudGenusLow(cloudHighCode);
}

    const obsHourUtc = yyggi ? parseInt(yyggi.slice(2,4), 10) : null;
const synopIsDay = Number.isFinite(obsHourUtc) ? (obsHourUtc >= 6 && obsHourUtc < 18) : null;

    return {
        synopIsDay,
        raw: line,
        parts,
        yyggi,
        station,
        optionalCloudInstrument,
        windGroup,
        bodyGroups,
        section333,
        section555,

        temp,
        dew,
        stationPressure,
        seaPressure,
        tendencyCode,
        tendencyValue,
        precipGroup,
        weatherNow,
        weatherPast,
        cloudGroup,

        totalCloud,
        lowCloudBase,
        visibility,
        windDir,
        windSpeed,

        cloudTotalOkta,
        cloudLowCode,
        cloudMidCode,
        cloudHighCode
    };
}

// IndexedDB для проверки последней телеграммы
let db;

function initDB(){
    return new Promise((resolve,reject)=>{
        const req = indexedDB.open("modelStats",1);
        req.onupgradeneeded = e=>{
            db = e.target.result;
            if(!db.objectStoreNames.contains("stats")){
                db.createObjectStore("stats",{keyPath:"time"});
            }
        };
        req.onsuccess = e=>{
            db = e.target.result;
            resolve();
        };
        req.onerror = reject;
    });
}

// Проверка, есть ли телеграмма с указанным временем
async function recordExists(timeKey){
    if(!db){
        await initDB();
    }
    const tx = db.transaction("stats","readonly");
    const store = tx.objectStore("stats");
    const req = store.getAll();

    return new Promise(res=>{
        req.onsuccess = ()=>{
            const exists = req.result.some(r => r.synopTime === timeKey);
            res(exists);
        };
        req.onerror = ()=>res(false);
    });
}

/* =========================================================
   6. ЗАГРУЗКА SYNOP
========================================================= */
async function loadSynop() {
    const ogimet = `https://www.ogimet.com/display_synops2.php?lang=en&lugar=${STATION_CODE}&tipo=ALL&ord=REV&nil=SI&fmt=txt`;

    const proxies = [
        "https://api.allorigins.win/raw?url=",
        "https://corsproxy.io/?",
        "https://proxy.cors.sh/",
        "https://cors.x2u.in/"
    ];

    let text = null;
    let lastError = null;

    for (const proxy of proxies) {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), 8000);

        try {
            const url = proxy + encodeURIComponent(ogimet);
            const r = await fetch(url, { signal: controller.signal });

            if (!r.ok) {
                throw new Error("HTTP " + r.status);
            }

            const t = await r.text();

            if (!t || !t.trim()) {
                throw new Error("Пустой ответ");
            }

            text = t;
            console.log("SYNOP proxy ok:", proxy);
            break;
        } catch (e) {
            lastError = e;
            console.log("Proxy fail:", proxy, e);
        } finally {
            clearTimeout(timer);
        }
    }

    if (!text) {
        throw new Error(
            "Все прокси SYNOP не ответили" +
            (lastError?.message ? ": " + lastError.message : "")
        );
    }

    const line = text.split("\n").find(l => l.includes("AAXX"));

    if (!line) {
        throw new Error("SYNOP не найден");
    }

    const synop = parseSynop(line);

    // ======== проверка IndexedDB ========
    if (!db) {
        await initDB();
    }

    const exists = await recordExists(synop.time);
    if (exists) {
        console.log("Телеграмма уже есть в IndexedDB, пропускаем дальнейшую обработку");
        return synop;
    }
    // =====================================

    return synop;
}finally{
        clearTimeout(timer);
    }
}

async function loadCurrentWeather(lat, lon){
    const now = new Date();
    const yyyy = now.getFullYear();
    const mm = String(now.getMonth() + 1).padStart(2,"0");
    const dd = String(now.getDate()).padStart(2,"0");
    const dateStr = `${yyyy}-${mm}-${dd}`;

    const url =
        `https://api.open-meteo.com/v1/forecast` +
        `?latitude=${lat}` +
        `&longitude=${lon}` +
        `&current=temperature_2m,weather_code,cloud_cover,pressure_msl,wind_speed_10m,wind_direction_10m,wind_gusts_10m,precipitation,is_day,relative_humidity_2m,rain,apparent_temperature,showers,snowfall,surface_pressure` +
        `&timezone=auto` +
        `&wind_speed_unit=ms` +
        `&start_date=${dateStr}` +
        `&end_date=${dateStr}`;

    const r = await fetch(url);
    if(!r.ok){
        throw new Error("HTTP " + r.status);
    }

    const d = await r.json();

    if(!d || !d.current){
        throw new Error("Нет блока current");
    }

    return d.current;
}

            <div class="row">
                <div class="label">Нижний ярус</div>
                <div class="value">${escapeHtml(cloudGenusLow(d.cloudLowCode))}</div>
            </div>

            <div class="row">
                <div class="label">Средний ярус</div>
                <div class="value">${escapeHtml(cloudGenusMid(d.cloudMidCode))}</div>
            </div>

            <div class="row">
                <div class="label">Верхний ярус</div>
                <div class="value">${escapeHtml(cloudGenusHigh(d.cloudHighCode))}</div>
            </div>
        </details>

        <details>
            <summary>Технические данные</summary>

            <div class="codeBlock">${escapeHtml(d.raw)}</div>

            <div class="row" style="margin-top:10px">
                <div class="label">Основные группы</div>
                <div class="value">${escapeHtml(d.bodyGroups.join(" ")) || "-"}</div>
            </div>

            <div class="row">
                <div class="label">Секция 333</div>
                <div class="value">${escapeHtml(d.section333.join(" ")) || "-"}</div>
            </div>

            <div class="row">
                <div class="label">Секция 555</div>
                <div class="value">${escapeHtml(d.section555.join(" ")) || "-"}</div>
            </div>
        </details>
    `;
}

/* =========================================================
   9. РЕНДЕР РАЙОНОВ
========================================================= */
function renderDistricts(results){
    const box = document.getElementById("districts");

    let html = `<div class="cardTitle">Погода по районам</div>`;
    html += `<div class="districtGrid">`;

    for(const {name, w} of results){
        const temp = safeNum(w.temperature_2m);
        const app = safeNum(w.apparent_temperature);
        const press = safeNum(w.pressure_msl);
        const sfc = safeNum(w.surface_pressure);
        const wind = safeNum(w.wind_speed_10m);
        const gust = safeNum(w.wind_gusts_10m);
        const dir = safeNum(w.wind_direction_10m);
        const hum = safeNum(w.relative_humidity_2m);
        const cloud = safeNum(w.cloud_cover);
        const precip = safeNum(w.precipitation);
        const rain = safeNum(w.rain);
        const showers = safeNum(w.showers);
        const snow = safeNum(w.snowfall);
        const timeStr = formatAutoTime(w.time);
        const wxCode = safeNum(w.weather_code);
        const isDay = safeNum(w.is_day);
        const wx = openMeteoWeatherText(wxCode);
        const wxIco = openMeteoWeatherIcon(wxCode, isDay);

        html += `
            <div class="districtCard">
                <div class="districtTop">
                    <div>
                        <div class="districtName">${escapeHtml(name)}</div>
                        <div class="small">${escapeHtml(timeStr)}</div>
                    </div>
                    <div class="districtTemp ${tempClass(temp)}">${fmt1(temp,"°C")}</div>
                </div>

                <div class="districtLine">
                    <span>Погода</span>
                    <span>${wxIco} ${escapeHtml(wx)}</span>
                </div>

                <div class="districtLine">
                    <span>Ощущается как</span>
                    <span>${fmt1(app,"°C")}</span>
                </div>

                <div class="districtLine">
                    <span>Ветер</span>
                    <span>${fmt1(wind," м/с")} ${escapeHtml(degToText(dir))} ${windArrow(dir)}</span>
                </div>

                <div class="districtLine">
                    <span>Порывы</span>
                    <span>${fmt1(gust," м/с")}</span>
                </div>

                <div class="districtLine">
                    <span>Давление</span>
                    <span>${fmt1(press," гПа")}</span>
                </div>

                <div class="districtLine">
                    <span>Поверхностное</span>
                    <span>${fmt1(sfc," гПа")}</span>
                </div>

                <div class="districtLine">
                    <span>Влажность</span>
                    <span>${fmt0(hum," %")}</span>
                </div>

                <div class="districtLine">
                    <span>Облачность</span>
                    <span>${fmt0(cloud," %")}</span>
                </div>

                ${(precip && precip > 0) ? `
                <div class="districtLine">
                    <span>Осадки</span>
                    <span>${fmt1(precip," мм")}</span>
                </div>` : ""}

                ${(rain && rain > 0) ? `
                <div class="districtLine">
                    <span>Дождь</span>
                    <span>${fmt1(rain," мм")}</span>
                </div>` : ""}

                ${(showers && showers > 0) ? `
                <div class="districtLine">
                    <span>Ливни</span>
                    <span>${fmt1(showers," мм")}</span>
                </div>` : ""}

                ${(snow && snow > 0) ? `
                <div class="districtLine">
                    <span>Снег</span>
                    <span>${fmt1(snow," см")}</span>
                </div>` : ""}
            </div>
        `;
    }

    html += `</div>`;
    box.innerHTML = html;
}

/* =========================================================
   10. UI-ОБЁРТКИ
========================================================= */
async function loadSynopUI(){
    const btn = document.getElementById("btnSynop");
    btn.disabled = true;

    clearLog("synopLog");
    showLogBox("synopLogBox");

    try{
        logTo("synopLog","🚀 Старт загрузки SYNOP");
        logTo("synopLog","🧭 Формирование URL Ogimet");
        logTo("synopLog","🌐 Отправка запроса через прокси");
        const synop = await loadSynop();
        logTo("synopLog","📥 Ответ получен");
        logTo("synopLog","🔎 Разбор группы AAXX и основных блоков");
        renderSynop(synop);
        logTo("synopLog","✅ SYNOP успешно обновлён");
        hideLogBoxLater("synopLogBox", 3200);
    }catch(e){
        logTo("synopLog","❌ Ошибка: " + (e?.message || e));
        document.getElementById("main").innerHTML = `
            <div class="cardTitle">SYNOP</div>
            <div class="small">Ошибка загрузки: ${escapeHtml(e?.message || e)}</div>
        `;
    }finally{
        btn.disabled = false;
    }
}

async function loadDistrictsUI(){
    const btn = document.getElementById("btnDistricts");
    btn.disabled = true;

    clearLog("districtsLog");
    showLogBox("districtsLogBox");

    try{
        logTo("districtsLog","🚀 Старт загрузки районов");
        logTo("districtsLog","📍 Подготовка координат");
        logTo("districtsLog","🌐 Отправка запросов к Open-Meteo");

        const entries = Object.entries(locations);
        const results = await Promise.all(
            entries.map(async ([name, coords])=>{
                const [lat, lon] = coords;
                logTo("districtsLog",`↳ ${name}: запрос отправлен`);
                const w = await loadCurrentWeather(lat, lon);
                return {name, w};
            })
        );

        logTo("districtsLog","📥 Ответы получены");
        logTo("districtsLog","🧩 Формирование карточек");
        renderDistricts(results);
        logTo("districtsLog","✅ Районы успешно обновлены");
        hideLogBoxLater("districtsLogBox", 3200);
    }catch(e){
        logTo("districtsLog","❌ Ошибка: " + (e?.message || e));
        document.getElementById("districts").innerHTML = `
            <div class="cardTitle">Погода по районам</div>
            <div class="small">Ошибка загрузки: ${escapeHtml(e?.message || e)}</div>
        `;
    }finally{
        btn.disabled = false;
    }
}

/* =========================================================
   11. АВТОЗАПУСК
========================================================= */
loadSynopUI();
loadDistrictsUI();

setInterval(loadSynopUI, 30 * 60 * 1000);
setInterval(loadDistrictsUI, 15 * 60 * 1000);
</script>
