<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Текущая погода</title>

<style>

body{
    background:#121212;
    color:#eee;
    font-family:sans-serif;
    max-width:900px;
    margin:auto
}

/* --- верхняя панель --- */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 15px;
    background:#1e1e1e;
    position:sticky;
    top:0;
}

canvas{
width:100% !important;
}

.nav a{
    margin-left:10px;
    color:#aaa;
    text-decoration:none;
}

.nav a:hover{
    color:#fff;
}

/* --- контейнер --- */
.container{
    padding:15px;
    max-width:600px;
    margin:auto;
}

/* --- карточки --- */
.card{
    background:#1e1e1e;
    border-radius:12px;
    padding:15px;
    margin-bottom:15px;
}

.row{
    display:flex;
    justify-content:space-between;
    padding:8px 0;
    border-bottom:1px solid #333;
}

.row:last-child{
    border-bottom:none;
}

.value{
    font-weight:bold;
}

/* --- крупные значения --- */
.big{
    font-size:28px;
    text-align:center;
    margin:10px 0;
}

/* --- мелкий текст --- */
.small{
    color:#aaa;
    font-size:12px;
    min-height:60px;
}

/* кнопка */
button{
    width:100%;
    padding:10px;
    background:#333;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
    <div><b>Погода сейчас</b></div>
    <div class="nav">
        <a href="index.html">Рейтинг</a>
        <a href="forecast.html">Прогноз</a>
    </div>
</div>

<div class="container">

<div<div class="card" id="main">
    <div class="small">Данные SYNOP ещё не загружены</div>
    <div id="synopLog" class="small"></div>
    <button onclick="loadSynopUI()">Обновить SYNOP</button>
</div>

<div class="card" id="districts">
    <div class="small">Данные по районам ещё не загружены</div>
    <div id="districtsLog" class="small"></div>
    <button onclick="loadDistrictsUI()">Обновить районы</button>
</div>

</div>

<script>

// ===== загрузка =====


function logTo(elId, msg){
    const el = document.getElementById(elId);
    if(!el) return;

    el.innerHTML += msg + "<br>";
    console.log(msg);
}

function clearLogLater(elId, delay = 5000){
    setTimeout(()=>{
        const el = document.getElementById(elId);
        if(el) el.innerHTML = "";
    }, delay);
}

function setSynopStatus(text){
    const el = document.getElementById("main");
    if(!el) return;

    el.innerHTML = `
        <div class="small">${text}</div>
        <div id="synopLog" class="small"></div>
        <button onclick="loadSynopUI()">Обновить SYNOP</button>
    `;
}

function setDistrictsStatus(text){
    const el = document.getElementById("districts");
    if(!el) return;

    el.innerHTML = `
        <div class="small">${text}</div>
        <div id="districtsLog" class="small"></div>
        <button onclick="loadDistrictsUI()">Обновить районы</button>
    `;
}

//===== загрузка SYNOP =====
async function loadSynop(){

const ogimet =
"https://www.ogimet.com/display_synops2.php?lang=en&lugar=33837&tipo=ALL&ord=REV&nil=SI&fmt=txt";

const url = "https://api.allorigins.win/raw?url=" + encodeURIComponent(ogimet);

const controller = new AbortController();
const timeout = setTimeout(()=>controller.abort(), 20000); // 20 сек

let r;

try{
    r = await fetch(url,{signal:controller.signal});
}catch(e){
    throw "Ошибка сети или таймаут";
}

clearTimeout(timeout);

const text = await r.text();

const line = text.split("\n").find(l => l.includes("AAXX"));

if(!line) throw "SYNOP не найден";

return parseSynop(line);
}

//===== Обёртка для SYNOP (UI-логика) =====
async function loadSynopUI(){

    setSynopStatus("Загрузка SYNOP...");
    const logId = "synopLog";

    try{
        logTo(logId, "🚀 Старт загрузки");
        logTo(logId, "⏳ Подготовка запроса");
        logTo(logId, "🌐 Отправка на прокси");

        const synop = await loadSynop();

        logTo(logId, "📥 Ответ получен");
        logTo(logId, "🔍 Парсинг SYNOP");
        logTo(logId, "🖼 Обновление карточки");

        render(synop);

        logTo("synopLog", "✅ Готово");

        clearLogLater("synopLog", 7000);

    }catch(e){
        setSynopStatus("Ошибка загрузки SYNOP");
        logTo("synopLog", "❌ Ошибка: " + e);
    }
}

// ===== парсинг =====
function parseSynop(line){

    const parts = line.trim().split(/\s+/);

    let temp = null;
    let dew = null;
    let pressure = null;
    let wind = null;
    let windDir = null;
    let weather = null;
    let cloud = null;

    parts.forEach(g => {

        if(/^1\d{4}$/.test(g)){
            const sign = g[1] === "1" ? -1 : 1;
            temp = sign * parseInt(g.slice(2), 10) / 10;
        }

        if(/^2\d{4}$/.test(g)){
            const sign = g[1] === "1" ? -1 : 1;
            dew = sign * parseInt(g.slice(2), 10) / 10;
        }

        if(/^4\d{4}$/.test(g)){
            const p = parseInt(g.slice(1), 10) / 10;
            pressure = p < 500 ? 1000 + p : 900 + p;
        }

        if(/^7\d{4}$/.test(g)){
            weather = g.slice(1,3);
        }

        if(/^8\d{4}$/.test(g)){
            cloud = g[1];
        }
    });

    const aaxxIndex = parts.indexOf("AAXX");
    let time = null;

    if(aaxxIndex >= 0 && parts[aaxxIndex + 1]){
        const t = parts[aaxxIndex + 1];
        time = {
            day: t.slice(0,2),
            hour: t.slice(2,4)
        };
    }

    if(aaxxIndex >= 0 && parts[aaxxIndex + 4]){
        const w = parts[aaxxIndex + 4];

        if(/^\d{5}$/.test(w)){
            windDir = parseInt(w.slice(0,2), 10) * 10;
            wind = parseInt(w.slice(3,5), 10);
        }
    }

    return { temp, dew, pressure, wind, windDir, weather, cloud, raw: line, time };
}

// ===== расшифровки =====
function weatherText(code){

    if(!code) return "-";

    const map = {
        "00":"Ясно",
        "01":"Малооблачно",
        "02":"Переменная облачность",
        "03":"Пасмурно",

        "45":"Туман",
        "48":"Туман с изморосью",

        "51":"Морось",
        "61":"Дождь",
        "63":"Сильный дождь",

        "71":"Снег",
        "73":"Сильный снег",

        "80":"Ливень",
        "95":"Гроза"
    };

    return map[code] || "Код " + code;
}
function formatTime(t){

    if(!t) return "-";

    return `${t.day} число, ${t.hour}:00 UTC`;
}
function windArrow(deg){

    if(deg == null) return "";

    return `<span style="
        display:inline-block;
        transform:rotate(${deg}deg);
        font-size:18px;
    ">↑</span>`;
}

function tempColor(t){

    if(t == null) return "#eee";

    if(t < 0) return "#4da3ff";
    if(t < 10) return "#90caf9";
    if(t < 20) return "#81c784";
    if(t < 30) return "#ffb74d";

    return "#ff5252";
}

function cloudText(c){
    if(!c) return "-";
    return c + "/8";
}

function degToText(d){
    const dirs=["С","СВ","В","ЮВ","Ю","ЮЗ","З","СЗ"];
    return dirs[Math.round(d/45)%8];
}

// ===== погода по районам =====
const locations = {
    "Котовского": [46.560, 30.800],
    "Центр": [46.482, 30.723],
    "Таирова": [46.400, 30.650],
    "Аркадия": [46.430, 30.760],
    "Застава": [46.520, 30.650]
};

//===== загрузка open meteo =====
async function loadCurrentWeather(lat, lon){
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,pressure_msl,wind_speed_10m,wind_direction_10m,time`;
    const r = await fetch(url);
    const d = await r.json();
    // возвращаем current вместе с временем
    return d.current;
}

// ===== Обёртка для районов =====
async function loadDistrictsUI(){

    setDistrictsStatus("Загрузка районов...");
    const logId = "districtsLog";

    try{
        logTo(logId, "🚀 Старт загрузки районов");

        const entries = Object.entries(locations);

        logTo(logId, "📍 Подготовка координат");
        logTo(logId, `🌐 Запросов: ${entries.length}`);

        const results = await Promise.all(
            entries.map(async ([name, [lat, lon]]) => {
                logTo(logId, `⏳ ${name}: отправка запроса`);
                const w = await loadCurrentWeather(lat, lon);
                logTo(logId, `📥 ${name}: ответ получен`);
                return { name, w };
            })
        );

        logTo(logId, "🖼 Сборка блока районов");

        let html = `
            <h3>Погода по районам</h3>
            <div id="districtsLog" class="small"></div>
        `;

        results.forEach(({name, w}) => {
            const t = new Date(w.time);
            const timeStr = `${String(t.getUTCDate()).padStart(2,"0")} число, ${String(t.getUTCHours()).padStart(2,"0")}:00 UTC`;

            html += `
            <div class="row">
                <div>${name}</div>
                <div>
                    ${w.temperature_2m}°C | ${w.wind_speed_10m} м/с<br>
                    <span class="small">${timeStr}</span>
                </div>
            </div>`;
        });

        html += `<button onclick="loadDistrictsUI()">Обновить районы</button>`;

        document.getElementById("districts").innerHTML = html;

        logTo("districtsLog", "✅ Готово");

        clearLogLater("districtsLog", 7000);

    }catch(e){
        setDistrictsStatus("Ошибка загрузки районов");
        logTo("districtsLog", "❌ Ошибка: " + e);
    }
}

// ===== вывод SYNOP =====
function render(d){

    const el = document.getElementById("main");

    el.innerHTML = `
    <div class="small">Наблюдение: ${formatTime(d.time)}</div>

    <div class="big" style="color:${tempColor(d.temp)}">
        ${d.temp ?? "-"}°C
    </div>

    <div class="row">
        <div>Точка росы</div>
        <div class="value">${d.dew ?? "-"}°C</div>
    </div>

    <div class="row">
        <div>Давление</div>
        <div class="value">${d.pressure ?? "-"} гПа</div>
    </div>

    <div class="row">
        <div>Ветер</div>
        <div class="value">
            ${d.wind ?? "-"} м/с
            ${d.windDir != null ? degToText(d.windDir) : ""}
            ${windArrow(d.windDir)}
        </div>
    </div>

    <div class="row">
        <div>Облачность</div>
        <div class="value">${cloudText(d.cloud)}</div>
    </div>

    <div class="row">
        <div>Явления</div>
        <div class="value">${weatherText(d.weather)}</div>
    </div>

    <div class="small" style="margin-top:10px;">${d.raw}</div>

    <div id="synopLog" class="small" style="margin-top:10px;"></div>
    <button onclick="loadSynopUI()">Обновить SYNOP</button>
    `;
}


loadSynopUI();
loadDistrictsUI();

setInterval(loadSynopUI, 1800000);
setInterval(loadDistrictsUI, 900000); // районы чаще (15 мин)

</script>

</body>
</html>
