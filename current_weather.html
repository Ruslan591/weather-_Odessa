function isDayNow(lat, lon, date = new Date()) {
    const rad = Math.PI / 180;
    const deg = 180 / Math.PI;

    const start = new Date(Date.UTC(date.getUTCFullYear(),0,0));
    const diff = date - start;
    const oneDay = 1000*60*60*24;
    const dayOfYear = Math.floor(diff / oneDay);

    const decl = 23.44 * Math.sin(rad * (360/365 * (dayOfYear - 81)));
    const latRad = lat * rad;
    const declRad = decl * rad;
    const cosH = -Math.tan(latRad) * Math.tan(declRad);

    if(cosH < -1) return true;
    if(cosH > 1) return false;

    const lngHour = lon / 15;
    const utcHours = date.getUTCHours() + date.getUTCMinutes()/60;
    const solarNoon = 12 + lngHour - (lon/15);
    const hourAngle = 15 * (utcHours - solarNoon);

    return hourAngle > -90 && hourAngle < 90;
}

function pressureFromGroup(group4){

    return p < 500 ? 1000 + p : 900 + p;
}

function stationPressureFromGroup(group3){
    if(!group3) return null;
    const p = parseInt(group3.slice(1), 10) / 10;
    if(Number.isNaN(p)) return null;

}

function signedTenths(group){
    if(!group || group.length !== 5) return null;
    const sign = group[1] === "1" ? -1 : 1;
    const val = parseInt(group.slice(2), 10);
    if(Number.isNaN(val)) return null;
    return sign * val / 10;
}

function localTimeFromSynopYYGGi(yyggi){
    if(!yyggi || yyggi.length < 4) return "-";
    const day = parseInt(yyggi.slice(0,2),10);
    const hour = parseInt(yyggi.slice(2,4),10);

    if(Number.isNaN(day) || Number.isNaN(hour)) return "-";

    const now = new Date();
    const year = now.getUTCFullYear();
    const month = now.getUTCMonth();

    const utcDate = new Date(Date.UTC(year, month, day, hour, 0, 0));

    const local = new Date(utcDate.getTime() + 2 * 3600 * 1000);

    const dd = String(local.getUTCDate()).padStart(2,"0");
    const mm = String(local.getUTCMonth() + 1).padStart(2,"0");
    const hh = String(local.getUTCHours()).padStart(2,"0");

    return `${dd}.${mm} ${hh}:00 местное`;
}

function formatAutoTime(isoString){
    if(!isoString) return "-";
    const d = new Date(isoString);
    if(Number.isNaN(d.getTime())) return "-";

    return d.toLocaleString("ru-RU",{
        day:"2-digit",
        month:"2-digit",
        hour:"2-digit",
        minute:"2-digit"
    });
}

// ===== Ощущается как =====
function calcRelativeHumidity(tempC, dewC){
    const t = Number(tempC);
    const td = Number(dewC);

    if(!Number.isFinite(t) || !Number.isFinite(td)) return null;

    const es = 6.112 * Math.exp((17.62 * t) / (243.12 + t));
    const e = 6.112 * Math.exp((17.62 * td) / (243.12 + td));
    const rh = (e / es) * 100;

    if(!Number.isFinite(rh)) return null;
    return Math.max(0, Math.min(100, rh));
}

function calcFeelsLike(tempC, windMs, dewC){
    const t = Number(tempC);
    const vMs = Number(windMs);
    const td = Number(dewC);

    if(!Number.isFinite(t)) return null;

    const rh = calcRelativeHumidity(t, td);

    /* Жара: heat index */
    if(Number.isFinite(rh) && t >= 27){
        const tf = t * 9/5 + 32;
        const hiF =
            -42.379 +
            2.04901523 * tf +
            10.14333127 * rh -
            0.22475541 * tf * rh -
            0.00683783 * tf * tf -
            0.05481717 * rh * rh +
            0.00122874 * tf * tf * rh +
            0.00085282 * tf * rh * rh -
            0.00000199 * tf * tf * rh * rh;

        const hiC = (hiF - 32) * 5/9;
        if(Number.isFinite(hiC)) return hiC;
    }

    /* Холод: wind chill */
    if(Number.isFinite(vMs)){
        const vKmh = vMs * 3.6;

        if(t <= 10 && vKmh > 4.8){
            const wc =
                13.12 +
                0.6215 * t -
                11.37 * Math.pow(vKmh, 0.16) +
                0.3965 * t * Math.pow(vKmh, 0.16);

            if(Number.isFinite(wc)) return wc;
        }
    }

    return t;
}

function showLogBox(boxId){
    const box = document.getElementById(boxId);
    if(!box) return;
    box.classList.remove("hidden");
}

function hideLogBoxLater(boxId, delay=2600){
    const box = document.getElementById(boxId);
    if(!box) return;

    setTimeout(()=>{
        box.classList.add("hidden");
    }, delay);
}

function clearLog(logId){
    const el = document.getElementById(logId);
    if(el) el.innerHTML = "";
}

function logTo(logId, msg){
    const el = document.getElementById(logId);
    if(!el) return;

    const line = document.createElement("div");
    line.className = "logLine";
    line.textContent = msg;
    el.appendChild(line);
}

/* =========================================================
   5. ПАРСИНГ SYNOP
========================================================= */
function parseSynop(line) {
    const parts = line.trim().split(/\s+/);
    const aaxxIndex = parts.indexOf("AAXX");

    if(aaxxIndex === -1){
        throw new Error("AAXX не найден");
    }

    // Основные переменные
    const yyggi = parts[aaxxIndex + 1] || null;
    const station = parts[aaxxIndex + 2] || null;
    const optionalCloudInstrument = parts[aaxxIndex + 3] || null;
    const windGroup = parts[aaxxIndex + 4] || null;

    const bodyGroups = [];
    const section333 = [];
    const section555 = [];
    let currentSection = "main";

    // Разделение на main / 333 / 555
    for(let i = aaxxIndex + 5; i < parts.length; i++){
        let g = parts[i].replace(/=+$/, ""); // убираем = только для парсинга

        if(g === "333"){
            currentSection = "333";
            continue;
        }
        if(g === "555"){
            currentSection = "555";
            continue;
        }
        if(!g) continue;

        if(currentSection === "main") bodyGroups.push(g);
        else if(currentSection === "333") section333.push(g);
        else if(currentSection === "555") section555.push(g);
    }

    // Основные данные
    let temp = null;
    let dew = null;
    let stationPressure = null;
    let seaPressure = null;
    let tendencyCode = null;
    let tendencyValue = null;
    let precipGroup = null;
    let precipValue = null;
    let weatherNow = null;
    let weatherPast = null;
    let cloudGroup = null;

    // Дополнительные данные
    let tempMax24h = null;
    let tempMin24h = null;
    let maxWindGust = null;
    let sunHours = null;

    let cloudTotalOkta = null;
    let cloudLowCode = null;
    let cloudMidCode = null;
    let cloudHighCode = null;
    let cloudLowDesc = null;
    let cloudMidDesc = null;
    let cloudHighDesc = null;

    let lowCloudBase = null;
    let visibility = null;
    let windDir = null;
    let windSpeed = null;

    let weatherChange = [];
    let soilTempCode = null;
    let soilTempValue = null;
    let snowHeight = null;

    const weatherCodes = {
        "00": "нет явлений",
        "01": "дождь слабый",
        "02": "дождь умеренный",
        "03": "снег",
        "04": "метель",
        "05": "туман",
        "06": "гололёд",
        "07": "пыльная буря",
        "08": "дымка",
        "09": "изморозь",
        "10": "град",
        // добавляй по стандартам WMO все коды
    };

    // Разбор main body
    for(const g of bodyGroups){
        if(/^1\d{4}$/.test(g)) temp = signedTenths(g);
        else if(/^2\d{4}$/.test(g)) dew = signedTenths(g);
        else if(/^3\d{4}$/.test(g)) stationPressure = stationPressureFromGroup(g);
        else if(/^4\d{4}$/.test(g)) seaPressure = pressureFromGroup(g);
        else if(/^5\d{4}/.test(g)){
            tendencyCode = g[1];
            tendencyValue = parseInt(g.slice(2),10) / 10;
        }
        else if(/^6\d{4}$/.test(g)){
            precipGroup = g;
            precipValue = parseInt(g.slice(1,4),10)/10;
        }
        else if(/^7\d{4}$/.test(g)){
            weatherNow = weatherCodes[g.slice(1,3)] || null;
            weatherPast = weatherCodes[g.slice(3,5)] || null;
            weatherChange.push(weatherNow);
        }
        else if(/^8[\d/]{4}$/.test(g)){
            cloudGroup = g;

            cloudTotalOkta = cloudGroup[1] === "/" ? null : safeNum(cloudGroup[1]);
            cloudLowCode  = cloudGroup[2] === "/" ? null : cloudGroup[2];
            cloudMidCode  = cloudGroup[3] === "/" ? null : cloudGroup[3];
            cloudHighCode = cloudGroup[4] === "/" ? null : cloudGroup[4];

            cloudLowDesc  = cloudLowCode ? cloudGenusLow(cloudLowCode) : null;
            cloudMidDesc  = cloudMidCode ? cloudGenusLow(cloudMidCode) : null;
            cloudHighDesc = cloudHighCode ? cloudGenusLow(cloudHighCode) : null;
        }
        else if(/^50\d{3}$/.test(g)) maxWindGust = parseInt(g.slice(2),10);
        else if(/^77\d{3}$/.test(g)) sunHours = parseInt(g.slice(2),10)/10;
        else if(/^1\d{3}[0-9]$/.test(g)) tempMax24h = signedTenths(g);
        else if(/^2\d{3}[0-9]$/.test(g)) tempMin24h = signedTenths(g);
        else if(/^9\d{3}$/.test(g)) snowHeight = parseInt(g.slice(1),10)/10;
    }

    // Разбор wind
    if(windGroup && /^\d{5}$/.test(windGroup)){
        const t = windGroup;
        totalCloud = safeNum(t[0]);
        windDir = safeNum(t.slice(1,3)) * 10;
        windSpeed = safeNum(t.slice(3,5));
    }

    // Разбор нижней облачности / видимости
    if (optionalCloudInstrument && optionalCloudInstrument.length === 5) {
        lowCloudBase = optionalCloudInstrument[0] === "/" ? null : optionalCloudInstrument[0];
        visibility = optionalCloudInstrument.slice(3, 5).includes("/") ? null : optionalCloudInstrument.slice(3,5);
    }

    // Разбор секции 333
    for(const g of section333){
        const clean = g.replace(/=+$/,"");
        const firstDigit = clean[0];
        if(firstDigit === "1") tempMax24h = signedTenths(clean);
        else if(firstDigit === "2") tempMin24h = signedTenths(clean);
        else if(firstDigit === "6") {
            precipValue = parseInt(clean.slice(1,4),10)/10;
        }
        else if(firstDigit === "7") {
            const w = weatherCodes[clean.slice(1,3)] || null;
            weatherChange.push(w);
        }
        else if(firstDigit === "50") maxWindGust = parseInt(clean.slice(2),10);
        else if(firstDigit === "77") sunHours = parseInt(clean.slice(2),10)/10;
        else if(firstDigit === "8") {
            cloudLowCode  = clean[2]==="/"? null : clean[2];
            cloudMidCode  = clean[3]==="/"? null : clean[3];
            cloudHighCode = clean[4]==="/"? null : clean[4];
        }
    }

    // Разбор секции 555
    for(const g of section555){
        const clean = g.replace(/=+$/,"");
        if(/^(\d)\/(\d{3})$/.test(clean)){
            const m = clean.match(/^(\d)\/(\d{3})$/);
            soilTempCode = parseInt(m[1],10);
            soilTempValue = parseInt(m[2],10)/10;
        }
        else if(/^7\d{3}$/.test(clean)){
            const w = weatherCodes[clean.slice(1,3)] || null;
            weatherChange.push(w);
        }
        else if(/^77\d{3}$/.test(clean)){
            sunHours = parseInt(clean.slice(2),10)/10;
        }
        else if(/^9\d{3}$/.test(clean)){
            snowHeight = parseInt(clean.slice(1),10)/10;
        }
    }

    const obsHourUtc = yyggi ? parseInt(yyggi.slice(2,4), 10) : null;
    const synopIsDay = Number.isFinite(obsHourUtc) ? (obsHourUtc >= 6 && obsHourUtc < 18) : null;

    return {
        synopIsDay,
        raw: line,
        parts,
        yyggi,
        station,
        optionalCloudInstrument,
        windGroup,
        bodyGroups,
        section333,
        section555,

        temp,
        dew,
        stationPressure,
        seaPressure,
        tendencyCode,
        tendencyValue,
        precipGroup,
        precipValue,
        weatherNow,
        weatherPast,
        weatherChange,
        cloudGroup,

        totalCloud,
        lowCloudBase,
        visibility,
        windDir,
        windSpeed,

        cloudTotalOkta,
        cloudLowCode,
        cloudMidCode,
        cloudHighCode,
        cloudLowDesc,
        cloudMidDesc,
        cloudHighDesc,

        tempMax24h,
        tempMin24h,
        maxWindGust,
        sunHours,
        soilTempCode,
        soilTempValue,
        snowHeight
    };
}

// IndexedDB для проверки последней телеграммы
let db;

function initDB(){
    return new Promise((resolve,reject)=>{
        const req = indexedDB.open("modelStats",1);
        req.onupgradeneeded = e=>{
            db = e.target.result;
            if(!db.objectStoreNames.contains("stats")){
                db.createObjectStore("stats",{keyPath:"time"});
            }
        };
        req.onsuccess = e=>{
            db = e.target.result;
            resolve();
        };
        req.onerror = reject;
    });
}

// Проверка, есть ли телеграмма с указанным временем
async function recordExists(timeKey){
    if(!db){
        await initDB();
    }
    const tx = db.transaction("stats","readonly");
    const store = tx.objectStore("stats");
    const req = store.getAll();

    return new Promise(res=>{
        req.onsuccess = ()=>{
            const exists = req.result.some(r => r.synopTime === timeKey);
            res(exists);
        };
        req.onerror = ()=>res(false);
    });
}

/* =========================================================
   6. ЗАГРУЗКА SYNOP
========================================================= */
function saveProxyTime(proxyTimes, proxy, ms, limit = 10) {
    if (!proxyTimes[proxy]) proxyTimes[proxy] = [];
    proxyTimes[proxy].push(ms);
    if (proxyTimes[proxy].length > limit) {
        proxyTimes[proxy] = proxyTimes[proxy].slice(-limit);
    }
}

async function loadSynop() {
    const cacheBust = Date.now();

    const ogimet =
        `https://www.ogimet.com/display_synops2.php?lang=en&lugar=33837&tipo=ALL&ord=REV&nil=SI&fmt=txt&_=${cacheBust}`;

    const proxies = [
        "https://api.allorigins.win/raw?url=",
        "https://corsproxy.io/?",
        "https://proxy.cors.sh/",
        "https://cors.x2u.in/"
    ];

    const proxyStorageKey = "synopProxyTimes";
    let proxyTimes = JSON.parse(localStorage.getItem(proxyStorageKey) || "{}");
    proxies.forEach(p => { if (!proxyTimes[p]) proxyTimes[p] = []; });

    function extractTelegramKey(text) {
        const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
        for (const line of lines) {
            const m = line.match(/^(\d{12})\s+AAXX\b/);
            if (m) return m[1];
        }
        return null;
    }

    function extractAAXXLine(text) {
    const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
    let startIndex = lines.findIndex(l => /(AAXX|BBXX|OOXX)\b/.test(l));
    if (startIndex === -1) return null;

    // Берём строку AAXX/BBXX/OOXX и все следующие строки, которые не начинаются с новой AAXX/BBXX/OOXX
    let resultLines = [];
    for (let i = startIndex; i < lines.length; i++) {
        const line = lines[i];
        if (i !== startIndex && /(AAXX|BBXX|OOXX)\b/.test(line)) break;
        resultLines.push(line);
    }

    // Объединяем в одну строку через пробел, сохраняя raw
    return resultLines.join(" ");
}

    const requests = proxies.map(proxy => {
        return new Promise(async (resolve, reject) => {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), 8000);
            const started = performance.now();

            try {
                const url = proxy + encodeURIComponent(ogimet);
                const r = await fetch(url, { signal: controller.signal, cache: "no-store" });

                if (!r.ok) throw new Error("HTTP " + r.status);

                const text = await r.text();
                if (!text || !text.trim()) throw new Error("Пустой ответ");

                const telegramKey = extractTelegramKey(text);
                const line = extractAAXXLine(text);

                if (!telegramKey) throw new Error("Ключ телеграммы YYYYMMDDHHMM не найден");
                if (!line) throw new Error("SYNOP не найден");

                const ms = Math.round(performance.now() - started);
                saveProxyTime(proxyTimes, proxy, ms);

                console.log(`SYNOP proxy ok: ${proxy} (${ms} мс), key=${telegramKey}`);

                resolve({ proxy, text, line, telegramKey, ms });
            } catch (e) {
                const ms = Math.round(performance.now() - started);
                saveProxyTime(proxyTimes, proxy, ms);

                console.log(`Proxy fail: ${proxy} (${ms} мс)`, e);
                reject(e);
            } finally {
                clearTimeout(timer);
            }
        });
    });

    const settled = await Promise.allSettled(requests);
    localStorage.setItem(proxyStorageKey, JSON.stringify(proxyTimes));

    const successResults = settled
        .filter(r => r.status === "fulfilled")
        .map(r => r.value);

    if (!successResults.length) throw new Error("Все прокси SYNOP не ответили");

    successResults.sort((a, b) => {
        if (a.telegramKey !== b.telegramKey) {
            return b.telegramKey.localeCompare(a.telegramKey);
        }
        return a.ms - b.ms;
    });

    const best = successResults[0];
    console.log(`Выбран прокси: ${best.proxy}, key=${best.telegramKey}, ${best.ms} мс`);

    const synop = parseSynop(best.line);

    

    if (!db) await initDB();
    const exists = await recordExists(best.telegramKey);
    if (exists) {
        console.log("Телеграмма уже есть в IndexedDB, пропускаем дальнейшую обработку");
        return synop;
    }

    return synop;
}

async function loadCurrentWeather(lat, lon){
    const now = new Date();
    const yyyy = now.getFullYear();
    const mm = String(now.getMonth() + 1).padStart(2,"0");
    const dd = String(now.getDate()).padStart(2,"0");
    const dateStr = `${yyyy}-${mm}-${dd}`;

    const url =
        `https://api.open-meteo.com/v1/forecast` +
        `?latitude=${lat}` +
        `&longitude=${lon}` +
        `&current=temperature_2m,weather_code,cloud_cover,pressure_msl,wind_speed_10m,wind_direction_10m,wind_gusts_10m,precipitation,is_day,relative_humidity_2m,rain,apparent_temperature,showers,snowfall,surface_pressure` +
        `&timezone=auto` +
        `&wind_speed_unit=ms` +
        `&start_date=${dateStr}` +
        `&end_date=${dateStr}`;

    const r = await fetch(url);
    if(!r.ok){
        throw new Error("HTTP " + r.status);
    }

    const d = await r.json();

    if(!d || !d.current){
        throw new Error("Нет блока current");
    }

    return d.current;

                </div>

                <div class="districtLine">
                    <span>Облачность</span>
                    <span>${fmt0(cloud," %")}</span>
                </div>

                ${(precip && precip > 0) ? `
                <div class="districtLine">
                    <span>Осадки</span>
                    <span>${fmt1(precip," мм")}</span>
                </div>` : ""}

                ${(rain && rain > 0) ? `
                <div class="districtLine">
                    <span>Дождь</span>
                    <span>${fmt1(rain," мм")}</span>
                </div>` : ""}

                ${(showers && showers > 0) ? `
                <div class="districtLine">
                    <span>Ливни</span>
                    <span>${fmt1(showers," мм")}</span>
                </div>` : ""}

                ${(snow && snow > 0) ? `
                <div class="districtLine">
                    <span>Снег</span>
                    <span>${fmt1(snow," см")}</span>
                </div>` : ""}
            </div>
        `;
    }

    html += `</div>`;
    box.innerHTML = html;
}

async function loadSynopUI(){

    clearLog("synopLog");
    showLogBox("synopLogBox");

    try{
        logTo("synopLog","🚀 Старт загрузки SYNOP");
        logTo("synopLog","🧭 Формирование URL Ogimet");
        logTo("synopLog","🌐 Отправка запроса через прокси");

        logTo("synopLog","📥 Ответ получен");
        logTo("synopLog","🔎 Разбор группы AAXX и основных блоков");
        renderSynop(synop);
        logTo("synopLog","✅ SYNOP успешно обновлён");
        hideLogBoxLater("synopLogBox", 3200);
    }catch(e){
        logTo("synopLog","❌ Ошибка: " + (e?.message || e));

async function loadDistrictsUI(){
    const btn = document.getElementById("btnDistricts");
    btn.disabled = true;

    clearLog("districtsLog");
    showLogBox("districtsLogBox");

    try{
        logTo("districtsLog","🚀 Старт загрузки районов");
        logTo("districtsLog","📍 Подготовка координат");
        logTo("districtsLog","🌐 Отправка запросов к Open-Meteo");

        const entries = Object.entries(locations);
        const results = await Promise.all(
            entries.map(async ([name, coords])=>{
                const [lat, lon] = coords;
                logTo("districtsLog",`↳ ${name}: запрос отправлен`);
                const w = await loadCurrentWeather(lat, lon);
                return {name, w};
            })
        );

        logTo("districtsLog","📥 Ответы получены");
        logTo("districtsLog","🧩 Формирование карточек");
        renderDistricts(results);
        logTo("districtsLog","✅ Районы успешно обновлены");
        hideLogBoxLater("districtsLogBox", 3200);
    }catch(e){
        logTo("districtsLog","❌ Ошибка: " + (e?.message || e));

            <div class="small">Ошибка загрузки: ${escapeHtml(e?.message || e)}</div>

    }finally{

}
