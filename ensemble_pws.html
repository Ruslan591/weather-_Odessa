<script>
/* === GITHUB === */
var GITHUB_OWNER      = "ruslan591";
var GITHUB_REPO       = "weather-_Odessa";
var GITHUB_SNAPS_FILE = "data/ensemble_snapshots_pws.json";
var GITHUB_PWS_FILE   = "data/pws_raw.json";

var _snaps      = [];
var _pwsRawData = [];
var _currentStation = "all";

function getToken() { return localStorage.getItem("ghToken") || ""; }

async function ghGetJson(path) {
    var url = "https://api.github.com/repos/" + GITHUB_OWNER + "/" + GITHUB_REPO + "/contents/" + path;
    var token = getToken();
    var r = await fetch(url, {
        headers: Object.assign({"Accept":"application/vnd.github+json"}, token ? {"Authorization":"Bearer "+token} : {}),
        cache: "no-store"
    });
    if (!r.ok) return { data: null, sha: null };
    var resp = await r.json();
    var raw = resp.content.replace(/\n/g, "");
    var content = new TextDecoder().decode(Uint8Array.from(atob(raw), function(c){ return c.charCodeAt(0); }));
    return { data: JSON.parse(content), sha: resp.sha };
}

async function loadSnaps() {
    var result = await ghGetJson(GITHUB_SNAPS_FILE);
    _snaps = (result.data && Array.isArray(result.data)) ? result.data : [];
}

async function loadPwsRaw() {
    var result = await ghGetJson(GITHUB_PWS_FILE);
    _pwsRawData = (result.data && Array.isArray(result.data)) ? result.data : [];
}

/* === ПАРАМЕТРЫ === */
var PARAMS = [
    { key:"temp",     label:"Температура", unit:"°C",  color:"#ff8f00" },
    { key:"pressure", label:"Давление",    unit:" гПа",color:"#4aa3ff" },
    { key:"wind",     label:"Ветер",       unit:" м/с",color:"#8bc34a" },
    { key:"windGust", label:"Порывы",      unit:" м/с",color:"#ff5722" },
    { key:"windDir",  label:"Направление", unit:"°",   color:"#74b9ff" },
    { key:"humidity", label:"Влажность",   unit:"%",   color:"#00bcd4" },
    { key:"precip",   label:"Осадки",      unit:" мм", color:"#448aff", isFact:true },
];

var THRESHOLDS = {
    temp:     { good:1.5, bad:3.0 },
    pressure: { good:1.0, bad:2.5 },
    wind:     { good:1.5, bad:3.0 },
    windGust: { good:2.0, bad:4.0 },
    windDir:  { good:30,  bad:60  },
    humidity: { good:8,   bad:15  },
};

/* === ВСПОМОГАТЕЛЬНЫЕ === */
var PWS_UTC_OFFSET = 3;

function snapTimeToHourKey(timeStr) {
    if (!timeStr) return null;
    var dt = new Date(timeStr + ":00Z");
    dt.setUTCHours(dt.getUTCHours() - PWS_UTC_OFFSET);
    return dt.getUTCFullYear() + "-" +
        String(dt.getUTCMonth()+1).padStart(2,"0") + "-" +
        String(dt.getUTCDate()).padStart(2,"0") + "T" +
        String(dt.getUTCHours()).padStart(2,"0");
}

function windDirDiff(a, b) {
    var d = Math.abs(a - b);
    return d > 180 ? 360 - d : d;
}

function maeColor(key, mae) {
    var t = THRESHOLDS[key];
    if (!t) return "#aaa";
    if (mae <= t.good) return "#5fe08f";
    if (mae <= t.bad)  return "#fdcb6e";
    return "#ff6b6b";
}

function biasBadge(bias, unit) {
    if (Math.abs(bias) < 0.01) return "";
    var sign = bias > 0 ? "▲ завыш" : "▼ занижает";
    var col  = bias > 0 ? "#ff9f5c" : "#74b9ff";
    return '<span class="es-badge" style="background:'+col+'22;color:'+col+'">'+sign+' '+Math.abs(bias).toFixed(2)+unit+'</span>';
}

function setStatus(msg) { document.getElementById("statusLine").innerHTML = msg; }

/* === ИНДЕКС НАБЛЮДЕНИЙ PWS === */
function buildObsIndex() {
    var all = _currentStation === "all"
        ? _pwsRawData
        : _pwsRawData.filter(function(d){ return d.stationId === _currentStation; });

    var byHour = {};
    all.forEach(function(rec) {
        if (!rec.hourKey) return;
        if (!byHour[rec.hourKey]) byHour[rec.hourKey] = [];
        byHour[rec.hourKey].push(rec);
    });

    var obsIndex = {};
    Object.keys(byHour).forEach(function(key) {
        var arr = byHour[key];
        function avg(field) {
            var vals = arr.map(function(o){ return o[field]; }).filter(function(v){ return v != null; });
            return vals.length ? vals.reduce(function(s,v){ return s+v; },0)/vals.length : null;
        }
        function avgDir() {
            var dirs = arr.map(function(o){ return o.windDir; }).filter(function(v){ return v != null; });
            if (!dirs.length) return null;
            var sx = dirs.reduce(function(s,d){ return s+Math.cos(d*Math.PI/180); },0);
            var sy = dirs.reduce(function(s,d){ return s+Math.sin(d*Math.PI/180); },0);
            return (Math.atan2(sy,sx)*180/Math.PI+360)%360;
        }
        obsIndex[key] = { time:key, temp:avg("temp"), pressure:avg("pressure"),
            wind:avg("wind"), windGust:avg("windGust"), windDir:avgDir(),
            humidity:avg("humidity"), precip:avg("precip") };
    });

    return { obsIndex:obsIndex, totalRecords:all.length };
}

/* === РАСЧЁТ МЕТРИК === */
function pushPwsErrors(errors, fh, ob) {
    function push(k, fv, ov) {
        if (fv == null || ov == null) return;
        errors[k].push(fv - ov);
    }
    push("temp",     fh.temp,     ob.temp);
    push("pressure", fh.pressure, ob.pressure);
    push("wind",     fh.wind,     ob.wind);
    push("windGust", fh.windGust, ob.windGust);
    push("humidity", fh.humidity, ob.humidity);
    if (fh.windDir != null && ob.windDir != null)
        errors.windDir.push(windDirDiff(fh.windDir, ob.windDir));
    if (fh.rain != null && ob.precip != null)
        errors.precip.push((fh.rain>0.1?1:0) - (ob.precip>0.1?1:0));
}

function emptyErrors() {
    return { temp:[], pressure:[], wind:[], windGust:[], windDir:[], humidity:[], precip:[] };
}

function summarize(errors) {
    var result = {};
    Object.keys(errors).forEach(function(k) {
        var arr = errors[k];
        if (!arr.length) { result[k] = null; return; }
        var mae  = arr.reduce(function(s,v){ return s+Math.abs(v); },0) / arr.length;
        var rmse = Math.sqrt(arr.reduce(function(s,v){ return s+v*v; },0) / arr.length);
        var bias = arr.reduce(function(s,v){ return s+v; },0) / arr.length;
        result[k] = { mae:mae, rmse:rmse, bias:bias, n:arr.length };
    });
    return result;
}

function calcMetrics(obsIndex) {
    if (!_snaps.length) return null;
    var errors = emptyErrors();
    var matched = 0;

    _snaps.forEach(function(snap) {
        if (!snap.hours) return;
        snap.hours.forEach(function(fh) {
            var ob = obsIndex[snapTimeToHourKey(fh.time)];
            if (!ob) return;
            matched++;
            pushPwsErrors(errors, fh, ob);
        });
    });

    if (!matched) return null;
    return summarize(errors);
}

function calcMetricsByDay(obsIndex) {
    if (!_snaps.length) return null;
    var byDay = {};

    _snaps.forEach(function(snap) {
        if (!snap.hours) return;
        snap.hours.forEach(function(fh) {
            var key = snapTimeToHourKey(fh.time);
            var ob  = obsIndex[key];
            if (!ob) return;
            var day = key.slice(0, 10);
            if (!byDay[day]) byDay[day] = emptyErrors();
            pushPwsErrors(byDay[day], fh, ob);
        });
    });

    var result = {};
    Object.keys(byDay).sort().forEach(function(day) {
        result[day] = summarize(byDay[day]);
    });
    return result;
}

function calcMetricsByHorizon(obsIndex) {
    if (!_snaps.length) return null;
    var byH = {};

    _snaps.forEach(function(snap) {
        if (!snap.hours) return;
        var snapStart = new Date(snap.savedAt);
        snap.hours.forEach(function(fh) {
            var key = snapTimeToHourKey(fh.time);
            var ob  = obsIndex[key];
            if (!ob) return;
            var horizonH = Math.round((new Date(fh.time) - snapStart) / 3600000);
            var bucket = Math.round(horizonH / 6) * 6;
            if (bucket < 0) return;
            if (!byH[bucket]) byH[bucket] = emptyErrors();
            pushPwsErrors(byH[bucket], fh, ob);
        });
    });

    var result = {};
    Object.keys(byH).sort(function(a,b){ return +a - +b; }).forEach(function(h) {
        result[h] = summarize(byH[h]);
    });
    return result;
}

/* === ГРАФИКИ === */
var _dayMetrics       = null;
var _horizonMetrics   = null;
var _activeChartParam   = "temp";
var _activeHorizonParam = "temp";
var _chartInstance        = null;
var _horizonChartInstance = null;

function makeChart(canvasId, labels, maes, p, getN) {
    var ctx = document.getElementById(canvasId).getContext("2d");
    return new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                data: maes,
                borderColor: p.color,
                backgroundColor: p.color + "22",
                borderWidth: 2,
                pointRadius: 2,
                pointBackgroundColor: p.color,
                tension: 0.3,
                fill: true,
                spanGaps: true
            }]
        },
        options: {
            responsive: true,
            animation: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: function(ctx) {
                            var v = ctx.parsed.y;
                            var n = getN(ctx.dataIndex);
                            return v != null ? v.toFixed(2) + p.unit + (n ? " (n="+n+")" : "") : "—";
                        }
                    }
                }
            },
            scales: {
                x: { ticks:{ color:"#555", font:{size:9}, maxRotation:45 }, grid:{ color:"#1e1e1e" } },
                y: { ticks:{ color:"#555", font:{size:10} }, grid:{ color:"#252525" }, beginAtZero:true }
            }
        }
    });
}

function renderChart(paramKey) {
    _activeChartParam = paramKey;
    document.querySelectorAll(".dp-btn").forEach(function(b){
        b.classList.toggle("active", b.dataset.key === paramKey);
    });
    if (!_dayMetrics) return;
    var days = Object.keys(_dayMetrics).sort();
    if (!days.length) return;
    var p = PARAMS.find(function(x){ return x.key === paramKey; });
    if (!p) return;

    var maes   = days.map(function(d){ var s=_dayMetrics[d][paramKey]; return s ? s.mae : null; });
    var labels = days.map(function(d){ var pts=d.split("-"); return pts[2]+"."+pts[1]; });

    if (_chartInstance) { _chartInstance.destroy(); _chartInstance = null; }
    _chartInstance = makeChart("dayChart", labels, maes, p, function(i){
        var s = _dayMetrics[days[i]] && _dayMetrics[days[i]][paramKey];
        return s ? s.n : null;
    });
}

function renderChartParamRow() {
    document.getElementById("chartParamRow").innerHTML = PARAMS.map(function(p) {
        return '<button class="cp-btn dp-btn'+(p.key===_activeChartParam?" active":"")+'" ' +
               'data-key="'+p.key+'" style="--c:'+p.color+'" ' +
               'onclick="renderChart(\''+p.key+'\')">' + p.label + '</button>';
    }).join("");
}

function renderHorizonChart(paramKey) {
    _activeHorizonParam = paramKey;
    document.querySelectorAll(".hp-btn").forEach(function(b){
        b.classList.toggle("active", b.dataset.key === paramKey);
    });
    if (!_horizonMetrics) return;
    var buckets = Object.keys(_horizonMetrics).map(Number).sort(function(a,b){ return a-b; });
    if (!buckets.length) return;
    var p = PARAMS.find(function(x){ return x.key === paramKey; });
    if (!p) return;

    var maes   = buckets.map(function(h){ var s=_horizonMetrics[h][paramKey]; return s ? s.mae : null; });
    var labels = buckets.map(function(h){ return "+"+h+"ч"; });

    if (_horizonChartInstance) { _horizonChartInstance.destroy(); _horizonChartInstance = null; }
    _horizonChartInstance = makeChart("horizonChart", labels, maes, p, function(i){
        var s = _horizonMetrics[buckets[i]] && _horizonMetrics[buckets[i]][paramKey];
        return s ? s.n : null;
    });
}

function renderHorizonParamRow() {
    var hParams = PARAMS.filter(function(p){ return !p.isFact && p.key !== "windDir"; });
    document.getElementById("horizonParamRow").innerHTML = hParams.map(function(p) {
        return '<button class="cp-btn hp-btn'+(p.key===_activeHorizonParam?" active":"")+'" ' +
               'data-key="'+p.key+'" style="--c:'+p.color+'" ' +
               'onclick="renderHorizonChart(\''+p.key+'\')">' + p.label + '</button>';
    }).join("");
}

/* === РЕНДЕР МЕТРИК === */
function renderMetrics(metrics) {
    var grid = document.getElementById("metricsGrid");
    if (!metrics) {
        grid.innerHTML = '<div style="grid-column:1/-1;color:#666;font-size:13px;padding:20px 0;">' +
            'Нет совпадений снимков с наблюдениями PWS.<br>' +
            'Убедитесь, что в <a href="verify_pws.html" style="color:#ffd166;">Рейтинге PWS</a> загружены данные.</div>';
        return;
    }
    grid.innerHTML = PARAMS.map(function(p) {
        var s = metrics[p.key];
        if (!s) return '<div class="es-card"><div class="es-card-label">'+p.label+'</div>' +
                       '<div style="color:#444;font-size:13px;">нет данных</div></div>';

        if (p.isFact) {
            var correct = s.n - Math.round(s.mae * s.n);
            var pct = Math.round(correct / s.n * 100);
            var fc = pct >= 80 ? "#5fe08f" : pct >= 60 ? "#fdcb6e" : "#ff6b6b";
            return '<div class="es-card">' +
                '<div class="es-card-label">'+p.label+' (факт)</div>' +
                '<div class="es-card-mae" style="color:'+fc+';">'+pct+
                    '<span style="font-size:12px;font-weight:400;color:#666;">% верно</span></div>' +
                '<div class="es-card-sub">верно '+correct+' из '+s.n+'</div></div>';
        }

        var col = maeColor(p.key, s.mae);
        return '<div class="es-card">' +
            '<div class="es-card-label">'+p.label+'</div>' +
            '<div class="es-card-mae" style="color:'+col+';">' +
                s.mae.toFixed(2)+'<span style="font-size:12px;font-weight:400;color:#666;"> MAE'+p.unit+'</span>' +
            '</div>' +
            '<div class="es-card-sub">' +
                'RMSE '+s.rmse.toFixed(2)+p.unit+'<br>' +
                'уклон '+(s.bias>0?"+":"")+s.bias.toFixed(2)+p.unit+biasBadge(s.bias,p.unit)+'<br>' +
                '<span style="color:#444;">n='+s.n+'</span>' +
            '</div></div>';
    }).join("");
}

function renderCoverage(snapCount, obsCount, stationLabel) {
    var totalHours = _snaps.reduce(function(s,h){ return s+(h.hours?h.hours.length:0); },0);
    var dates  = _snaps.map(function(h){ return new Date(h.savedAt); }).filter(function(d){ return !isNaN(d); });
    var oldest = dates.length ? new Date(Math.min.apply(null,dates)) : null;
    var newest = dates.length ? new Date(Math.max.apply(null,dates)) : null;
    var fmt = function(d){ return d ? d.toLocaleString("ru-RU",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}) : "—"; };

    document.getElementById("coverageInfo").innerHTML =
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">' +
            '<div><span style="color:#555;">Снимков</span><br><b style="font-size:17px;">'+snapCount+'</b></div>' +
            '<div><span style="color:#555;">Часов прогноза</span><br><b style="font-size:17px;">'+totalHours+'</b></div>' +
            '<div><span style="color:#555;">Записей PWS</span><br><b style="font-size:17px;">'+obsCount+'</b></div>' +
        '</div>' +
        '<div style="margin-top:10px;color:#555;font-size:12px;">' +
            'Станция: '+stationLabel+'<br>Снимки: '+fmt(oldest)+' → '+fmt(newest) +
        '</div>';
}

function renderSnapshots() {
    var list = document.getElementById("snapshotList");
    if (!_snaps.length) {
        list.innerHTML = '<div style="color:#444;font-size:13px;">Нет снимков. ' +
            'Откройте <a href="forecast.html" style="color:#ffd166;">Прогноз → Ансамбль ⚡</a>.</div>';
        return;
    }
    list.innerHTML = _snaps.slice().reverse().slice(0,20).map(function(h) {
        var d = new Date(h.savedAt);
        var t = isNaN(d) ? "—" : d.toLocaleString("ru-RU",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
        var count = h.hours ? h.hours.length : 0;
        var horizH = h.hours && h.hours.length
            ? Math.round((new Date(h.hours[h.hours.length-1].time)-new Date(h.hours[0].time))/3600000) : 0;
        return '<div class="snap-row"><span class="snap-time">'+t+'</span>' +
               '<span class="snap-hours">'+count+' ч · горизонт '+horizH+' ч</span></div>';
    }).join("");
}

/* === КНОПКИ СТАНЦИЙ === */
function setStation(id) {
    _currentStation = id;
    document.querySelectorAll("#stationBtns button").forEach(function(b){ b.classList.remove("active"); });
    var btn = document.getElementById("epws-st-"+id);
    if (btn) btn.classList.add("active");
    render();
}

(function buildStationButtons() {
    var row = document.getElementById("stationBtns");
    var allBtn = document.createElement("button");
    allBtn.id = "epws-st-all";
    allBtn.textContent = "Все станции";
    allBtn.onclick = function(){ setStation("all"); };
    allBtn.classList.add("active");
    row.appendChild(allBtn);
    if (typeof PWS_SYNC_STATIONS !== "undefined") {
        PWS_SYNC_STATIONS.forEach(function(s) {
            var btn = document.createElement("button");
            btn.id = "epws-st-"+s.id;
            btn.textContent = s.name;
            btn.onclick = function(){ setStation(s.id); };
            row.appendChild(btn);
        });
    }
})();

/* === ГЛАВНЫЙ РЕНДЕР === */
async function render() {
    var snapCount = _snaps.length;
    setStatus("Снимков прогноза: <b>" + snapCount + "</b>");

    if (!snapCount) {
        document.getElementById("metricsGrid").innerHTML =
            '<div style="grid-column:1/-1;color:#666;font-size:13px;padding:20px 0;">' +
            'Снимков нет. Откройте <a href="forecast.html" style="color:#ffd166;">Прогноз → Ансамбль ⚡</a>.</div>';
        renderSnapshots();
        return;
    }

    var result      = buildObsIndex();
    var obsIndex    = result.obsIndex;
    var obsCount    = result.totalRecords;
    var obsKeys     = Object.keys(obsIndex).length;

    var stationLabel = _currentStation === "all"
        ? "Все (" + (typeof PWS_SYNC_STATIONS !== "undefined" ? PWS_SYNC_STATIONS.length : "?") + " станции)"
        : ((typeof PWS_SYNC_STATIONS !== "undefined"
            ? (PWS_SYNC_STATIONS.find(function(s){ return s.id===_currentStation; })||{}).name
            : null) || _currentStation);

    setStatus("Снимков: <b>"+snapCount+"</b> · Часов PWS: <b>"+obsKeys+"</b>");

    var metrics = calcMetrics(obsIndex);

    _dayMetrics = calcMetricsByDay(obsIndex);
    if (_dayMetrics && Object.keys(_dayMetrics).length) {
        document.getElementById("chartSection").style.display = "";
        renderChartParamRow();
        renderChart(_activeChartParam);
    } else {
        document.getElementById("chartSection").style.display = "none";
    }

    _horizonMetrics = calcMetricsByHorizon(obsIndex);
    if (_horizonMetrics && Object.keys(_horizonMetrics).length) {
        document.getElementById("horizonSection").style.display = "";
        renderHorizonParamRow();
        renderHorizonChart(_activeHorizonParam);
    } else {
        document.getElementById("horizonSection").style.display = "none";
    }

    renderMetrics(metrics);
    renderCoverage(snapCount, obsCount, stationLabel);
    renderSnapshots();
}

/* === СТАРТ === */
(async function init() {
    setStatus("☁️ Загрузка снимков с GitHub...");
    await Promise.all([loadSnaps(), loadPwsRaw()]);
    render();
})();
</script>
