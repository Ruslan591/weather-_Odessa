<script>
 /* =============================================
   КОНФИГУРАЦИЯ GITHUB (снимки)
============================================= */
var GITHUB_OWNER   = "ruslan591";
var GITHUB_REPO    = "weather-_Odessa";
var GITHUB_SNAPS_FILE = "data/ensemble_snapshots_pws.json";
var _snapsData = []; // снимки в памяти
var _snapsSha  = null;

function getToken() { return localStorage.getItem("ghToken") || ""; }

async function loadSnapsFromGithub() {
    var url = "https://api.github.com/repos/" + GITHUB_OWNER + "/" + GITHUB_REPO +
              "/contents/" + GITHUB_SNAPS_FILE;
   var token = getToken();
    var r = await fetch(url, { headers:{ "Accept":"application/vnd.github+json", ...(token ? {"Authorization":"Bearer "+token} : {}) }, cache:"no-store" });
    if (r.status !== 404) {
        if (!r.ok) throw new Error("GitHub GET " + r.status);
        var resp = await r.json();
        _snapsSha = resp.sha;
        var content = decodeURIComponent(escape(atob(resp.content.replace(/\n/g,""))));
        _snapsData = JSON.parse(content);
    }
}

async function saveSnapsToGithub() {
    var token = getToken();
    if (!token) return;
    _snapsData.sort(function(a,b){ return (a.savedAt||"") > (b.savedAt||"") ? 1 : -1; });
    if (_snapsData.length > 200) _snapsData = _snapsData.slice(_snapsData.length - 200);
    var encoded = btoa(unescape(encodeURIComponent(JSON.stringify(_snapsData))));
    var body = { message:"ensemble snapshots update", content:encoded };
    if (_snapsSha) body.sha = _snapsSha;
    var r = await fetch("https://api.github.com/repos/" + GITHUB_OWNER + "/" + GITHUB_REPO +
                        "/contents/" + GITHUB_SNAPS_FILE, {
        method: "PUT",
        headers: {
            "Authorization": "Bearer " + token,
            "Content-Type": "application/json",
            "Accept": "application/vnd.github+json"
        },
        body: JSON.stringify(body)
    });
    if (!r.ok) throw new Error("GitHub PUT " + r.status);
    var resp = await r.json();
    if (resp.content) _snapsSha = resp.content.sha;
}   
    
/* =============================================
   ПАРАМЕТРЫ
============================================= */
var PARAMS = [
    { key:"temp",     label:"Температура", unit:"°C",   color:"#ff8f00" },
    { key:"pressure", label:"Давление",    unit:" гПа", color:"#4aa3ff" },
    { key:"wind",     label:"Ветер",       unit:" м/с", color:"#8bc34a" },
    { key:"windGust", label:"Порывы",      unit:" м/с", color:"#ff5722" },
    { key:"windDir",  label:"Направление", unit:"°",    color:"#74b9ff" },
    { key:"humidity", label:"Влажность",   unit:"%",    color:"#00bcd4" },
    { key:"precip",   label:"Осадки",      unit:" мм",  color:"#448aff", isFact:true }
];

var THRESHOLDS = {
    temp:     { good: 1.5, bad: 3.0 },
    pressure: { good: 1.0, bad: 2.5 },
    wind:     { good: 1.5, bad: 3.0 },
    windGust: { good: 2.0, bad: 4.0 },
    windDir:  { good: 30,  bad: 60  },
    humidity: { good: 8,   bad: 15  }
};

var _activeChartParam = "temp";
var _chartInstance    = null;
var _dayMetrics       = null;
var _currentStation   = "all";

/* =============================================
   IndexedDB (та же база что в verify_pws.html)
============================================= */
var db;
var GITHUB_PWS_RAW_FILE = "data/pws_raw.json";
var _pwsRawData = [];

async function loadPwsRaw() {
    var url = "https://api.github.com/repos/" + GITHUB_OWNER + "/" + GITHUB_REPO +
              "/contents/" + GITHUB_PWS_RAW_FILE;
    var token = getToken();
    var r = await fetch(url, { headers: { "Accept": "application/vnd.github+json", ...(token ? {"Authorization":"Bearer "+token} : {}) }, cache: "no-store" });
    if (!r.ok) return [];
    var resp = await r.json();
    var content = decodeURIComponent(escape(atob(resp.content.replace(/\n/g, ""))));
    return JSON.parse(content);
}

/* =============================================
   ВСПОМОГАТЕЛЬНЫЕ
============================================= */

// fh.time из снимка — локальное время UTC+3: "2026-04-25T17:00"
// hourKey в pws_raw — UTC: "2026-04-25T14"
// Конвертируем: вычитаем 3 часа
var PWS_UTC_OFFSET = 3; // UTC+3

function snapTimeToHourKey(timeStr) {
    if (!timeStr) return null;
    // Парсим как локальное время и вычитаем смещение
    var dt = new Date(timeStr + ":00Z"); // трактуем как UTC сначала
    dt.setUTCHours(dt.getUTCHours() - PWS_UTC_OFFSET);
    return dt.getUTCFullYear() + "-" +
        String(dt.getUTCMonth()+1).padStart(2,"0") + "-" +
        String(dt.getUTCDate()).padStart(2,"0") + "T" +
        String(dt.getUTCHours()).padStart(2,"0");
}

function maeColor(key, mae) {
    var t = THRESHOLDS[key];
    if (!t) return "#aaa";
    if (mae <= t.good) return "#5fe08f";
    if (mae <= t.bad)  return "#fdcb6e";
    return "#ff6b6b";
}

function biasBadge(bias, unit) {
    if (Math.abs(bias) < 0.01) return "";
    var sign = bias > 0 ? "▲ завыш" : "▼ занижает";
    var col  = bias > 0 ? "#ff9f5c" : "#74b9ff";
    return '<span class="es-badge" style="background:' + col + '22;color:' + col + '">'
           + sign + " " + Math.abs(bias).toFixed(2) + unit + "</span>";
}

function windDirDiff(a, b) {
    var d = Math.abs(a - b);
    return d > 180 ? 360 - d : d;
}

/* =============================================
   СТРОИМ ИНДЕКС НАБЛЮДЕНИЙ PWS
   Ключ: "2026-04-22T14" (hourKey из verify_pws)
============================================= */
async function buildObsIndex() {
    var all = _pwsRawData;

    if (_currentStation !== "all") {
        all = all.filter(function(d) { return d.stationId === _currentStation; });
    }

    // Группируем по hourKey
    var byHour = {};
    all.forEach(function(rec) {
        if (!rec.hourKey) return;
        var key = rec.hourKey;
        if (!byHour[key]) byHour[key] = [];
        byHour[key].push(rec); // поля temp, wind и т.д. прямо в rec
    });

    // Усредняем по станциям
    var obsIndex = {}; // "2026-04-22T14" -> obs
    Object.keys(byHour).forEach(function(key) {
        var arr = byHour[key];
        function avgField(field) {
            var vals = arr.map(function(o){ return o[field]; }).filter(function(v){ return v != null; });
            if (!vals.length) return null;
            return vals.reduce(function(s,v){ return s+v; }, 0) / vals.length;
        }
        function avgWindDir() {
            var dirs = arr.map(function(o){ return o.windDir; }).filter(function(v){ return v != null; });
            if (!dirs.length) return null;
            var sx = dirs.reduce(function(s,d){ return s + Math.cos(d * Math.PI / 180); }, 0);
            var sy = dirs.reduce(function(s,d){ return s + Math.sin(d * Math.PI / 180); }, 0);
            return (Math.atan2(sy, sx) * 180 / Math.PI + 360) % 360;
        }
        obsIndex[key] = {
            time:     key,
            temp:     avgField("temp"),
            pressure: avgField("pressure"),
            wind:     avgField("wind"),
            windGust: avgField("windGust"),
            windDir:  avgWindDir(),
            humidity: avgField("humidity"),
            precip:   avgField("precip")
        };
    });

    return { obsIndex: obsIndex, totalRecords: all.length };
}

/* =============================================
   РАСЧЁТ МЕТРИК
============================================= */
function calcMetrics(obsIndex) {
    var snapData = _snapsData;
    if (!snapData.length) return null;

    var errors = { temp:[], pressure:[], wind:[], windGust:[], windDir:[], humidity:[], precip:[] };
    var biases  = { temp:[], pressure:[], wind:[], windGust:[], windDir:[], humidity:[], precip:[] };
    var matched = 0;

    snapData.forEach(function(snap) {
        if (!snap.hours) return;
        snap.hours.forEach(function(fh) {
            var key = snapTimeToHourKey(fh.time); // "2026-04-22T14"
            if (!key) return;
            var ob = obsIndex[key];
            if (!ob) return;
            matched++;

            function push(field, fVal, oVal) {
                if (fVal == null || oVal == null) return;
                errors[field].push(Math.abs(fVal - oVal));
                biases[field].push(fVal - oVal);
            }

            push("temp",     fh.temp,     ob.temp);
            push("pressure", fh.pressure, ob.pressure);
            push("wind",     fh.wind,     ob.wind);
            push("windGust", fh.windGust, ob.windGust);
            push("humidity", fh.humidity, ob.humidity);

            if (fh.windDir != null && ob.windDir != null) {
                var d = windDirDiff(fh.windDir, ob.windDir);
                errors.windDir.push(d);
                biases.windDir.push(d);
            }

            // Осадки — факт/не факт (>0.1 мм)
            if (fh.rain != null && ob.precip != null) {
                var fHad = fh.rain   > 0.1 ? 1 : 0;
                var oHad = ob.precip > 0.1 ? 1 : 0;
                errors.precip.push(Math.abs(fHad - oHad)); // 0=верно, 1=ошибка
                biases.precip.push(fHad - oHad);
            }
        });
    });

    if (!matched) return null;

    var result = {};
    PARAMS.forEach(function(p) {
        var k    = p.key;
        var arr  = errors[k];
        var bias = biases[k];
        if (!arr.length) { result[k] = null; return; }
        var mae  = arr.reduce(function(s,v){ return s+v; }, 0) / arr.length;
        var rmse = Math.sqrt(arr.reduce(function(s,v){ return s+v*v; }, 0) / arr.length);
        var b    = bias.reduce(function(s,v){ return s+v; }, 0) / bias.length;
        result[k] = { mae: mae, rmse: rmse, bias: b, n: arr.length };
    });
    return result;
}

/* =============================================
   МЕТРИКИ ПО ДНЯМ
============================================= */
function calcMetricsByDay(obsIndex) {
    var snapData = _snapsData;
    if (!snapData.length) return null;

    var byDay = {};

    snapData.forEach(function(snap) {
        if (!snap.hours) return;
        snap.hours.forEach(function(fh) {
            var key = snapTimeToHourKey(fh.time);
            if (!key) return;
            var ob = obsIndex[key];
            if (!ob) return;
            var day = key.slice(0, 10);
            if (!byDay[day]) byDay[day] = { temp:[], pressure:[], wind:[], windGust:[], windDir:[], humidity:[], precip:[] };

            function push(field, fVal, oVal) {
                if (fVal == null || oVal == null) return;
                byDay[day][field].push(Math.abs(fVal - oVal));
            }
            push("temp",     fh.temp,     ob.temp);
            push("pressure", fh.pressure, ob.pressure);
            push("wind",     fh.wind,     ob.wind);
            push("windGust", fh.windGust, ob.windGust);
            push("humidity", fh.humidity, ob.humidity);
            if (fh.windDir != null && ob.windDir != null)
                byDay[day].windDir.push(windDirDiff(fh.windDir, ob.windDir));
            if (fh.rain != null && ob.precip != null) {
                var fHad = fh.rain   > 0.1 ? 1 : 0;
                var oHad = ob.precip > 0.1 ? 1 : 0;
                byDay[day].precip.push(Math.abs(fHad - oHad));
            }
        });
    });

    var result = {};
    Object.keys(byDay).sort().forEach(function(day) {
        result[day] = {};
        PARAMS.forEach(function(p) {
            var arr = byDay[day][p.key];
            if (!arr || !arr.length) { result[day][p.key] = null; return; }
            result[day][p.key] = {
                mae: arr.reduce(function(s,v){ return s+v; }, 0) / arr.length,
                n:   arr.length
            };
        });
    });
    return result;
}

/* =============================================
   РЕНДЕР МЕТРИК
============================================= */
function renderMetrics(metrics) {
    var grid = document.getElementById("metricsGrid");
    if (!metrics) {
        grid.innerHTML = '<div style="grid-column:1/-1;color:#666;font-size:13px;padding:20px 0;">' +
            'Нет совпадений снимков с наблюдениями PWS.<br>' +
            'Убедитесь, что в <a href="verify_pws.html" style="color:#ffd166;">Рейтинге PWS</a> ' +
            'загружены данные за последние дни.</div>';
        return;
    }
    grid.innerHTML = PARAMS.map(function(p) {
        var s = metrics[p.key];
        if (!s) return '<div class="es-card"><div class="es-card-label">' + p.label +
                       '</div><div style="color:#444;font-size:13px;">нет данных</div></div>';

        // Осадки — факт (% верных)
        if (p.isFact) {
            var correct = s.n - Math.round(s.mae * s.n);
            var pct = Math.round(correct / s.n * 100);
            var fc = pct >= 80 ? "#5fe08f" : pct >= 60 ? "#fdcb6e" : "#ff6b6b";
            return '<div class="es-card">' +
                '<div class="es-card-label">' + p.label + ' (факт)</div>' +
                '<div class="es-card-mae" style="color:' + fc + ';">' + pct +
                    '<span style="font-size:12px;font-weight:400;color:#666;">% верно</span></div>' +
                '<div class="es-card-sub">верно ' + correct + ' из ' + s.n + '</div>' +
            '</div>';
        }

        var col   = maeColor(p.key, s.mae);
        var badge = biasBadge(s.bias, p.unit);
        return '<div class="es-card">' +
            '<div class="es-card-label">' + p.label + '</div>' +
            '<div class="es-card-mae" style="color:' + col + ';">' +
                s.mae.toFixed(2) +
                '<span style="font-size:12px;font-weight:400;color:#666;"> MAE' + p.unit + '</span>' +
            '</div>' +
            '<div class="es-card-sub">' +
                'RMSE ' + s.rmse.toFixed(2) + p.unit + '<br>' +
                'уклон ' + (s.bias > 0 ? "+" : "") + s.bias.toFixed(2) + p.unit + badge + '<br>' +
                '<span style="color:#444;">n=' + s.n + '</span>' +
            '</div>' +
        '</div>';
    }).join("");
}

/* =============================================
   РЕНДЕР ГРАФИКА
============================================= */
function renderChart(paramKey) {
    _activeChartParam = paramKey;
    document.querySelectorAll(".cp-btn").forEach(function(b) {
        b.classList.toggle("active", b.dataset.key === paramKey);
    });
    if (!_dayMetrics) return;
    var days = Object.keys(_dayMetrics).sort();
    if (!days.length) return;

    var p = PARAMS.find(function(x){ return x.key === paramKey; });
    if (!p) return;

    var maes   = days.map(function(d) { var s = _dayMetrics[d][paramKey]; return s ? s.mae : null; });
    var labels = days.map(function(d) { var pts = d.split("-"); return pts[2]+"."+pts[1]; });

    var ctx = document.getElementById("dayChart").getContext("2d");
    if (_chartInstance) { _chartInstance.destroy(); _chartInstance = null; }

    var t = THRESHOLDS[paramKey];
    _chartInstance = new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: "MAE " + p.unit,
                data: maes,
                borderColor: p.color,
                backgroundColor: p.color + "22",
                borderWidth: 2,
                pointRadius: 3,
                pointBackgroundColor: p.color,
                tension: 0.3,
                fill: true,
                spanGaps: true
            }]
        },
        options: {
            responsive: true,
            animation: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: function(ctx) {
                            var v = ctx.parsed.y;
                            var n = _dayMetrics[days[ctx.dataIndex]] && _dayMetrics[days[ctx.dataIndex]][paramKey];
                            return v != null ? v.toFixed(2) + p.unit + (n ? " (n="+n.n+")" : "") : "—";
                        }
                    }
                }
            },
            scales: {
                x: { ticks:{ color:"#555", font:{size:10} }, grid:{ color:"#1e1e1e" } },
                y: { ticks:{ color:"#555", font:{size:10} }, grid:{ color:"#252525" }, beginAtZero:true }
            }
        }
    });
}

function renderChartParamRow() {
    var row = document.getElementById("chartParamRow");
    row.innerHTML = PARAMS.map(function(p) {
        return '<button class="cp-btn' + (p.key === _activeChartParam ? " active" : "") + '" ' +
               'data-key="' + p.key + '" style="--c:' + p.color + '" ' +
               'onclick="renderChart(\'' + p.key + '\')">' + p.label + '</button>';
    }).join("");
}

/* =============================================
   ПОКРЫТИЕ
============================================= */
function renderCoverage(snapCount, obsCount, stationLabel) {
    var totalHours = _snapsData.reduce(function(s,h){ return s + (h.hours ? h.hours.length : 0); }, 0);
    var dates = _snapsData.map(function(h){ return new Date(h.savedAt); }).filter(function(d){ return !isNaN(d); });
    var oldest = dates.length ? new Date(Math.min.apply(null,dates)) : null;
    var newest = dates.length ? new Date(Math.max.apply(null,dates)) : null;
    var fmt = function(d) {
        return d ? d.toLocaleString("ru-RU",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}) : "—";
    };
    document.getElementById("coverageInfo").innerHTML =
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">' +
            '<div><span style="color:#555;">Снимков</span><br><b style="font-size:17px;">' + snapCount + '</b></div>' +
            '<div><span style="color:#555;">Часов прогноза</span><br><b style="font-size:17px;">' + totalHours + '</b></div>' +
            '<div><span style="color:#555;">Записей PWS</span><br><b style="font-size:17px;">' + obsCount + '</b></div>' +
        '</div>' +
        '<div style="margin-top:10px;color:#555;font-size:12px;">' +
            'Станция: ' + stationLabel + '<br>' +
            'Снимки: ' + fmt(oldest) + ' → ' + fmt(newest) +
        '</div>';
}

/* =============================================
   СПИСОК СНИМКОВ
============================================= */
function renderSnapshots() {
    var list = document.getElementById("snapshotList");
    if (!_snapsData.length) {
        list.innerHTML = '<div style="color:#444;font-size:13px;">Нет снимков. ' +
            'Откройте <a href="forecast.html" style="color:#ffd166;">Прогноз → Ансамбль ⚡</a>.</div>';
        return;
    }
    var recent = _snapsData.slice().reverse().slice(0, 20);
    list.innerHTML = recent.map(function(h) {
        var d = new Date(h.savedAt);
        var timeStr = isNaN(d) ? "—"
            : d.toLocaleString("ru-RU",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
        var count = h.hours ? h.hours.length : 0;
        var horizonH = h.hours && h.hours.length
            ? Math.round((new Date(h.hours[h.hours.length-1].time) - new Date(h.hours[0].time)) / 3600000)
            : 0;
        return '<div class="snap-row">' +
            '<span class="snap-time">' + timeStr + '</span>' +
            '<span class="snap-hours">' + count + ' ч · горизонт ' + horizonH + ' ч</span>' +
        '</div>';
    }).join("");
}

async function deleteLastSnapshot() {
    if (!_snapsData.length) return;
    if (!confirm("Удалить последний снимок (" + _snapsData[_snapsData.length-1].savedAt.slice(0,16) + ")?")) return;
    _snapsData.pop();
    await saveSnapsToGithub();
    localStorage.removeItem("ensembleSnapshots");
    render();
}

/* =============================================
   ЭКСПОРТ / ИМПОРТ
============================================= */
function exportSnapshots() {
    if (!_snapsData.length) { alert("Нет снимков для сохранения"); return; }
    var dateStr  = new Date().toISOString().slice(0,10);
    var filename = "ensemble_pws_snapshots_" + dateStr + ".json";
    var blob = new Blob([JSON.stringify({
        _type: "ensemble_snapshots", _source: "PWS",
        exported_at: new Date().toISOString(),
        count: _snapsData.length, snapshots: _snapsData
    }, null, 2)], {type:"application/json"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a"); a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
    setImportStatus("✅ Сохранено: " + _snapsData.length + " снимков → " + filename, "#8bc34a");
}

function importSnapshots(file) {
    var reader = new FileReader();
    reader.onload = async function(e) {
        try {
            var obj      = JSON.parse(e.target.result);
            var incoming = Array.isArray(obj) ? obj : (obj.snapshots || null);
            if (!incoming) { setImportStatus("❌ Неверный формат", "#ff6b6b"); return; }
            var existKeys = {};
            _snapsData.forEach(function(s) {
                var k = s.savedAt ? s.savedAt.slice(0,13) : null;
                if (k) existKeys[k] = true;
            });
            var added = 0;
            incoming.forEach(function(snap) {
                var k = snap.savedAt ? snap.savedAt.slice(0,13) : null;
                if (!k || existKeys[k]) return;
                _snapsData.push(snap); existKeys[k] = true; added++;
            });
            setImportStatus("⏳ Сохраняем на GitHub...", "#aaa");
            await saveSnapsToGithub();
            setImportStatus("✅ Добавлено " + added + ". Всего: " + _snapsData.length, "#8bc34a");
            render();
        } catch(ex) { setImportStatus("❌ " + ex.message, "#ff6b6b"); }
    };
    reader.readAsText(file);
}

function setImportStatus(msg, color) {
    var el = document.getElementById("importStatus");
    if (el) { el.textContent = msg; el.style.color = color || "#aaa"; }
}

function confirmClear() {
    if (!confirm("Удалить все снимки ансамбля?\nМетрики пересчитаются с нуля.")) return;
    _snapsData = [];
    saveSnapsToGithub().catch(function(e){ console.warn("Ошибка очистки:", e); });
    render();
}

/* =============================================
   КНОПКИ СТАНЦИЙ
============================================= */
function setStation(id) {
    _currentStation = id;
    document.querySelectorAll("#stationBtns button").forEach(function(b){
        b.classList.remove("active");
    });
    var btn = document.getElementById("epws-st-" + id);
    if (btn) btn.classList.add("active");
    render();
}

(function buildStationButtons() {
    var row = document.getElementById("stationBtns");

    var allBtn = document.createElement("button");
    allBtn.id = "epws-st-all";
    allBtn.textContent = "Все станции";
    allBtn.onclick = function() { setStation("all"); };
    allBtn.classList.add("active");
    row.appendChild(allBtn);

    if (typeof PWS_STATIONS !== "undefined") {
        PWS_STATIONS.forEach(function(s) {
            var btn = document.createElement("button");
            btn.id = "epws-st-" + s.id;
            btn.textContent = s.name;
            btn.onclick = function() { setStation(s.id); };
            row.appendChild(btn);
        });
    }
})();

/* =============================================
   ГЛАВНЫЙ РЕНДЕР
============================================= */
async function render() {
    var status = document.getElementById("statusLine");

    if (typeof EV === "undefined") {
        status.textContent = "❌ ensembleVerify.js не загружен";
        return;
    }

    var snapCount = _snapsData.length;
    status.innerHTML = "Снимков прогноза: <b>" + snapCount + "</b>";

    if (!snapCount) {
        document.getElementById("metricsGrid").innerHTML =
            '<div style="grid-column:1/-1;color:#666;font-size:13px;padding:20px 0;">' +
            'Снимков нет. Откройте <a href="forecast.html" style="color:#ffd166;">' +
            'Прогноз → Ансамбль ⚡</a> — данные запишутся автоматически.</div>';
        renderSnapshots();
        return;
    }

    try {
        _pwsRawData = await loadPwsRaw();
    } catch(e) {
        status.innerHTML += ' · <span style="color:#ff6b6b;">PWS данные недоступны</span>';
    }

    var result   = await buildObsIndex();
    var obsIndex = result.obsIndex;
    var obsCount = result.totalRecords;

    var stationLabel = _currentStation === "all"
        ? "Все (" + (typeof PWS_STATIONS !== "undefined" ? PWS_STATIONS.length : "?") + " станции)"
        : ((typeof PWS_STATIONS !== "undefined"
            ? (PWS_STATIONS.find(function(s){ return s.id === _currentStation; }) || {}).name
            : null) || _currentStation);

    // Диагностика: показываем сколько ключей в obsIndex
    var obsKeys = Object.keys(obsIndex).length;
    status.innerHTML = "Снимков: <b>" + snapCount + "</b> · Часов PWS: <b>" + obsKeys + "</b>";

    var metrics = calcMetrics(obsIndex);

    _dayMetrics = calcMetricsByDay(obsIndex);
    if (_dayMetrics && Object.keys(_dayMetrics).length) {
        document.getElementById("chartSection").style.display = "";
        renderChartParamRow();
        renderChart(_activeChartParam);
    } else {
        document.getElementById("chartSection").style.display = "none";
    }

    renderMetrics(metrics);
    renderCoverage(snapCount, obsCount, stationLabel);
    renderSnapshots();
}

/* =============================================
   СТАРТ
============================================= */
document.getElementById("importSnapFile").addEventListener("change", function(e) {
    var file = e.target.files[0];
    if (file) { importSnapshots(file); e.target.value = ""; }
});

(async function init() {
    document.getElementById("statusLine").textContent = "☁️ Загрузка снимков с GitHub...";
    try {
        await loadSnapsFromGithub();
    } catch(e) {
        document.getElementById("statusLine").textContent = "⚠️ Ошибка загрузки снимков: " + e.message;
    }
    render();
})();
</script>
