<script>
/* =============================================
   GITHUB
============================================= */
var GITHUB_OWNER     = "ruslan591";
var GITHUB_REPO      = "weather-_Odessa";
var GITHUB_SNAPS_FILE = "data/ensemble_snapshots_synop.json";

var _snapsSha = null;

function getToken() { return localStorage.getItem("ghToken") || ""; }

async function loadSnapsFromGithub() {
    var url = "https://api.github.com/repos/" + GITHUB_OWNER + "/" + GITHUB_REPO +
              "/contents/" + GITHUB_SNAPS_FILE;
    var token = localStorage.getItem("ghToken") || "";
    var r = await fetch(url, { headers: { "Accept": "application/vnd.github+json", ...(token ? {"Authorization":"Bearer "+token} : {}) }, cache: "no-store" });
    if (r.ok) {
        var resp = await r.json();
        _snapsSha = resp.sha;
        var content = decodeURIComponent(escape(atob(resp.content.replace(/\n/g, ""))));
        EV.setSnaps(JSON.parse(content));
    }
    // Если файл не существует — снимков нет, стартуем с пустым массивом
}

async function saveSnapsToGithub() {
    var token = getToken();
    if (!token) { setStatus("❌ Нет токена GitHub"); return; }
    var encoded = btoa(unescape(encodeURIComponent(JSON.stringify(EV.getSnaps()))));
    var body = { message: "ensemble synop snapshots update", content: encoded };
    if (_snapsSha) body.sha = _snapsSha;
    var r = await fetch("https://api.github.com/repos/" + GITHUB_OWNER + "/" + GITHUB_REPO +
                        "/contents/" + GITHUB_SNAPS_FILE, {
        method: "PUT",
        headers: {
            "Authorization": "token " + token,
            "Content-Type": "application/json",
            "Accept": "application/vnd.github+json"
        },
        body: JSON.stringify(body)
    });
    if (r.ok) {
        var resp = await r.json();
        if (resp.content) _snapsSha = resp.content.sha;
    }
} 
    
/* =============================================
   МЕТРИКИ ПО ДНЯМ
============================================= */
var _dayMetrics = null; // { "2025-04-21": { temp:{mae,n}, ... }, ... }
var _activeChartParam = "temp";
var _chartInstance = null;

function calcMetricsByDay(obs) {
    var snapData = EV.getSnaps();
    if (!snapData.length || !obs.length) return null;

    var obsIndex = {};
    obs.forEach(function(o) {
        var key = roundHour(o.time);
        if (key) obsIndex[key] = o;
    });

    // day -> param -> errors[]
    var byDay = {};

    snapData.forEach(function(snap) {
        if (!snap.hours) return;
        snap.hours.forEach(function(fh) {
            var key = roundHour(fh.time);
            var ob  = obsIndex[key];
            if (!ob) return;
            var day = key ? key.slice(0, 10) : null;
            if (!day) return;
            if (!byDay[day]) byDay[day] = { temp:[], pressure:[], wind:[], windDir:[], humidity:[], rain:[], cloudcover:[] };

            if (fh.temp     != null && ob.temp     != null) byDay[day].temp.push(Math.abs(fh.temp - ob.temp));
            if (fh.pressure != null && ob.pressure != null) byDay[day].pressure.push(Math.abs(fh.pressure - ob.pressure));
            if (fh.wind     != null && ob.wind     != null) byDay[day].wind.push(Math.abs(fh.wind - ob.wind));
            if (fh.humidity != null && ob.humidity != null) byDay[day].humidity.push(Math.abs(fh.humidity - ob.humidity));
            var obRain = ob.rain != null ? ob.rain : ob.precip;
            if (fh.rain != null && obRain != null) byDay[day].rain.push(Math.abs(fh.rain - obRain));
            if (fh.cloudcover != null && ob.cloudcover != null) byDay[day].cloudcover.push(Math.abs(fh.cloudcover - ob.cloudcover));
            if (fh.windDir  != null && ob.windDir  != null) {
                var d = Math.abs(fh.windDir - ob.windDir);
                if (d > 180) d = 360 - d;
                byDay[day].windDir.push(d);
            }
        });
    });

    // Считаем MAE по дням
    var result = {};
    Object.keys(byDay).sort().forEach(function(day) {
        result[day] = {};
        Object.keys(byDay[day]).forEach(function(k) {
            var arr = byDay[day][k];
            if (!arr.length) { result[day][k] = null; return; }
            result[day][k] = { mae: arr.reduce(function(s,v){return s+v;},0) / arr.length, n: arr.length };
        });
    });
    return result;
}

function roundHour(timeStr) {
    if (!timeStr) return null;
    // Просто берём первые 13 символов: "2026-04-25T14"
    // Работает и для "2026-04-25T14:00" и для "2026-04-25T14:00:00"
    return timeStr.slice(0, 13);
}

function renderChart(paramKey) {
    _activeChartParam = paramKey;

    // Подсветить активную кнопку
    document.querySelectorAll(".cp-btn").forEach(function(b) {
        b.classList.toggle("active", b.dataset.key === paramKey);
    });

    if (!_dayMetrics) return;
    var days = Object.keys(_dayMetrics).sort();
    if (!days.length) return;

    var p = PARAMS.find(function(x){ return x.key === paramKey; });
    if (!p) return;

    var maes = days.map(function(d) {
        var s = _dayMetrics[d][paramKey];
        return s ? s.mae : null;
    });

    // Подписи — только число.месяц
    var labels = days.map(function(d) {
        var parts = d.split("-");
        return parts[2] + "." + parts[1];
    });

    var ctx = document.getElementById("dayChart").getContext("2d");
    if (_chartInstance) { _chartInstance.destroy(); _chartInstance = null; }

    var t = THRESHOLDS[paramKey];
    var goodLine = t ? t.good : null;
    var badLine  = t ? t.bad  : null;

    _chartInstance = new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: "MAE " + p.unit,
                data: maes,
                borderColor: p.color,
                backgroundColor: p.color + "22",
                borderWidth: 2,
                pointRadius: 3,
                pointBackgroundColor: p.color,
                tension: 0.3,
                fill: true,
                spanGaps: true
            }]
        },
        options: {
            responsive: true,
            animation: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: function(ctx) {
                            var v = ctx.parsed.y;
                            var n = _dayMetrics[days[ctx.dataIndex]] && _dayMetrics[days[ctx.dataIndex]][paramKey];
                            return v != null ? v.toFixed(2) + p.unit + (n ? " (n=" + n.n + ")" : "") : "—";
                        }
                    }
                },
                annotation: goodLine ? {
                    annotations: {
                        good: { type:"line", yMin:goodLine, yMax:goodLine, borderColor:"#5fe08f44", borderWidth:1, borderDash:[4,4] },
                        bad:  { type:"line", yMin:badLine,  yMax:badLine,  borderColor:"#ff6b6b44", borderWidth:1, borderDash:[4,4] }
                    }
                } : {}
            },
            scales: {
                x: { ticks:{ color:"#555", font:{size:10} }, grid:{ color:"#1e1e1e" } },
                y: { ticks:{ color:"#555", font:{size:10} }, grid:{ color:"#252525" }, beginAtZero:true }
            }
        }
    });
}

function renderChartParamRow() {
    var row = document.getElementById("chartParamRow");
    row.innerHTML = PARAMS.map(function(p) {
        return '<button class="cp-btn' + (p.key === _activeChartParam ? " active" : "") + '" ' +
               'data-key="' + p.key + '" style="--c:' + p.color + '" ' +
               'onclick="renderChart(\'' + p.key + '\')">' + p.label + '</button>';
    }).join("");
}

/* =============================================
   ПАРАМЕТРЫ
============================================= */
var PARAMS = [
    { key:"temp",       label:"Температура", unit:"°C",  color:"#ff8f00" },
    { key:"pressure",   label:"Давление",    unit:" гПа",color:"#4aa3ff" },
    { key:"wind",       label:"Ветер",       unit:" м/с",color:"#8bc34a" },
    { key:"windDir",    label:"Направление", unit:"°",   color:"#74b9ff" },
    { key:"humidity",   label:"Влажность",   unit:"%",   color:"#00bcd4" },
    { key:"rain",       label:"Осадки",      unit:"%",   color:"#448aff", isFact:true },
    { key:"cloudcover", label:"Облачность",  unit:"%",   color:"#b0bec5" },
];

/* Пороги MAE — «хорошо» / «плохо» */
var THRESHOLDS = {
    temp:       { good: 1.5, bad: 3.0 },
    pressure:   { good: 1.0, bad: 2.5 },
    wind:       { good: 1.5, bad: 3.0 },
    windDir:    { good: 30,  bad: 60  },
    humidity:   { good: 8,   bad: 15  },
    rain:       { good: 0.5, bad: 1.5 },
    cloudcover: { good: 15,  bad: 30  },
};

function maeColor(key, mae) {
    var t = THRESHOLDS[key];
    if (!t) return "#aaa";
    if (mae <= t.good) return "#5fe08f";
    if (mae <= t.bad)  return "#fdcb6e";
    return "#ff6b6b";
}

function biasBadge(bias, unit) {
    if (Math.abs(bias) < 0.01) return "";
    var sign = bias > 0 ? "▲ завыш" : "▼ занижает";
    var col  = bias > 0 ? "#ff9f5c" : "#74b9ff";
    return '<span class="es-badge" style="background:' + col + '22;color:' + col + '">'
           + sign + ' ' + Math.abs(bias).toFixed(2) + unit + '</span>';
}

/* =============================================
   SYNOP OBS — читаем из GitHub
============================================= */
var GITHUB_OBS_FILE = "data/synop_obs.json";

async function loadSynopObs() {
    var url = "https://api.github.com/repos/" + GITHUB_OWNER + "/" + GITHUB_REPO +
              "/contents/" + GITHUB_OBS_FILE;
    var token = localStorage.getItem("ghToken") || "";
    var r = await fetch(url, { headers: { "Accept": "application/vnd.github+json", ...(token ? {"Authorization":"Bearer "+token} : {}) }, cache: "no-store" });
    if (!r.ok) return [];
    var resp = await r.json();
    var content = decodeURIComponent(escape(atob(resp.content.replace(/\n/g, ""))));
    return JSON.parse(content);
}

/* =============================================
   ЛУЧШАЯ МОДЕЛЬ из modelHistoryProgress
============================================= */
function getBestModelMAE(paramKey) {
    var raw = {};
    try { raw = JSON.parse(localStorage.getItem("modelHistoryProgress") || "{}"); } catch(e) {}
    // paramKey: "temp" -> поле "temp" в прогрессе
    var best = null, bestModel = null;
    Object.keys(raw).forEach(function(m) {
        var v = raw[m] && raw[m][paramKey];
        if (v != null && v > 0) {
            if (best == null || v < best) { best = v; bestModel = m; }
        }
    });
    return bestModel ? { model: bestModel, mae: best } : null;
}

function setStatus(msg) {
    document.getElementById("statusLine").textContent = msg;
}

/* =============================================
   РЕНДЕР
============================================= */
async function render() {
    var status = document.getElementById("statusLine");

    if (typeof EV === "undefined") {
        status.textContent = "❌ ensembleVerify.js не загружен";
        return;
    }

    var snapCount = EV.getSnapshotCount();
    status.innerHTML = "Снимков прогноза: <b>" + snapCount + "</b>";

    if (!snapCount) {
        document.getElementById("metricsGrid").innerHTML =
            '<div style="grid-column:1/-1;color:#666;font-size:13px;padding:20px 0;">' +
            'Снимков нет. Откройте <a href="forecast.html" style="color:#ffd166;">Прогноз → Ансамбль ⚡</a> — данные запишутся автоматически.</div>';
        renderSnapshots();
        return;
    }

    setStatus("Загрузка наблюдений...");
    var synopObs = await loadSynopObs();

    // Строим массив наблюдений
    var obs = [];
    synopObs.forEach(function(rec) {
        if (!rec.synopTime || !rec.obs) return;
        var tk = rec.synopTime;
        var iso = tk.slice(0,4)+"-"+tk.slice(4,6)+"-"+tk.slice(6,8)+"T"+tk.slice(8,10);
        obs.push({ time: iso, temp: rec.obs.temp, pressure: rec.obs.pressure,
                   wind: rec.obs.wind, windDir: rec.obs.windDir,
                   humidity: rec.obs.humidity, rain: rec.obs.precip, precip: rec.obs.precip,
                   cloudcover: rec.obs.cloudcover, ww: rec.obs.ww });
    });

    var metrics = EV.calcMetrics(obs);

    _dayMetrics = calcMetricsByDay(obs);
    if (_dayMetrics && Object.keys(_dayMetrics).length) {
        document.getElementById("chartSection").style.display = "";
        renderChartParamRow();
        renderChart(_activeChartParam);
    }

    renderMetrics(metrics);
    renderCompare(metrics);
    renderCoverage(snapCount, obs.length);
    renderSnapshots();
}

function renderMetrics(metrics) {
    var grid = document.getElementById("metricsGrid");
    if (!metrics) {
        grid.innerHTML = '<div style="grid-column:1/-1;color:#666;font-size:13px;padding:20px 0;">' +
            'Нет совпадений снимков с наблюдениями.<br>Нужна база SYNOP — нажмите «Загрузить свежие» в Рейтинге.</div>';
        return;
    }

    grid.innerHTML = PARAMS.map(function(p) {
        var s = metrics[p.key];
        if (!s) return '<div class="es-card"><div class="es-card-label">' + p.label +
                       '</div><div style="color:#444;font-size:13px;">нет данных</div></div>';

        var col = maeColor(p.key, s.mae);
        var badge = biasBadge(s.bias, p.unit);

        // Осадки — факт (% верных)
        if (p.isFact) {
            var correct = s.n - Math.round(s.mae * s.n);  // mae = доля ошибок
            var pct = Math.round(correct / s.n * 100);
            var fc = pct >= 80 ? "#5fe08f" : pct >= 60 ? "#fdcb6e" : "#ff6b6b";
            return '<div class="es-card">' +
                '<div class="es-card-label">' + p.label + ' (факт)</div>' +
                '<div class="es-card-mae" style="color:' + fc + ';">' + pct +
                    '<span style="font-size:12px;font-weight:400;color:#666;">% верно</span></div>' +
                '<div class="es-card-sub">верно ' + correct + ' из ' + s.n + '</div>' +
            '</div>';
        }

        return '<div class="es-card">' +
            '<div class="es-card-label">' + p.label + '</div>' +
            '<div class="es-card-mae" style="color:' + col + ';">' +
                s.mae.toFixed(2) + '<span style="font-size:12px;font-weight:400;color:#666;"> MAE' + p.unit + '</span>' +
            '</div>' +
            '<div class="es-card-sub">' +
                'RMSE ' + s.rmse.toFixed(2) + p.unit + '<br>' +
                'уклон ' + (s.bias > 0 ? "+" : "") + s.bias.toFixed(2) + p.unit + badge + '<br>' +
                '<span style="color:#444;">n=' + s.n + '</span>' +
            '</div>' +
        '</div>';
    }).join("");

    // Явления — отдельная карточка на всю ширину
    if (metrics._wx) {
        var wx = metrics._wx;
        var col = wx.pct >= 70 ? "#5fe08f" : wx.pct >= 50 ? "#fdcb6e" : "#ff6b6b";
        grid.innerHTML += '<div class="es-card" style="grid-column:1/-1;">' +
            '<div class="es-card-label">ЯВЛЕНИЯ ПОГОДЫ</div>' +
            '<div class="es-card-mae" style="color:' + col + ';">' + wx.pct +
                '<span style="font-size:12px;font-weight:400;color:#666;">% совпадений</span></div>' +
            '<div class="es-card-sub">совпало ' + wx.hits + ' из ' + wx.total + ' случаев<br>' +
                '<span style="color:#444;font-size:10px;">группы: ясно · облачно · туман · дождь · снег · ливень · гроза</span></div>' +
        '</div>';
    }
}

function renderCompare(metrics) {
    if (!metrics) return;
    var section = document.getElementById("compareSection");
    var grid    = document.getElementById("compareGrid");

    // Сравниваем только temp и wind — там есть данные из modelHistoryProgress
    var compareParams = [
        { key:"temp",  label:"Температура", unit:"°C"  },
        { key:"wind",  label:"Ветер",       unit:" м/с"},
        { key:"pressure", label:"Давление", unit:" гПа"},
    ];

    var html = "";
    var hasAny = false;
    compareParams.forEach(function(p) {
        var best = getBestModelMAE(p.key);
        var ens  = metrics[p.key];
        if (!best || !ens) return;
        hasAny = true;
        var diff = ens.mae - best.mae;
        var better = diff < 0;
        var diffStr = (diff > 0 ? "+" : "") + diff.toFixed(2);
        var diffCol = better ? "#5fe08f" : "#ff6b6b";
        var label   = better ? "лучше" : "хуже";
        var bestShort = modelShort(best.model) || best.model;

        html += '<div class="es-card">' +
            '<div class="es-card-label">' + p.label + '</div>' +
            '<div style="font-size:13px;color:#aaa;margin-bottom:4px;">Ансамбль: <b style="color:#fff;">' + ens.mae.toFixed(2) + p.unit + '</b></div>' +
            '<div style="font-size:13px;color:#aaa;margin-bottom:6px;">' + bestShort + ': <b>' + best.mae.toFixed(2) + p.unit + '</b></div>' +
            '<div style="font-size:13px;font-weight:800;color:' + diffCol + ';">' +
                diffStr + p.unit + ' ' + label +
            '</div>' +
        '</div>';
    });

    if (hasAny) {
        section.style.display = "";
        grid.innerHTML = html;
    }
}

function renderCoverage(snapCount, obsCount) {
    var info = document.getElementById("coverageInfo");
    var horizons = EV.getHorizonStats();
    var totalHours = horizons.reduce(function(s, h) { return s + h.count; }, 0);
    var avgHorizon = horizons.length
        ? Math.round(horizons.reduce(function(s, h) { return s + h.horizonH; }, 0) / horizons.length)
        : 0;

    // Самый старый и новый снимок
    var dates = horizons.map(function(h) { return new Date(h.savedAt); }).filter(function(d) { return !isNaN(d); });
    var oldest = dates.length ? new Date(Math.min.apply(null, dates)) : null;
    var newest = dates.length ? new Date(Math.max.apply(null, dates)) : null;
    var fmt = function(d) {
        return d ? d.toLocaleString("ru-RU",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}) : "—";
    };

    info.innerHTML =
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">' +
            '<div><span style="color:#555;">Снимков</span><br><b style="font-size:17px;">' + snapCount + '</b></div>' +
            '<div><span style="color:#555;">Часов прогноза</span><br><b style="font-size:17px;">' + totalHours + '</b></div>' +
            '<div><span style="color:#555;">Средний горизонт</span><br><b style="font-size:17px;">' + avgHorizon + ' ч</b></div>' +
            '<div><span style="color:#555;">Наблюдений в базе</span><br><b style="font-size:17px;">' + obsCount + '</b></div>' +
        '</div>' +
        '<div style="margin-top:10px;color:#555;font-size:12px;">' +
            'Первый: ' + fmt(oldest) + '<br>Последний: ' + fmt(newest) +
        '</div>';
}

function renderSnapshots() {
    var list = document.getElementById("snapshotList");
    var horizons = EV.getHorizonStats();
    if (!horizons.length) {
        list.innerHTML = '<div style="color:#444;font-size:13px;">Нет снимков</div>';
        return;
    }
    // Показываем последние 20, от новых к старым
    var recent = horizons.slice().reverse().slice(0, 20);
    list.innerHTML = recent.map(function(h) {
        var d = new Date(h.savedAt);
        var timeStr = isNaN(d) ? "—"
            : d.toLocaleString("ru-RU",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
        return '<div class="snap-row">' +
            '<span class="snap-time">' + timeStr + '</span>' +
            '<span class="snap-hours">' + h.count + ' ч · горизонт ' + h.horizonH + ' ч</span>' +
        '</div>';
    }).join("");
}

async function confirmClear() {
    if (!confirm("Удалить все снимки ансамбля?\nМетрики пересчитаются с нуля.")) return;
    EV.clearSnapshots();
    await saveSnapsToGithub();
    render();
}

/* =============================================
   СТАРТ
============================================= */
(async function() {
    document.getElementById("statusLine").textContent = "Загрузка снимков с GitHub…";
    await loadSnapsFromGithub();
    render();
})();
</script>
