<script>
/* ── CONFIG ── */
var GITHUB_OWNER      = "ruslan591";
var GITHUB_REPO       = "weather-_Odessa";
var GITHUB_SNAPS_FILE = "data/ensemble_snapshots_synop.json";
var GITHUB_ACC_FILE   = "data/ensemble_accuracy_synop.json";

var _snaps    = [];
var _obsIndex = null;
var _acc      = null;

function getToken() { return localStorage.getItem("ghToken") || ""; }

async function ghGetJson(path) {
    var url = "https://api.github.com/repos/" + GITHUB_OWNER + "/" + GITHUB_REPO + "/contents/" + path;
    var token = getToken();
    var r = await fetch(url, {
        headers: Object.assign(
            { "Accept": "application/vnd.github+json" },
            token ? { "Authorization": "Bearer " + token } : {}
        ),
        cache: "no-store"
    });
    if (!r.ok) return { data: null, sha: null };
    var resp = await r.json();
    if (!resp || !resp.content) return { data: null, sha: null };
    var raw = resp.content.replace(/[\r\n\s]/g, "");
    if (!raw) return { data: null, sha: null };
    var text;
    try {
        text = new TextDecoder().decode(
            Uint8Array.from(atob(raw), function(c) { return c.charCodeAt(0); })
        );
    } catch(e) { return { data: null, sha: null }; }
    try {
        return { data: JSON.parse(text), sha: resp.sha };
    } catch(e) { return { data: null, sha: null }; }
}

async function ghGetText(path) {
    var url = "https://api.github.com/repos/" + GITHUB_OWNER + "/" + GITHUB_REPO + "/contents/" + path;
    var token = getToken();
    var r = await fetch(url, {
        headers: Object.assign(
            { "Accept": "application/vnd.github+json" },
            token ? { "Authorization": "Bearer " + token } : {}
        ),
        cache: "no-store"
    });
    if (!r.ok) return null;
    var resp = await r.json();
    if (!resp || !resp.content) return null;
    var raw = resp.content.replace(/[\r\n\s]/g, "");
    if (!raw) return null;
    try {
        return new TextDecoder().decode(
            Uint8Array.from(atob(raw), function(c) { return c.charCodeAt(0); })
        );
    } catch(e) { return null; }
}

/* ── ПАРАМЕТРЫ ── */
var PARAMS = [
    { key: "temp",       label: "Температура", unit: "°C",   color: "#ff8f00" },
    { key: "pressure",   label: "Давление",    unit: " гПа", color: "#4aa3ff" },
    { key: "wind",       label: "Ветер",       unit: " м/с", color: "#8bc34a" },
    { key: "windDir",    label: "Направление", unit: "°",    color: "#74b9ff" },
    { key: "humidity",   label: "Влажность",   unit: "%",    color: "#00bcd4" },
    { key: "cloudcover", label: "Облачность",  unit: "%",    color: "#b0bec5" },
    { key: "precip",     label: "Осадки",      unit: " мм",  color: "#448aff", isFact: true },
    { key: "visibility", label: "Видимость",   unit: " м",   color: "#ce93d8" },
];

var THRESHOLDS = {
    temp:       { good: 1.5, bad: 3.0 },
    pressure:   { good: 1.0, bad: 2.5 },
    wind:       { good: 1.5, bad: 3.0 },
    windDir:    { good: 30,  bad: 60  },
    humidity:   { good: 8,   bad: 15  },
    cloudcover: { good: 15,  bad: 30  },
    visibility: { good: 500, bad: 2000 },
};

/* ── ПАРСИНГ SYNOP ── */
function safeNum(v) { var n = Number(v); return Number.isFinite(n) ? n : null; }

function pressureFromGroup(g) {
    if (!g) return null;
    var p = parseInt(g.slice(1), 10) / 10;
    return Number.isNaN(p) ? null : (p < 500 ? p + 1000 : p);
}

function signedTenths(g) {
    if (!g || g.length !== 5) return null;
    var sign = g[1] === "1" ? -1 : 1;
    var val  = parseInt(g.slice(2), 10);
    return Number.isNaN(val) ? null : sign * val / 10;
}

function calcRelativeHumidity(tempC, dewC) {
    var t = Number(tempC), td = Number(dewC);
    if (!Number.isFinite(t) || !Number.isFinite(td)) return null;
    var es = 6.112 * Math.exp((17.62 * t)  / (243.12 + t));
    var e  = 6.112 * Math.exp((17.62 * td) / (243.12 + td));
    var rh = (e / es) * 100;
    return Number.isFinite(rh) ? Math.max(0, Math.min(100, Math.round(rh))) : null;
}

function vvToMeters(vv) {
    if (!vv || vv.includes("/")) return null;
    var v = parseInt(vv, 10);
    if (isNaN(v)) return null;
    if (v <= 50)                  return v * 100;
    if (v >= 56 && v <= 80)       return (v - 50) * 1000;
    if (v >= 81 && v <= 88)       return 35000 + (v - 81) * 5000;
    if (v === 89)                  return 70000;
    return null;
}

function parseSynopMinimal(line) {
    var parts = line.trim().split(/\s+/);
    var ai = parts.indexOf("AAXX");
    if (ai === -1) return null;

    var irixhvv = parts[ai + 3] || "";
    var windGrp = parts[ai + 4] || "";
    var iR = irixhvv[0] || "/";

    var totalCloud = null, windDir = null, windSpeed = null;
    if (/^\d{5}$/.test(windGrp)) {
        totalCloud = parseInt(windGrp[0]);
        var dd = parseInt(windGrp.slice(1, 3));
        windDir   = (dd === 0 || isNaN(dd)) ? null : dd * 10;
        var ff    = parseInt(windGrp.slice(3, 5));
        windSpeed = isNaN(ff) ? null : ff;
    }
    var cloudcover = (totalCloud != null && totalCloud !== 9)
        ? Math.round(totalCloud / 8 * 100) : null;

    var vvStr = irixhvv.length >= 5 ? irixhvv.slice(3, 5) : null;

    var temp = null, dew = null, seaP = null, precipGroup = null, weatherNow = null;
    for (var i = ai + 5; i < parts.length; i++) {
        var g = parts[i].replace(/=+$/, "");
        if (g === "333" || g === "444" || g === "555") break;
        if      (/^1[01/]\d{3}$/.test(g))                            temp        = signedTenths(g);
        else if (/^2[01/]\d{3}$/.test(g))                            dew         = signedTenths(g);
        else if (/^4\d{4}$/.test(g))                                  seaP        = pressureFromGroup(g);
        else if (/^6\d{4}$/.test(g) && iR !== "3" && iR !== "4")     precipGroup = g;
        else if (/^7\d{4}$/.test(g))                                  weatherNow  = g.slice(1, 3);
    }

    var precip = null;
    if (iR === "3") {
        precip = 0;
    } else if (precipGroup) {
        var rrr = parseInt(precipGroup.slice(1, 4), 10);
        precip = rrr <= 988 ? rrr : (rrr === 989 ? 0.1 : null);
    }

    return {
        temp:       temp,
        seaPressure: seaP,
        wind:       windSpeed,
        windDir:    windDir,
        humidity:   calcRelativeHumidity(temp, dew),
        cloudcover: cloudcover,
        precip:     precip,
        visibility: vvToMeters(vvStr),
        weatherNow: weatherNow,
    };
}

function parseSynopCsvLine(csvLine) {
    var comma = 0, pos = 0;
    while (comma < 6 && pos < csvLine.length) {
        if (csvLine[pos++] === ",") comma++;
    }
    var meta     = csvLine.slice(0, pos - 1).split(",");
    var telegram = csvLine.slice(pos);
    var hourKey  = meta[1] + "-" + meta[2] + "-" + meta[3] + "T" + meta[4];
    var d = parseSynopMinimal(telegram);
    if (!d) return null;
    return {
        hourKey:    hourKey,
        temp:       d.temp,
        pressure:   d.seaPressure,
        wind:       d.wind,
        windDir:    d.windDir,
        humidity:   d.humidity,
        cloudcover: d.cloudcover,
        precip:     d.precip,
        visibility: d.visibility,
        weatherNow: d.weatherNow,
    };
}

function buildSynopObsIndex(texts) {
    var obsIndex = {};
    texts.forEach(function(text) {
        if (!text) return;
        text.split("\n").forEach(function(line) {
            line = line.trim();
            if (!line) return;
            var rec = parseSynopCsvLine(line);
            if (!rec) return;
            obsIndex[rec.hourKey] = rec;
        });
    });
    return obsIndex;
}

/* ── РАСЧЁТ МЕТРИК ── */
function snapTimeToHourKey(timeStr) {
    return timeStr ? timeStr.slice(0, 13) : null;
}

function windDirDiff(a, b) {
    var d = Math.abs(a - b);
    return d > 180 ? 360 - d : d;
}

function emptyErrors() {
    return { temp:[], pressure:[], wind:[], windDir:[], humidity:[], cloudcover:[], precip:[], visibility:[] };
}

function applyBiasClient(value, key, horizonH, hourUTC) {
    if (value == null || !_acc) return value;
    var byHourUTC = _acc.byHourUTC || {};
    var byHorizon = _acc.byHorizon || {};
    var overall   = _acc.overall   || {};
    var b = null;
    if (hourUTC != null) {
        b = ((byHourUTC[String(hourUTC)] || {})[key] || {}).bias;
    }
    if (b == null && horizonH != null) {
        var hKey = String(Math.round(horizonH / 3) * 3);
        b = ((byHorizon[hKey] || {})[key] || {}).bias;
    }
    if (b == null) b = ((_acc.overallRecent || {})[key] || {}).bias;
    if (b == null) b = (overall[key] || {}).bias;
    if (b == null) return value;
    if (key === "windDir") return ((value - b) % 360 + 360) % 360;
    var result = Math.round((value - b) * 10) / 10;
    if (key === "wind")     result = Math.max(0, result);
    if (key === "humidity" || key === "cloudcover") result = Math.max(0, Math.min(100, result));
    return result;
}

function pushErrors(errors, fh, ob, horizonH, hourUTC) {
    function push(k, fv, ov) {
        if (fv == null || ov == null) return;
        errors[k].push(applyBiasClient(fv, k, horizonH, hourUTC) - ov);
    }
    push("temp",       fh.temp,       ob.temp);
    push("pressure",   fh.pressure,   ob.pressure);
    push("wind",       fh.wind,       ob.wind);
    push("humidity",   fh.humidity,   ob.humidity);
    push("cloudcover", fh.cloudcover, ob.cloudcover);
    push("visibility", fh.visibility, ob.visibility);
    if (fh.windDir != null && ob.windDir != null)
        errors.windDir.push(windDirDiff(applyBiasClient(fh.windDir, "windDir", horizonH, hourUTC), ob.windDir));
    if (fh.rain != null && ob.precip != null)
        errors.precip.push((fh.rain > 0.1 ? 1 : 0) - (ob.precip > 0.1 ? 1 : 0));
}

function summarize(errors) {
    var result = {};
    Object.keys(errors).forEach(function(k) {
        var arr = errors[k];
        if (!arr.length) { result[k] = null; return; }
        var mae  = arr.reduce(function(s,v){ return s + Math.abs(v); }, 0) / arr.length;
        var rmse = Math.sqrt(arr.reduce(function(s,v){ return s + v*v; }, 0) / arr.length);
        var bias = arr.reduce(function(s,v){ return s + v; }, 0) / arr.length;
        result[k] = { mae: mae, rmse: rmse, bias: bias, n: arr.length };
    });
    return result;
}

function calcMetrics(obsIndex) {
    if (!_snaps.length) return null;
    var errors = emptyErrors(), matched = 0;
    _snaps.forEach(function(snap) {
        if (!snap.hours) return;
        var snapStart = new Date(snap.savedAt);
        snap.hours.forEach(function(fh) {
            var ob = obsIndex[snapTimeToHourKey(fh.time)];
            if (!ob) return;
            matched++;
            var horizonH = Math.round((new Date(fh.time + ":00Z") - snapStart) / 3600000);
            var hourUTC  = parseInt(fh.time.slice(11, 13));  // ← добавить
            pushErrors(errors, fh, ob, horizonH, hourUTC);   // ← было horizonH
        });
    });
    return matched ? summarize(errors) : null;
}

function calcMetricsByDay(obsIndex) {
    if (!_snaps.length) return null;
    var byDay = {};
    _snaps.forEach(function(snap) {
        if (!snap.hours) return;
        var snapStart = new Date(snap.savedAt);
        snap.hours.forEach(function(fh) {
            var key = snapTimeToHourKey(fh.time);
            var ob  = obsIndex[key];
            if (!ob) return;
            var day = key.slice(0, 10);
            if (!byDay[day]) byDay[day] = emptyErrors();
            var horizonH = Math.round((new Date(fh.time + ":00Z") - snapStart) / 3600000);
            var hourUTC  = parseInt(fh.time.slice(11, 13));       // ← добавить
            pushErrors(byDay[day], fh, ob, horizonH, hourUTC);    // ← было horizonH
        });
    });
    var result = {};
    Object.keys(byDay).sort().forEach(function(day) { result[day] = summarize(byDay[day]); });
    return result;
}

function calcMetricsByHorizon(obsIndex) {
    if (!_snaps.length) return null;
    var byH = {};
    _snaps.forEach(function(snap) {
        if (!snap.hours) return;
        var snapStart = new Date(snap.savedAt);
        snap.hours.forEach(function(fh) {
            var key = snapTimeToHourKey(fh.time);
            var ob  = obsIndex[key];
            if (!ob) return;
            var horizonH = Math.round((new Date(fh.time + ":00Z") - snapStart) / 3600000);
            var bucket   = Math.round(horizonH / _activeHorizonBucket) * _activeHorizonBucket;
            if (bucket < 0) return;
            if (!byH[bucket]) byH[bucket] = emptyErrors();
            var hourUTC  = parseInt(fh.time.slice(11, 13));       // ← добавить
            pushErrors(byH[bucket], fh, ob, horizonH, hourUTC);   // ← было horizonH
        });
    });
    var result = {};
    Object.keys(byH).sort(function(a,b){ return +a - +b; }).forEach(function(h) {
        result[h] = summarize(byH[h]);
    });
    return result;
}

function calcMetricsByHourUTC(obsIndex) {
    if (!_snaps.length) return null;
    var byH = {};
    _snaps.forEach(function(snap) {
        if (!snap.hours) return;
        var snapStart = new Date(snap.savedAt);
        snap.hours.forEach(function(fh) {
            var key = snapTimeToHourKey(fh.time);
            var ob  = obsIndex[key];
            if (!ob) return;
            var hourUTC  = parseInt(fh.time.slice(11, 13));
            var horizonH = Math.round((new Date(fh.time + ":00Z") - snapStart) / 3600000);
            if (!byH[hourUTC]) byH[hourUTC] = emptyErrors();
            pushErrors(byH[hourUTC], fh, ob, horizonH, hourUTC);
        });
    });
    var result = {};
    Object.keys(byH).sort(function(a, b) { return +a - +b; }).forEach(function(h) {
        result[h] = summarize(byH[h]);
    });
    return result;
}

/* ── ЯВЛЕНИЯ ПОГОДЫ ── */
function wmoToCategory(code) {
    if (code == null) return null;
    if (code <= 1)  return 0; // ясно
    if (code <= 3)  return 1; // облачно
    if (code === 45 || code === 48) return 2; // туман
    if (code >= 51 && code <= 67)   return 3; // дождь/морось
    if (code >= 71 && code <= 77)   return 4; // снег
    if (code >= 80 && code <= 82)   return 5; // ливень
    if (code >= 95)                  return 6; // гроза
    return 1;
}

function synopWwToCategory(ww) {
    if (ww == null) return null;
    var w = parseInt(ww, 10);
    if (isNaN(w)) return null;
    if (w <= 3)  return 0; // ясно
    if (w <= 19) return 1; // облачно/прочее
    if (w <= 29) return null; // прошедшая погода — пропускаем
    if (w <= 39) return 1;
    if (w <= 49) return 2; // туман
    if (w <= 69) return 3; // дождь/морось
    if (w <= 79) return 4; // снег
    if (w <= 89) return 5; // ливень
    return 6;   // гроза
}

function calcWx(obsIndex) {
    var total = 0, hits = 0;
    _snaps.forEach(function(snap) {
        if (!snap.hours) return;
        snap.hours.forEach(function(fh) {
            var ob = obsIndex[snapTimeToHourKey(fh.time)];
            if (!ob || ob.weatherNow == null || fh.weatherCode == null) return;
            var obCat = synopWwToCategory(ob.weatherNow);
            var fcCat = wmoToCategory(fh.weatherCode);
            if (obCat == null || fcCat == null) return;
            total++;
            if (obCat === fcCat) hits++;
        });
    });
    return total > 0 ? { total: total, hits: hits, pct: Math.round(hits / total * 100) } : null;
}

/* ── РЕНДЕР МЕТРИК ── */
function maeColor(key, mae) {
    var t = THRESHOLDS[key];
    if (!t) return "#aaa";
    if (mae <= t.good) return "var(--good)";
    if (mae <= t.bad)  return "var(--warn)";
    return "var(--bad)";
}

function biasBadge(bias, unit) {
    var absBias = Math.abs(bias);
    if (absBias < 0.05)
        return '<span class="bias-badge" style="background:#5fe08f22;color:#5fe08f">✓ точно ' + absBias.toFixed(2) + unit + '</span>';
    var sign = bias > 0 ? "▲ завыш" : "▼ занижает";
    var col  = bias > 0 ? "#ff9f5c" : "#74b9ff";
    return '<span class="bias-badge" style="background:' + col + '22;color:' + col + '">' +
           sign + ' ' + absBias.toFixed(2) + unit + '</span>';
}

function renderMetrics(metrics) {
    var grid = document.getElementById("metricsGrid");
    if (!metrics) {
        grid.innerHTML = '<div class="empty" style="grid-column:1/-1;">Нет совпадений снимков с наблюдениями SYNOP</div>';
        return;
    }
    grid.innerHTML = PARAMS.map(function(p) {
        var s = metrics[p.key];
        if (!s) return '<div class="es-card"><div class="es-card-label">' + p.label + '</div>' +
                       '<div style="color:var(--muted2);font-size:12px;margin-top:4px;">нет данных</div></div>';
        if (p.isFact) {
            var correct = s.n - Math.round(s.mae * s.n);
            var pct = Math.round(correct / s.n * 100);
            var fc  = pct >= 80 ? "var(--good)" : pct >= 60 ? "var(--warn)" : "var(--bad)";
            return '<div class="es-card">' +
                '<div class="es-card-label">' + p.label + ' (факт)</div>' +
                '<div class="es-card-mae" style="color:' + fc + ';">' + pct +
                    '<span> % верно</span></div>' +
                '<div class="es-card-sub">верно ' + correct + ' из ' + s.n + '</div></div>';
        }
        var col = maeColor(p.key, s.mae);
        return '<div class="es-card">' +
            '<div class="es-card-label">' + p.label + '</div>' +
            '<div class="es-card-mae" style="color:' + col + ';">' +
                s.mae.toFixed(2) + '<span> MAE' + p.unit + '</span>' +
            '</div>' +
            '<div class="es-card-sub">' +
                'RMSE ' + s.rmse.toFixed(2) + p.unit + '<br>' +
                'уклон ' + (s.bias > 0 ? "+" : "") + s.bias.toFixed(2) + p.unit +
                biasBadge(s.bias, p.unit) + '<br>' +
                '<span class="n">n=' + s.n + '</span>' +
            '</div></div>';
    }).join("");
}

/* ── СРАВНЕНИЕ С ЛУЧШЕЙ МОДЕЛЬЮ ── */
function getBestModelMAE(paramKey) {
    var raw = {};
    try { raw = JSON.parse(localStorage.getItem("modelHistoryProgress") || "{}"); } catch(e) {}
    var best = null, bestModel = null;
    Object.keys(raw).forEach(function(m) {
        var v = raw[m] && raw[m][paramKey];
        if (v != null && v > 0 && (best == null || v < best)) { best = v; bestModel = m; }
    });
    return bestModel ? { model: bestModel, mae: best } : null;
}

function renderCompare(metrics) {
    if (!metrics) return;
    var cParams = [
        { key: "temp",     label: "Температура", unit: "°C"   },
        { key: "wind",     label: "Ветер",       unit: " м/с" },
        { key: "pressure", label: "Давление",    unit: " гПа" },
    ];
    var html = "", hasAny = false;
    cParams.forEach(function(p) {
        var best = getBestModelMAE(p.key);
        var ens  = metrics[p.key];
        if (!best || !ens) return;
        hasAny = true;
        var diff = ens.mae - best.mae;
        var col  = diff < 0 ? "var(--good)" : "var(--bad)";
        var lbl  = diff < 0 ? "лучше" : "хуже";
        html +=
            '<div class="cmp-card">' +
                '<div class="cmp-label">' + p.label + '</div>' +
                '<div class="cmp-row">Ансамбль: <b>' + ens.mae.toFixed(2) + p.unit + '</b></div>' +
                '<div class="cmp-row">' + (modelShort(best.model) || best.model) + ': <b>' + best.mae.toFixed(2) + p.unit + '</b></div>' +
                '<div class="cmp-diff" style="color:' + col + ';">' +
                    (diff > 0 ? "+" : "") + diff.toFixed(2) + p.unit + ' ' + lbl +
                '</div>' +
            '</div>';
    });
    if (hasAny) {
        document.getElementById("compareSection").style.display = "";
        document.getElementById("compareGrid").innerHTML = html;
    }
}

/* ── ПОКРЫТИЕ ── */
function renderCoverage(snapCount, obsCount) {
    var horizons   = getHorizonStats();
    var totalHours = horizons.reduce(function(s, h) { return s + h.count; }, 0);
    var avgHorizon = horizons.length
        ? Math.round(horizons.reduce(function(s, h) { return s + h.horizonH; }, 0) / horizons.length) : 0;
    var dates  = horizons.map(function(h) { return new Date(h.savedAt); }).filter(function(d) { return !isNaN(d); });
    var oldest = dates.length ? new Date(Math.min.apply(null, dates)) : null;
    var newest = dates.length ? new Date(Math.max.apply(null, dates)) : null;
    var fmt = function(d) {
        return d ? d.toLocaleString("ru-RU", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" }) : "—";
    };
    document.getElementById("coverageInfo").innerHTML =
        '<div class="coverage-grid">' +
            '<div class="coverage-item"><span>Снимков</span><b>' + snapCount + '</b></div>' +
            '<div class="coverage-item"><span>Часов прогноза</span><b>' + totalHours + '</b></div>' +
            '<div class="coverage-item"><span>Средний горизонт</span><b>' + avgHorizon + ' ч</b></div>' +
            '<div class="coverage-item"><span>Наблюдений</span><b>' + (obsCount || "—") + '</b></div>' +
        '</div>' +
        '<div class="coverage-dates">' +
            'Первый: ' + fmt(oldest) + '<br>Последний: ' + fmt(newest) +
        '</div>';
}

/* ── СНИМКИ ── */
function getHorizonStats() {
    return _snaps.map(function(s) {
        var h0 = s.hours && s.hours.length ? new Date(s.hours[0].time) : new Date(s.savedAt);
        var hN = s.hours && s.hours.length ? new Date(s.hours[s.hours.length - 1].time) : h0;
        return { savedAt: s.savedAt, horizonH: Math.round((hN - h0) / 3600000), count: s.hours ? s.hours.length : 0 };
    });
}

function renderSnapshots() {
    var list     = document.getElementById("snapshotList");
    var horizons = getHorizonStats();
    if (!horizons.length) {
        list.innerHTML = '<div class="empty">Нет снимков</div>';
        return;
    }
    list.innerHTML = horizons.slice().reverse().slice(0, 20).map(function(h) {
        var d = new Date(h.savedAt);
        var t = isNaN(d) ? "—" : d.toLocaleString("ru-RU", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" });
        return '<div class="snap-row">' +
               '<span class="snap-time">' + t + '</span>' +
               '<span class="snap-meta">' + h.count + ' ч · горизонт ' + h.horizonH + ' ч</span>' +
               '</div>';
    }).join("");
}

                data: vals,
                borderColor: p.color,
                backgroundColor: p.color + "22",
                borderWidth: 2,

                tension: 0.3,

                spanGaps: true

            scales: {

function setHorizonZoom(maxH) {
    _horizonZoom = maxH;
    applyHorizonZoom();
    document.querySelectorAll("#horizonZoomRow .cp-btn").forEach(function(b) {
        var labels = ["24ч","48ч","96ч","Всё"];
        var vals   = [24, 48, 96, null];
        b.classList.toggle("active", vals[labels.indexOf(b.textContent)] === maxH);
    });
}

function applyHorizonZoom() {
    if (!_horizonChartInstance) return;
    var sc     = _horizonChartInstance.options.scales.x;
    var labels = _horizonChartInstance.data.labels;
    if (_horizonZoom === null) {
        delete sc.min; delete sc.max;
    } else {
        var minLabel = null, maxLabel = null;
        labels.forEach(function(l) {
            var h = parseInt(l.replace("+", ""));
            if (isNaN(h)) return;
            if (h >= 0 && minLabel === null) minLabel = l;
            if (h <= _horizonZoom) maxLabel = l;
        });
        sc.min = minLabel || labels[0];
        sc.max = maxLabel || labels[labels.length - 1];
    }
    _horizonChartInstance.update();
}

var _obsVsFcChartInstance = null;
var _activeObsVsFcParam   = "temp";
var _ovfFrom = null; // строка вида "2026-04-01T00"
var _ovfTo   = null; // строка вида "2026-05-10T23"

function localToUtcHour(localStr) {
    if (!localStr) return null;
    return new Date(localStr).toISOString().slice(0, 13); // "YYYY-MM-DDTHH" UTC
}

function setOvfRange() {
    var f = document.getElementById("ovfFrom").value;
    var t = document.getElementById("ovfTo").value;
    _ovfFrom = localToUtcHour(f);
    _ovfTo   = localToUtcHour(t);
    renderObsVsFcChart();
}

function clearOvfRange() {
    _ovfFrom = _ovfTo = null;
    document.getElementById("ovfFrom").value = "";
    document.getElementById("ovfTo").value   = "";
    renderObsVsFcChart();
}

function buildObsVsFcSeries(paramKey) {
    var fcByHour = {};
    _snaps.forEach(function(snap) {
        if (!snap.hours) return;
        var snapStart = new Date(snap.savedAt);
        snap.hours.forEach(function(fh) {
            var key = snapTimeToHourKey(fh.time);
            if (!_obsIndex[key]) return;
            if (_ovfFrom && key < _ovfFrom) return;
            if (_ovfTo   && key > _ovfTo)   return;
            var val = fh[paramKey];
            if (val == null) return;
            var horizonH = (new Date(fh.time + ":00Z") - snapStart) / 3600000;
            if (horizonH < 0) return;
            if (!fcByHour[key] || horizonH < fcByHour[key].horizonH)
                fcByHour[key] = { val: val, horizonH: horizonH };
        });
    });
    var hours = Object.keys(fcByHour).filter(function(k) {
        return _obsIndex[k] && _obsIndex[k][paramKey] != null;
    }).sort();
    return {
        labels:  hours.map(function(k) {
            return k.slice(8,10) + "." + k.slice(5,7) + " " + k.slice(11,13) + "ч";
        }),
        obsVals: hours.map(function(k) { return _obsIndex[k][paramKey]; }),
        fcVals:  hours.map(function(k) {
            var fc = fcByHour[k];
            var hourUTC = parseInt(k.slice(11, 13));
            return applyBiasClient(fc.val, paramKey, fc.horizonH, hourUTC);
        })
    };
}

/* ── СТАТУС ── */
function setStatus(msg) { document.getElementById("statusLine").innerHTML = msg; }

/* ── ГЛАВНЫЙ РЕНДЕР ── */
async function render() {
    var snapCount = _snaps.length;
    if (!snapCount) {
        document.getElementById("metricsGrid").innerHTML =
            '<div class="empty" style="grid-column:1/-1;">Нет снимков.</div>';
        renderSnapshots();
        setStatus("Снимков: <b>0</b>");
        return;
    }

    setStatus("Загрузка наблюдений SYNOP…");

    var years = {};
    _snaps.forEach(function(s) {
        if (!s.hours) return;
        s.hours.forEach(function(fh) { years[fh.time.slice(0, 4)] = true; });
    });

    var texts = await Promise.all(Object.keys(years).map(function(y) {
        return ghGetText("data/synop_" + y + ".txt");
    }));

    _obsIndex = buildSynopObsIndex(texts);
    var obsCount = Object.keys(_obsIndex).length;

    if (!obsCount) {
        setStatus("❌ SYNOP-наблюдения не загружены. Проверьте токен.");
        return;
    }

    setStatus("Расчёт метрик…");

    var metrics = calcMetrics(_obsIndex);

    renderWx(calcWx(_obsIndex));

    _dayMetrics = calcMetricsByDay(_obsIndex);
    if (_dayMetrics && Object.keys(_dayMetrics).length) {
        document.getElementById("chartSection").style.display = "";
        renderChartParamRow();
        renderChart(_activeChartParam);
    } else {
        document.getElementById("chartSection").style.display = "none";
    }

    _horizonMetrics = calcMetricsByHorizon(_obsIndex);
    if (_horizonMetrics && Object.keys(_horizonMetrics).length) {
        document.getElementById("horizonSection").style.display = "";
        renderHorizonParamRow();
        renderHorizonChart(_activeHorizonParam);
    } else {
        document.getElementById("horizonSection").style.display = "none";
    }

    _hourMetrics = calcMetricsByHourUTC(_obsIndex);
    if (_hourMetrics && Object.keys(_hourMetrics).length) {
        document.getElementById("hourSection").style.display = "";
        renderHourParamRow();
        renderHourChart(_activeHourParam);
    } else {
        document.getElementById("hourSection").style.display = "none";
    }

    if (_obsIndex && Object.keys(_obsIndex).length) {
        document.getElementById("obsVsFcSection").style.display = "";
        renderObsVsFcParamRow();
        renderObsVsFcChart(_activeObsVsFcParam);
    } else {
        document.getElementById("obsVsFcSection").style.display = "none";
    }

    renderMetrics(metrics);
    renderCompare(metrics);
    renderCoverage(snapCount, obsCount);
    renderSnapshots();

    // строка 844, заменить setStatus(...)
var updated = (_acc && _acc.updated)
    ? " · accuracy " + new Date(_acc.updated).toLocaleString("ru-RU",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})
    : "";
setStatus(
    "Снимков: <b>" + snapCount + "</b>" +
    " · наблюдений SYNOP: <b>" + obsCount + "</b>" + updated
);
}

/* ── СТАРТ ── */
(async function() {
    setStatus("Загрузка снимков…");
    var accResult  = await ghGetJson(GITHUB_ACC_FILE);
    _acc = accResult.data;
    var snapResult = await ghGetJson(GITHUB_SNAPS_FILE);
    _snaps = (snapResult.data && Array.isArray(snapResult.data)) ? snapResult.data : [];
    await render();
})();

/* ── УДАЛЕНИЕ СНИМКА ── */
var _snapsSha = null;

async function ghPutJson(path, sha, data) {
    var token = getToken();
    if (!token) { alert("Токен GitHub не задан"); return false; }
    var content = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
    var r = await fetch("https://api.github.com/repos/" + GITHUB_OWNER + "/" + GITHUB_REPO + "/contents/" + path, {
        method: "PUT",
        headers: Object.assign({"Content-Type":"application/json","Accept":"application/vnd.github+json"},
            {"Authorization":"Bearer "+token}),
        body: JSON.stringify({ message: "delete snapshot", sha: sha, content: content })
    });
    return r.ok;
}

function snapLabel(s) {
    var d = new Date(s.savedAt);
    return isNaN(d) ? null : d.toLocaleString("ru-RU",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
}

function openDeleteSnap() {
    var input = prompt("Введите дату снимка (как в таблице, например: 02.05, 21:10)");
    if (!input) return;
    input = input.trim();
    var idx = _snaps.findIndex(function(s){ return snapLabel(s) === input; });
    if (idx === -1) { alert("Снимок не найден: " + input); return; }
    if (!confirm("Удалить снимок " + input + "?")) return;
    deleteSnap(idx);
}

async function deleteSnap(idx) {
    _snaps.splice(idx, 1);
    var result = await ghGetJson(GITHUB_SNAPS_FILE);
    _snapsSha = result.sha;
    var ok = await ghPutJson(GITHUB_SNAPS_FILE, _snapsSha, _snaps);
    if (ok) { alert("Снимок удалён"); await render(); }
    else { alert("Ошибка сохранения"); }
}

/* ── ТОКЕН ── */
function openTokenDialog() {
    var current = localStorage.getItem("ghToken") || "";
    var val = prompt("GitHub токен" + (current ? " (задан)" : " (не задан)"), current);
    if (val === null) return;
    if (val.trim() === "") { localStorage.removeItem("ghToken"); alert("Токен удалён"); }
    else { localStorage.setItem("ghToken", val.trim()); alert("Токен сохранён"); }
}

/* ── GIST ID ── */
function openGistDialog() {
    var current = localStorage.getItem("gistId") || "";
    var val = prompt("Gist ID для live-лога" + (current ? " (задан)" : " (не задан)"), current);
    if (val === null) return;
    if (val.trim() === "") { localStorage.removeItem("gistId"); alert("Gist ID удалён"); }
    else { localStorage.setItem("gistId", val.trim()); alert("Gist ID сохранён"); }
}
