<html lang="ru">
<head>

<link rel="stylesheet" href="css/ensemble_score.css">

<script src="modelCheck.js"></script>

<body>

<div class="header"></div>

<div class="container">

<!-- МЕТРИКИ -->

<!-- ЯВЛЕНИЯ -->

    <div class="section-label">Явления погоды</div>

</div>

<!-- ГРАФИК ПО ДНЯМ -->
<div id="chartSection" style="display:none;margin-bottom:16px;">
    <div class="section-label">Точность по дням</div>
    <div class="chart-section">
        <div id="chartParamRow" class="param-row"></div>
        <canvas id="dayChart" height="160"></canvas>
    </div>
</div>

<!-- ГРАФИК ПО ГОРИЗОНТУ -->
<div id="horizonSection" style="display:none;margin-bottom:16px;">
    <div class="section-label">Точность по горизонту</div>

    <div class="section-label">Сравнение с лучшей моделью</div>

<div class="section-label">Покрытие</div>

    <div id="coverageInfo"><span class="status-line">—</span></div>
</div>

<!-- СНИМКИ -->
<div class="section-label" style="margin-top:16px;">Последние снимки</div>
<div id="snapshotList" class="snap-list"></div>
<div style="text-align:center;margin-top:8px;">
    <button onclick="openDeleteSnap()"
        style="background:none;border:none;color:#333;font-size:11px;cursor:pointer;padding:6px 12px;">
        удалить снимок
    </button>
    <button onclick="openTokenDialog()"
        style="background:none;border:none;color:#333;font-size:11px;cursor:pointer;padding:6px 12px;">
        токен
    </button>
</div>
</div><!-- /container -->

<script>
/* ── CONFIG ── */
var GITHUB_OWNER        = "ruslan591";
var GITHUB_REPO         = "weather-_Odessa";
var GITHUB_ACCURACY_FILE = "data/ensemble_accuracy_synop.json";
var GITHUB_SNAPS_FILE    = "data/ensemble_snapshots_synop.json";

var _snaps = [];
var _acc   = null;

function getToken() { return localStorage.getItem("ghToken") || ""; }

// строки 79–96 — заменить
async function ghGetJson(path) {
    var url = "https://api.github.com/repos/" + GITHUB_OWNER + "/" + GITHUB_REPO + "/contents/" + path;
    var token = getToken();
    var r = await fetch(url, {
        headers: Object.assign(
            { "Accept": "application/vnd.github+json" },
            token ? { "Authorization": "Bearer " + token } : {}
        ),
        cache: "no-store"
    });
    if (!r.ok) return { data: null, sha: null };
    var resp = await r.json();
    if (!resp || !resp.content) return { data: null, sha: null };  // ← добавлено
    var raw  = resp.content.replace(/[\r\n\s]/g, "");              // ← \r\n и пробелы
    if (!raw) return { data: null, sha: null };                    // ← пустой контент
    var text;
    try {
        text = new TextDecoder().decode(
            Uint8Array.from(atob(raw), function(c) { return c.charCodeAt(0); })
        );
    } catch(e) {
        console.error("ghGetJson: base64 decode failed", path, e);
        return { data: null, sha: null };
    }
    try {
        return { data: JSON.parse(text), sha: resp.sha };
    } catch(e) {
        console.error("ghGetJson: JSON.parse failed", path, e, text.slice(0, 200));
        return { data: null, sha: null };
    }
}

/* ── ПАРАМЕТРЫ ── */
var PARAMS = [
    { key: "temp",       label: "Температура", unit: "°C",   color: "#ff8f00" },
    { key: "pressure",   label: "Давление",    unit: " гПа", color: "#4aa3ff" },
    { key: "wind",       label: "Ветер",       unit: " м/с", color: "#8bc34a" },
    { key: "windDir",    label: "Направление", unit: "°",    color: "#74b9ff" },
    { key: "humidity",   label: "Влажность",   unit: "%",    color: "#00bcd4" },
    { key: "cloudcover", label: "Облачность",  unit: "%",    color: "#b0bec5" },
    { key: "precip",     label: "Осадки",      unit: " мм",  color: "#448aff" },
    { key: "visibility", label: "Видимость",   unit: " м",   color: "#ce93d8" },
];

var THRESHOLDS = {
    temp:       { good: 1.5, bad: 3.0 },
    pressure:   { good: 1.0, bad: 2.5 },
    wind:       { good: 1.5, bad: 3.0 },
    windDir:    { good: 30,  bad: 60  },
    humidity:   { good: 8,   bad: 15  },
    cloudcover: { good: 15,  bad: 30  },
    precip:     { good: 0.5, bad: 1.5 },
    visibility: { good: 500, bad: 2000 },
};

function maeColor(key, mae) {
    var t = THRESHOLDS[key];
    if (!t) return "#aaa";
    if (mae <= t.good) return "var(--good)";
    if (mae <= t.bad)  return "var(--warn)";
    return "var(--bad)";
}

function biasBadge(bias, unit) {
    var absBias = Math.abs(bias);
    var t = 0.05; // порог "точно"
    if (absBias < t) {
        return '<span class="bias-badge" style="background:#5fe08f22;color:#5fe08f">✓ точно ' + absBias.toFixed(2) + unit + '</span>';
    }
    var sign = bias > 0 ? "▲ завыш" : "▼ занижает";
    var col  = bias > 0 ? "#ff9f5c" : "#74b9ff";
    return '<span class="bias-badge" style="background:' + col + '22;color:' + col + '">' +
           sign + ' ' + absBias.toFixed(2) + unit + '</span>';
}

/* ── РЕНДЕР МЕТРИК ── */
function renderMetrics(overall) {
    var grid = document.getElementById("metricsGrid");
    if (!overall) {
        grid.innerHTML = '<div class="empty" style="grid-column:1/-1;">Нет данных о точности</div>';
        return;
    }
    grid.innerHTML = PARAMS.map(function(p) {
        var s = overall[p.key];
        if (!s) return '<div class="es-card"><div class="es-card-label">' + p.label + '</div>' +
                       '<div style="color:var(--muted2);font-size:12px;margin-top:4px;">нет данных</div></div>';
        var col = maeColor(p.key, s.mae);
        return '<div class="es-card">' +
            '<div class="es-card-label">' + p.label + '</div>' +
            '<div class="es-card-mae" style="color:' + col + ';">' +
                s.mae.toFixed(2) + '<span> MAE' + p.unit + '</span>' +
            '</div>' +
            '<div class="es-card-sub">' +
                'RMSE ' + s.rmse.toFixed(2) + p.unit + '<br>' +
                'уклон ' + (s.bias > 0 ? "+" : "") + s.bias.toFixed(2) + p.unit +
                biasBadge(s.bias, p.unit) + '<br>' +
                '<span class="n">n=' + s.n + '</span>' +
            '</div>' +
        '</div>';
    }).join("");
}

/* ── ЯВЛЕНИЯ ПОГОДЫ ── */
function renderWx(wx) {
    if (!wx || !wx.total) return;
    var section = document.getElementById("wxSection");
    var card    = document.getElementById("wxCard");
    var pct = wx.pct != null ? wx.pct : Math.round(wx.hits / wx.total * 100);
    var col = pct >= 70 ? "var(--good)" : pct >= 50 ? "var(--warn)" : "var(--bad)";
    var hitW  = Math.round(pct);
    var missW = 100 - hitW;
    card.innerHTML =
        '<div class="es-card es-card--wide">' +
            '<div class="es-card-label">Явления погоды</div>' +
            '<div class="es-card-mae" style="color:' + col + ';">' +
                pct + '<span>% совпадений</span>' +
            '</div>' +
            '<div class="es-card-sub">' +
                'совпало ' + wx.hits + ' из ' + wx.total + ' случаев<br>' +
                '<span style="color:var(--muted2);font-size:10px;">ясно · облачно · туман · дождь · снег · ливень · гроза</span>' +
            '</div>' +
            '<div class="wx-bar" style="margin-top:8px;">' +
                '<div class="wx-bar-hit"  style="flex:' + hitW  + ';"></div>' +
                '<div class="wx-bar-miss" style="flex:' + missW + ';"></div>' +
            '</div>' +
        '</div>';
    section.style.display = "";
}

/* ── СРАВНЕНИЕ С ЛУЧШЕЙ МОДЕЛЬЮ ── */
function getBestModelMAE(paramKey) {
    var raw = {};
    try { raw = JSON.parse(localStorage.getItem("modelHistoryProgress") || "{}"); } catch(e) {}
    var best = null, bestModel = null;
    Object.keys(raw).forEach(function(m) {
        var v = raw[m] && raw[m][paramKey];
        if (v != null && v > 0 && (best == null || v < best)) { best = v; bestModel = m; }
    });
    return bestModel ? { model: bestModel, mae: best } : null;
}

function renderCompare(overall) {
    if (!overall) return;
    var cParams = [
        { key: "temp",     label: "Температура", unit: "°C"   },
        { key: "wind",     label: "Ветер",       unit: " м/с" },
        { key: "pressure", label: "Давление",    unit: " гПа" },
    ];
    var html = "", hasAny = false;
    cParams.forEach(function(p) {
        var best = getBestModelMAE(p.key);
        var ens  = overall[p.key];
        if (!best || !ens) return;
        hasAny = true;
        var diff = ens.mae - best.mae;
        var col  = diff < 0 ? "var(--good)" : "var(--bad)";
        var lbl  = diff < 0 ? "лучше" : "хуже";
        html +=
            '<div class="cmp-card">' +
                '<div class="cmp-label">' + p.label + '</div>' +
                '<div class="cmp-row">Ансамбль: <b>' + ens.mae.toFixed(2) + p.unit + '</b></div>' +
                '<div class="cmp-row">' + (modelShort(best.model) || best.model) + ': <b>' + best.mae.toFixed(2) + p.unit + '</b></div>' +
                '<div class="cmp-diff" style="color:' + col + ';">' +
                    (diff > 0 ? "+" : "") + diff.toFixed(2) + p.unit + ' ' + lbl +
                '</div>' +
            '</div>';
    });
    if (hasAny) {
        document.getElementById("compareSection").style.display = "";
        document.getElementById("compareGrid").innerHTML = html;
    }
}

/* ── ПОКРЫТИЕ ── */
function renderCoverage(snapCount, obsN) {
    var horizons   = getHorizonStats();
    var totalHours = horizons.reduce(function(s, h) { return s + h.count; }, 0);
    var avgHorizon = horizons.length
        ? Math.round(horizons.reduce(function(s, h) { return s + h.horizonH; }, 0) / horizons.length) : 0;
    var dates  = horizons.map(function(h) { return new Date(h.savedAt); }).filter(function(d) { return !isNaN(d); });
    var oldest = dates.length ? new Date(Math.min.apply(null, dates)) : null;
    var newest = dates.length ? new Date(Math.max.apply(null, dates)) : null;
    var fmt = function(d) {
        return d ? d.toLocaleString("ru-RU", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" }) : "—";
    };
    document.getElementById("coverageInfo").innerHTML =
        '<div class="coverage-grid">' +
            '<div class="coverage-item"><span>Снимков</span><b>' + snapCount + '</b></div>' +
            '<div class="coverage-item"><span>Часов прогноза</span><b>' + totalHours + '</b></div>' +
            '<div class="coverage-item"><span>Средний горизонт</span><b>' + avgHorizon + ' ч</b></div>' +
            '<div class="coverage-item"><span>Наблюдений</span><b>' + (obsN || "—") + '</b></div>' +
        '</div>' +
        '<div class="coverage-dates">' +
            'Первый: ' + fmt(oldest) + '<br>Последний: ' + fmt(newest) +
        '</div>';
}

/* ── СНИМКИ ── */
function getHorizonStats() {
    return _snaps.map(function(s) {
        var h0 = s.hours && s.hours.length ? new Date(s.hours[0].time) : new Date(s.savedAt);
        var hN = s.hours && s.hours.length ? new Date(s.hours[s.hours.length - 1].time) : h0;
        return { savedAt: s.savedAt, horizonH: Math.round((hN - h0) / 3600000), count: s.hours ? s.hours.length : 0 };
    });
}

function renderSnapshots() {
    var list     = document.getElementById("snapshotList");
    var horizons = getHorizonStats();
    if (!horizons.length) {
        list.innerHTML = '<div class="empty">Нет снимков</div>';
        return;
    }
    list.innerHTML = horizons.slice().reverse().slice(0, 20).map(function(h) {
        var d = new Date(h.savedAt);
        var t = isNaN(d) ? "—" : d.toLocaleString("ru-RU", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" });
        return '<div class="snap-row">' +
               '<span class="snap-time">' + t + '</span>' +
               '<span class="snap-meta">' + h.count + ' ч · горизонт ' + h.horizonH + ' ч</span>' +
               '</div>';
    }).join("");
}

/* ── ГРАФИКИ ── */
var _dayMetrics     = null;
var _horizonMetrics = null;
var _activeChartParam   = "temp";
var _activeHorizonParam = "temp";
var _activeHorizonMode = "mae";
var _chartInstance        = null;
var _horizonChartInstance = null;

function makeChartOptions(labels, maes, p, getN) {
    return {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                data: maes,
                borderColor: p.color,
                backgroundColor: p.color + "22",
                borderWidth: 2,
                pointRadius: 2,
                pointBackgroundColor: p.color,
                tension: 0.3,
                fill: true,
                spanGaps: true
            }]
        },
        options: {
            responsive: true,
            animation: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: function(ctx) {
                            var v = ctx.parsed.y;
                            var n = getN(ctx.dataIndex);
                            return v != null ? v.toFixed(2) + p.unit + (n ? " (n=" + n + ")" : "") : "—";
                        }
                    }
                }
            },
            scales: {
                x: { ticks: { color: "#555", font: { size: 9 }, maxRotation: 45 }, grid: { color: "#1e1e1e" } },
                y: { ticks: { color: "#555", font: { size: 10 } }, grid: { color: "#252525" }, beginAtZero: true }
            }
        }
    };
}

function renderChart(paramKey) {
    _activeChartParam = paramKey;
    document.querySelectorAll(".dp-btn").forEach(function(b) {
        b.classList.toggle("active", b.dataset.key === paramKey);
    });
    if (!_dayMetrics) return;
    var days = Object.keys(_dayMetrics).sort();
    if (!days.length) return;
    var p = PARAMS.find(function(x) { return x.key === paramKey; });
    if (!p) return;
    var maes   = days.map(function(d) { var s = _dayMetrics[d][paramKey]; return s ? s.mae : null; });
    var labels = days.map(function(d) { var pts = d.split("-"); return pts[2] + "." + pts[1]; });
    var ctx = document.getElementById("dayChart").getContext("2d");
    if (_chartInstance) { _chartInstance.destroy(); _chartInstance = null; }
    _chartInstance = new Chart(ctx, makeChartOptions(labels, maes, p, function(i) {
        var s = _dayMetrics[days[i]] && _dayMetrics[days[i]][paramKey];
        return s ? s.n : null;
    }));
}

function renderChartParamRow() {
    var chartParams = PARAMS.filter(function(p) { return p.key !== "windDir"; });
    document.getElementById("chartParamRow").innerHTML = chartParams.map(function(p) {
        return '<button class="cp-btn dp-btn' + (p.key === _activeChartParam ? " active" : "") + '" ' +
               'data-key="' + p.key + '" style="--c:' + p.color + '" ' +
               'onclick="renderChart(\'' + p.key + '\')">' + p.label + '</button>';
    }).join("");
}

function renderHorizonChart(paramKey, mode) {
    if (paramKey !== undefined) _activeHorizonParam = paramKey;
    if (mode     !== undefined) _activeHorizonMode  = mode;

    document.querySelectorAll(".hp-btn").forEach(function(b) {
        b.classList.toggle("active", b.dataset.key === _activeHorizonParam);
    });
    document.querySelectorAll(".hm-btn").forEach(function(b) {
        b.classList.toggle("active", b.dataset.mode === _activeHorizonMode);
    });

    if (!_horizonMetrics) return;
    var buckets = Object.keys(_horizonMetrics).map(Number).sort(function(a, b) { return a - b; });
    if (!buckets.length) return;
    var p = PARAMS.find(function(x) { return x.key === _activeHorizonParam; });
    if (!p) return;

    var isBias = _activeHorizonMode === "bias";
    var vals   = buckets.map(function(h) {
        var s = _horizonMetrics[h][_activeHorizonParam];
        return s ? (isBias ? s.bias : s.mae) : null;
    });
    var labels = buckets.map(function(h) { return (h >= 0 ? "+" : "") + h + "ч"; });
    var ctx = document.getElementById("horizonChart").getContext("2d");
    if (_horizonChartInstance) { _horizonChartInstance.destroy(); _horizonChartInstance = null; }
    _horizonChartInstance = new Chart(ctx, makeChartOptions(labels, vals, p, function(i) {
        var s = _horizonMetrics[buckets[i]] && _horizonMetrics[buckets[i]][_activeHorizonParam];
        return s ? s.n : null;
    }));
}

function renderHorizonParamRow() {
    var hParams = PARAMS.filter(function(p) { return p.key !== "windDir"; });
    document.getElementById("horizonParamRow").innerHTML =
        hParams.map(function(p) {
            return '<button class="cp-btn hp-btn' + (p.key === _activeHorizonParam ? " active" : "") + '" ' +
                   'data-key="' + p.key + '" style="--c:' + p.color + '" ' +
                   'onclick="renderHorizonChart(\'' + p.key + '\')">' + p.label + '</button>';
        }).join("") +
        '<div style="display:flex;gap:4px;margin-top:6px;">' +
            ['mae','bias'].map(function(m) {
                return '<button class="cp-btn hm-btn' + (m === _activeHorizonMode ? " active" : "") + '" ' +
                       'data-mode="' + m + '" style="--c:#aaa" ' +
                       'onclick="renderHorizonChart(undefined,\'' + m + '\')">' +
                       (m === 'mae' ? 'MAE' : 'Уклон') + '</button>';
            }).join("") +
        '</div>';
}

/* ── СТАТУС ── */
function setStatus(msg) { document.getElementById("statusLine").innerHTML = msg; }

/* ── ГЛАВНЫЙ РЕНДЕР ── */
async function render() {
    setStatus("Загрузка метрик…");
    var accResult = await ghGetJson(GITHUB_ACCURACY_FILE);
    _acc = accResult.data;

    var snapCount = _snaps.length;

    if (!_acc || !_acc.overall) {
        document.getElementById("metricsGrid").innerHTML =
            '<div class="empty" style="grid-column:1/-1;">' +
            'Нет данных точности. Убедитесь, что <b>ensemble_accuracy_synop.json</b> обновлён.</div>';
        renderSnapshots();
        setStatus("Снимков: <b>" + snapCount + "</b>");
        return;
    }

    renderMetrics(_acc.overall);
    renderWx(_acc.wx || null);

    if (_acc.byDay && Object.keys(_acc.byDay).length) {
        _dayMetrics = _acc.byDay;
        document.getElementById("chartSection").style.display = "";
        renderChartParamRow();
        renderChart(_activeChartParam);
    }

    if (_acc.byHorizon && Object.keys(_acc.byHorizon).length) {
        _horizonMetrics = _acc.byHorizon;
        document.getElementById("horizonSection").style.display = "";
        renderHorizonParamRow();
        renderHorizonChart(_activeHorizonParam);
    }

    renderCompare(_acc.overall);
    renderCoverage(snapCount, _acc.overall.temp ? _acc.overall.temp.n : 0);
    renderSnapshots();

    var updated = _acc.updated ? new Date(_acc.updated).toLocaleString("ru-RU", {
        day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit"
    }) : null;

    setStatus(
        "Снимков: <b>" + snapCount + "</b>" +
        (_acc.overall.temp ? " · наблюдений: <b>" + _acc.overall.temp.n + "</b>" : "") +
        (updated ? " · обновлено " + updated : "")
    );
}

/* ── СТАРТ ── */
(async function() {
    setStatus("Загрузка снимков…");
    var snapResult = await ghGetJson(GITHUB_SNAPS_FILE);
    _snaps = (snapResult.data && Array.isArray(snapResult.data)) ? snapResult.data : [];
    await render();
})();

/* ── УДАЛЕНИЕ СНИМКА ── */
var _snapsSha = null;

async function ghPutJson(path, sha, data) {
    var token = getToken();
    if (!token) { alert("Токен GitHub не задан"); return false; }
    var content = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
    var r = await fetch("https://api.github.com/repos/" + GITHUB_OWNER + "/" + GITHUB_REPO + "/contents/" + path, {
        method: "PUT",
        headers: Object.assign({"Content-Type":"application/json","Accept":"application/vnd.github+json"},
            {"Authorization":"Bearer "+token}),
        body: JSON.stringify({ message: "delete snapshot", sha: sha, content: content })
    });
    return r.ok;
}

function snapLabel(s) {
    var d = new Date(s.savedAt);
    return isNaN(d) ? null : d.toLocaleString("ru-RU",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
}

function openDeleteSnap() {
    var input = prompt("Введите дату снимка (как в таблице, например: 02.05, 21:10)");
    if (!input) return;
    input = input.trim();
    var idx = _snaps.findIndex(function(s){ return snapLabel(s) === input; });
    if (idx === -1) { alert("Снимок не найден: " + input); return; }
    if (!confirm("Удалить снимок " + input + "?")) return;
    deleteSnap(idx);
}

async function deleteSnap(idx) {
    _snaps.splice(idx, 1);
    var result = await ghGetJson(GITHUB_SNAPS_FILE);
    _snapsSha = result.sha;
    var ok = await ghPutJson(GITHUB_SNAPS_FILE, _snapsSha, _snaps);
    if (ok) { alert("Снимок удалён"); await render(); }
    else { alert("Ошибка сохранения"); }
}

/* ── ТОКЕН ── */
function openTokenDialog() {
    var current = localStorage.getItem("ghToken") || "";
    var val = prompt("GitHub токен" + (current ? " (задан)" : " (не задан)"), current);
    if (val === null) return;
    if (val.trim() === "") {
        localStorage.removeItem("ghToken");
        alert("Токен удалён");
    } else {
        localStorage.setItem("ghToken", val.trim());
        alert("Токен сохранён");
    }
}

</script>
