<script>
/* === GITHUB === */
var GITHUB_OWNER      = "ruslan591";
var GITHUB_REPO       = "weather-_Odessa";
var GITHUB_SNAPS_FILE = "data/ensemble_snapshots_synop.json";
var GITHUB_OBS_FILE   = "data/synop_obs.json";

var _snaps = [];

function getToken() { return localStorage.getItem("ghToken") || ""; }

async function ghGetJson(path) {
    var url = "https://api.github.com/repos/" + GITHUB_OWNER + "/" + GITHUB_REPO + "/contents/" + path;
    var token = getToken();
    var r = await fetch(url, {
        headers: Object.assign({"Accept":"application/vnd.github+json"}, token ? {"Authorization":"Bearer "+token} : {}),
        cache: "no-store"
    });
    if (!r.ok) return { data: null, sha: null };
    var resp = await r.json();
    var raw = resp.content.replace(/\n/g, "");
    var content = new TextDecoder().decode(Uint8Array.from(atob(raw), function(c){ return c.charCodeAt(0); }));
    return { data: JSON.parse(content), sha: resp.sha };
}

async function loadSnaps() {
    var result = await ghGetJson(GITHUB_SNAPS_FILE);
    _snaps = (result.data && Array.isArray(result.data)) ? result.data : [];
}

async function loadSynopObs() {
    var result = await ghGetJson(GITHUB_OBS_FILE);
    return (result.data && Array.isArray(result.data)) ? result.data : [];
}

/* === ВСПОМОГАТЕЛЬНЫЕ === */
function roundHour(t) {
    return t ? t.slice(0, 13) : null;
}

function buildObsIndex(obs) {
    var idx = {};
    obs.forEach(function(o) {
        var k = roundHour(o.time);
        if (k) idx[k] = o;
    });
    return idx;
}

function wmoGroup(code) {
    if (code == null) return null;
    if (code <= 1)  return "clear";
    if (code <= 3)  return "cloudy";
    if (code === 45 || code === 48) return "fog";
    if (code >= 51 && code <= 67)   return "rain";
    if (code >= 71 && code <= 77)   return "snow";
    if (code >= 80 && code <= 94)   return "shower";
    if (code >= 95) return "thunder";
    return "cloudy";
}

function synopGroup(ww) {
    if (ww == null) return null;
    if (ww <= 1)  return "clear";
    if (ww <= 39) return "cloudy";
    if (ww >= 40 && ww <= 49) return "fog";
    if (ww >= 50 && ww <= 69) return "rain";
    if (ww >= 70 && ww <= 79) return "snow";
    if (ww >= 80 && ww <= 90) return "shower";
    if (ww >= 91 && ww <= 99) return "thunder";
    return null;
}

function getHorizonStats() {
    return _snaps.map(function(s) {
        var h0 = s.hours && s.hours.length ? new Date(s.hours[0].time) : new Date(s.savedAt);
        var hN = s.hours && s.hours.length ? new Date(s.hours[s.hours.length-1].time) : h0;
        return { savedAt: s.savedAt, horizonH: Math.round((hN-h0)/3600000), count: s.hours ? s.hours.length : 0 };
    });
}

/* === ПАРАМЕТРЫ === */
var PARAMS = [
    { key:"temp",       label:"Температура", unit:"°C",  color:"#ff8f00" },
    { key:"pressure",   label:"Давление",    unit:" гПа",color:"#4aa3ff" },
    { key:"wind",       label:"Ветер",       unit:" м/с",color:"#8bc34a" },
    { key:"windDir",    label:"Направление", unit:"°",   color:"#74b9ff" },
    { key:"humidity",   label:"Влажность",   unit:"%",   color:"#00bcd4" },
    { key:"rain",       label:"Осадки",      unit:"%",   color:"#448aff", isFact:true },
    { key:"cloudcover", label:"Облачность",  unit:"%",   color:"#b0bec5" },
];

var THRESHOLDS = {
    temp:       { good:1.5, bad:3.0 },
    pressure:   { good:1.0, bad:2.5 },
    wind:       { good:1.5, bad:3.0 },
    windDir:    { good:30,  bad:60  },
    humidity:   { good:8,   bad:15  },
    rain:       { good:0.5, bad:1.5 },
    cloudcover: { good:15,  bad:30  },
};

/* === РАСЧЁТ МЕТРИК === */
function pushErrors(errors, fh, ob) {
    if (fh.temp      != null && ob.temp      != null) errors.temp.push(fh.temp - ob.temp);
    if (fh.pressure  != null && ob.pressure  != null) errors.pressure.push(fh.pressure - ob.pressure);
    if (fh.wind      != null && ob.wind      != null) errors.wind.push(fh.wind - ob.wind);
    if (fh.humidity  != null && ob.humidity  != null) errors.humidity.push(fh.humidity - ob.humidity);
    if (fh.cloudcover!= null && ob.cloudcover!= null) errors.cloudcover.push(fh.cloudcover - ob.cloudcover);
    var obRain = ob.rain != null ? ob.rain : (ob.precip != null ? ob.precip : null);
    if (fh.rain != null && obRain != null)
        errors.rain.push((fh.rain > 0.1 ? 1 : 0) - (obRain > 0.1 ? 1 : 0));
    if (fh.windDir != null && ob.windDir != null) {
        var d = Math.abs(fh.windDir - ob.windDir);
        if (d > 180) d = 360 - d;
        errors.windDir.push(d);
    }
}

function emptyErrors() {
    return { temp:[], pressure:[], wind:[], windDir:[], humidity:[], rain:[], cloudcover:[] };
}

function summarize(errors) {
    var result = {};
    Object.keys(errors).forEach(function(k) {
        var arr = errors[k];
        if (!arr.length) { result[k] = null; return; }
        var mae  = arr.reduce(function(s,v){ return s+Math.abs(v); },0) / arr.length;
        var rmse = Math.sqrt(arr.reduce(function(s,v){ return s+v*v; },0) / arr.length);
        var bias = arr.reduce(function(s,v){ return s+v; },0) / arr.length;
        result[k] = { mae:mae, rmse:rmse, bias:bias, n:arr.length };
    });
    return result;
}

function calcMetrics(obs) {
    if (!_snaps.length || !obs.length) return null;
    var obsIndex = buildObsIndex(obs);
    var errors = emptyErrors();
    var wxHits = 0, wxTotal = 0;

    _snaps.forEach(function(snap) {
        if (!snap.hours) return;
        snap.hours.forEach(function(fh) {
            var ob = obsIndex[roundHour(fh.time)];
            if (!ob) return;
            pushErrors(errors, fh, ob);
            if (fh.weatherCode != null && ob.ww != null) {
                var fg = wmoGroup(fh.weatherCode), og = synopGroup(ob.ww);
                if (fg != null && og != null) { wxTotal++; if (fg === og) wxHits++; }
            }
        });
    });

    var result = summarize(errors);
    result._wx = wxTotal > 0 ? { hits:wxHits, total:wxTotal, pct:Math.round(wxHits/wxTotal*100) } : null;
    return result;
}

function calcMetricsByDay(obs) {
    if (!_snaps.length || !obs.length) return null;
    var obsIndex = buildObsIndex(obs);
    var byDay = {};

    _snaps.forEach(function(snap) {
        if (!snap.hours) return;
        snap.hours.forEach(function(fh) {
            var key = roundHour(fh.time);
            var ob  = obsIndex[key];
            if (!ob) return;
            var day = key.slice(0, 10);
            if (!byDay[day]) byDay[day] = emptyErrors();
            pushErrors(byDay[day], fh, ob);
        });
    });

    var result = {};
    Object.keys(byDay).sort().forEach(function(day) {
        result[day] = summarize(byDay[day]);
    });
    return result;
}

function calcMetricsByHorizon(obs) {
    if (!_snaps.length || !obs.length) return null;
    var obsIndex = buildObsIndex(obs);
    var byH = {};

    _snaps.forEach(function(snap) {
        if (!snap.hours) return;
        var snapStart = new Date(snap.savedAt);
        snap.hours.forEach(function(fh) {
            var ob = obsIndex[roundHour(fh.time)];
            if (!ob) return;
            var horizonH = Math.round((new Date(fh.time) - snapStart) / 3600000);
            var bucket = Math.round(horizonH / 6) * 6;
            if (bucket < 0) return;
            if (!byH[bucket]) byH[bucket] = emptyErrors();
            pushErrors(byH[bucket], fh, ob);
        });
    });

    var result = {};
    Object.keys(byH).sort(function(a,b){ return +a - +b; }).forEach(function(h) {
        result[h] = summarize(byH[h]);
    });
    return result;
}

/* === ГРАФИКИ === */
var _dayMetrics     = null;
var _horizonMetrics = null;
var _activeChartParam   = "temp";
var _activeHorizonParam = "temp";
var _chartInstance        = null;
var _horizonChartInstance = null;

function makeChartOptions(labels, maes, p, getN) {
    var t = THRESHOLDS[p.key];
    return {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                data: maes,
                borderColor: p.color,
                backgroundColor: p.color + "22",
                borderWidth: 2,
                pointRadius: 2,
                pointBackgroundColor: p.color,
                tension: 0.3,
                fill: true,
                spanGaps: true
            }]
        },
        options: {
            responsive: true,
            animation: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: function(ctx) {
                            var v = ctx.parsed.y;
                            var n = getN(ctx.dataIndex);
                            return v != null ? v.toFixed(2) + p.unit + (n ? " (n="+n+")" : "") : "—";
                        }
                    }
                }
            },
            scales: {
                x: { ticks:{ color:"#555", font:{size:9}, maxRotation:45 }, grid:{ color:"#1e1e1e" } },
                y: { ticks:{ color:"#555", font:{size:10} }, grid:{ color:"#252525" }, beginAtZero:true }
            }
        }
    };
}

function renderChart(paramKey) {
    _activeChartParam = paramKey;
    document.querySelectorAll(".dp-btn").forEach(function(b){
        b.classList.toggle("active", b.dataset.key === paramKey);
    });
    if (!_dayMetrics) return;
    var days = Object.keys(_dayMetrics).sort();
    if (!days.length) return;
    var p = PARAMS.find(function(x){ return x.key === paramKey; });
    if (!p) return;

    var maes   = days.map(function(d){ var s=_dayMetrics[d][paramKey]; return s ? s.mae : null; });
    var labels = days.map(function(d){ var pts=d.split("-"); return pts[2]+"."+pts[1]; });

    var ctx = document.getElementById("dayChart").getContext("2d");
    if (_chartInstance) { _chartInstance.destroy(); _chartInstance = null; }
    _chartInstance = new Chart(ctx, makeChartOptions(labels, maes, p, function(i){
        var s = _dayMetrics[days[i]] && _dayMetrics[days[i]][paramKey];
        return s ? s.n : null;
    }));
}

function renderChartParamRow() {
    document.getElementById("chartParamRow").innerHTML = PARAMS.map(function(p) {
        return '<button class="cp-btn dp-btn' + (p.key===_activeChartParam?" active":"") + '" ' +
               'data-key="'+p.key+'" style="--c:'+p.color+'" ' +
               'onclick="renderChart(\''+p.key+'\')">' + p.label + '</button>';
    }).join("");
}

function renderHorizonChart(paramKey) {
    _activeHorizonParam = paramKey;
    document.querySelectorAll(".hp-btn").forEach(function(b){
        b.classList.toggle("active", b.dataset.key === paramKey);
    });
    if (!_horizonMetrics) return;
    var buckets = Object.keys(_horizonMetrics).map(Number).sort(function(a,b){ return a-b; });
    if (!buckets.length) return;
    var p = PARAMS.find(function(x){ return x.key === paramKey; });
    if (!p) return;

    var maes   = buckets.map(function(h){ var s=_horizonMetrics[h][paramKey]; return s ? s.mae : null; });
    var labels = buckets.map(function(h){ return "+"+h+"ч"; });

    var ctx = document.getElementById("horizonChart").getContext("2d");
    if (_horizonChartInstance) { _horizonChartInstance.destroy(); _horizonChartInstance = null; }
    _horizonChartInstance = new Chart(ctx, makeChartOptions(labels, maes, p, function(i){
        var s = _horizonMetrics[buckets[i]] && _horizonMetrics[buckets[i]][paramKey];
        return s ? s.n : null;
    }));
}

function renderHorizonParamRow() {
    var hParams = PARAMS.filter(function(p){ return !p.isFact && p.key !== "windDir"; });
    document.getElementById("horizonParamRow").innerHTML = hParams.map(function(p) {
        return '<button class="cp-btn hp-btn' + (p.key===_activeHorizonParam?" active":"") + '" ' +
               'data-key="'+p.key+'" style="--c:'+p.color+'" ' +
               'onclick="renderHorizonChart(\''+p.key+'\')">' + p.label + '</button>';
    }).join("");
}

/* === RENDER HELPERS === */
function maeColor(key, mae) {
    var t = THRESHOLDS[key];
    if (!t) return "#aaa";
    if (mae <= t.good) return "#5fe08f";
    if (mae <= t.bad)  return "#fdcb6e";
    return "#ff6b6b";
}

function biasBadge(bias, unit) {
    if (Math.abs(bias) < 0.01) return "";
    var sign = bias > 0 ? "▲ завыш" : "▼ занижает";
    var col  = bias > 0 ? "#ff9f5c" : "#74b9ff";
    return '<span class="es-badge" style="background:'+col+'22;color:'+col+'">'+sign+' '+Math.abs(bias).toFixed(2)+unit+'</span>';
}

function getBestModelMAE(paramKey) {
    var raw = {};
    try { raw = JSON.parse(localStorage.getItem("modelHistoryProgress") || "{}"); } catch(e) {}
    var best = null, bestModel = null;
    Object.keys(raw).forEach(function(m) {
        var v = raw[m] && raw[m][paramKey];
        if (v != null && v > 0 && (best == null || v < best)) { best = v; bestModel = m; }
    });
    return bestModel ? { model:bestModel, mae:best } : null;
}

function setStatus(msg) { document.getElementById("statusLine").textContent = msg; }

/* === РЕНДЕР === */
async function render() {
    var snapCount = _snaps.length;
    document.getElementById("statusLine").innerHTML = "Снимков прогноза: <b>" + snapCount + "</b>";

    if (!snapCount) {
        document.getElementById("metricsGrid").innerHTML =
            '<div style="grid-column:1/-1;color:#666;font-size:13px;padding:20px 0;">' +
            'Снимков нет. Откройте <a href="forecast.html" style="color:#ffd166;">Прогноз → Ансамбль ⚡</a> — данные запишутся автоматически.</div>';
        renderSnapshots();
        return;
    }

    setStatus("Загрузка наблюдений...");
    var synopObs = await loadSynopObs();

    var obs = [];
    synopObs.forEach(function(rec) {
        if (!rec.synopTime || !rec.obs) return;
        var tk = rec.synopTime;
        var iso = tk.slice(0,4)+"-"+tk.slice(4,6)+"-"+tk.slice(6,8)+"T"+tk.slice(8,10);
        obs.push({ time:iso, temp:rec.obs.temp, pressure:rec.obs.pressure,
                   wind:rec.obs.wind, windDir:rec.obs.windDir,
                   humidity:rec.obs.humidity, rain:rec.obs.precip, precip:rec.obs.precip,
                   cloudcover:rec.obs.cloudcover, ww:rec.obs.ww });
    });

    var metrics = calcMetrics(obs);

    _dayMetrics = calcMetricsByDay(obs);
    if (_dayMetrics && Object.keys(_dayMetrics).length) {
        document.getElementById("chartSection").style.display = "";
        renderChartParamRow();
        renderChart(_activeChartParam);
    }

    _horizonMetrics = calcMetricsByHorizon(obs);
    if (_horizonMetrics && Object.keys(_horizonMetrics).length) {
        document.getElementById("horizonSection").style.display = "";
        renderHorizonParamRow();
        renderHorizonChart(_activeHorizonParam);
    }

    renderMetrics(metrics);
    renderCompare(metrics);
    renderCoverage(snapCount, obs.length);
    renderSnapshots();
    document.getElementById("statusLine").innerHTML =
        "Снимков: <b>" + snapCount + "</b> · наблюдений: <b>" + obs.length + "</b>";
}

function renderMetrics(metrics) {
    var grid = document.getElementById("metricsGrid");
    if (!metrics) {
        grid.innerHTML = '<div style="grid-column:1/-1;color:#666;font-size:13px;padding:20px 0;">' +
            'Нет совпадений снимков с наблюдениями.</div>';
        return;
    }

    grid.innerHTML = PARAMS.map(function(p) {
        var s = metrics[p.key];
        if (!s) return '<div class="es-card"><div class="es-card-label">'+p.label+'</div>' +
                       '<div style="color:#444;font-size:13px;">нет данных</div></div>';
        var col = maeColor(p.key, s.mae);

        if (p.isFact) {
            var correct = s.n - Math.round(s.mae * s.n);
            var pct = Math.round(correct / s.n * 100);
            var fc = pct >= 80 ? "#5fe08f" : pct >= 60 ? "#fdcb6e" : "#ff6b6b";
            return '<div class="es-card">' +
                '<div class="es-card-label">'+p.label+' (факт)</div>' +
                '<div class="es-card-mae" style="color:'+fc+';">'+pct+
                    '<span style="font-size:12px;font-weight:400;color:#666;">% верно</span></div>' +
                '<div class="es-card-sub">верно '+correct+' из '+s.n+'</div></div>';
        }

        return '<div class="es-card">' +
            '<div class="es-card-label">'+p.label+'</div>' +
            '<div class="es-card-mae" style="color:'+col+';">' +
                s.mae.toFixed(2)+'<span style="font-size:12px;font-weight:400;color:#666;"> MAE'+p.unit+'</span>' +
            '</div>' +
            '<div class="es-card-sub">' +
                'RMSE '+s.rmse.toFixed(2)+p.unit+'<br>' +
                'уклон '+(s.bias>0?"+":"")+s.bias.toFixed(2)+p.unit+biasBadge(s.bias,p.unit)+'<br>' +
                '<span style="color:#444;">n='+s.n+'</span>' +
            '</div></div>';
    }).join("");

    if (metrics._wx) {
        var wx = metrics._wx;
        var col = wx.pct >= 70 ? "#5fe08f" : wx.pct >= 50 ? "#fdcb6e" : "#ff6b6b";
        grid.innerHTML += '<div class="es-card" style="grid-column:1/-1;">' +
            '<div class="es-card-label">ЯВЛЕНИЯ ПОГОДЫ</div>' +
            '<div class="es-card-mae" style="color:'+col+';">'+wx.pct+
                '<span style="font-size:12px;font-weight:400;color:#666;">% совпадений</span></div>' +
            '<div class="es-card-sub">совпало '+wx.hits+' из '+wx.total+' случаев<br>' +
                '<span style="color:#444;font-size:10px;">ясно · облачно · туман · дождь · снег · ливень · гроза</span></div>' +
        '</div>';
    }
}

function renderCompare(metrics) {
    if (!metrics) return;
    var section = document.getElementById("compareSection");
    var grid    = document.getElementById("compareGrid");
    var cParams = [
        { key:"temp",     label:"Температура", unit:"°C"   },
        { key:"wind",     label:"Ветер",       unit:" м/с" },
        { key:"pressure", label:"Давление",    unit:" гПа" },
    ];
    var html = "", hasAny = false;
    cParams.forEach(function(p) {
        var best = getBestModelMAE(p.key);
        var ens  = metrics[p.key];
        if (!best || !ens) return;
        hasAny = true;
        var diff = ens.mae - best.mae;
        var col  = diff < 0 ? "#5fe08f" : "#ff6b6b";
        var lbl  = diff < 0 ? "лучше" : "хуже";
        html += '<div class="es-card">' +
            '<div class="es-card-label">'+p.label+'</div>' +
            '<div style="font-size:13px;color:#aaa;margin-bottom:4px;">Ансамбль: <b style="color:#fff;">'+ens.mae.toFixed(2)+p.unit+'</b></div>' +
            '<div style="font-size:13px;color:#aaa;margin-bottom:6px;">'+(modelShort(best.model)||best.model)+': <b>'+best.mae.toFixed(2)+p.unit+'</b></div>' +
            '<div style="font-size:13px;font-weight:800;color:'+col+';">'+(diff>0?"+":"")+diff.toFixed(2)+p.unit+' '+lbl+'</div>' +
        '</div>';
    });
    if (hasAny) { section.style.display = ""; grid.innerHTML = html; }
}

function renderCoverage(snapCount, obsCount) {
    var horizons   = getHorizonStats();
    var totalHours = horizons.reduce(function(s,h){ return s+h.count; }, 0);
    var avgHorizon = horizons.length
        ? Math.round(horizons.reduce(function(s,h){ return s+h.horizonH; },0) / horizons.length) : 0;
    var dates  = horizons.map(function(h){ return new Date(h.savedAt); }).filter(function(d){ return !isNaN(d); });
    var oldest = dates.length ? new Date(Math.min.apply(null,dates)) : null;
    var newest = dates.length ? new Date(Math.max.apply(null,dates)) : null;
    var fmt = function(d){ return d ? d.toLocaleString("ru-RU",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}) : "—"; };

    document.getElementById("coverageInfo").innerHTML =
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">' +
            '<div><span style="color:#555;">Снимков</span><br><b style="font-size:17px;">'+snapCount+'</b></div>' +
            '<div><span style="color:#555;">Часов прогноза</span><br><b style="font-size:17px;">'+totalHours+'</b></div>' +
            '<div><span style="color:#555;">Средний горизонт</span><br><b style="font-size:17px;">'+avgHorizon+' ч</b></div>' +
            '<div><span style="color:#555;">Наблюдений в базе</span><br><b style="font-size:17px;">'+obsCount+'</b></div>' +
        '</div>' +
        '<div style="margin-top:10px;color:#555;font-size:12px;">Первый: '+fmt(oldest)+'<br>Последний: '+fmt(newest)+'</div>';
}

function renderSnapshots() {
    var list     = document.getElementById("snapshotList");
    var horizons = getHorizonStats();
    if (!horizons.length) { list.innerHTML = '<div style="color:#444;font-size:13px;">Нет снимков</div>'; return; }
    list.innerHTML = horizons.slice().reverse().slice(0,20).map(function(h) {
        var d = new Date(h.savedAt);
        var t = isNaN(d) ? "—" : d.toLocaleString("ru-RU",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
        return '<div class="snap-row"><span class="snap-time">'+t+'</span>' +
               '<span class="snap-hours">'+h.count+' ч · горизонт '+h.horizonH+' ч</span></div>';
    }).join("");
}

(async function() {
    setStatus("Загрузка снимков с GitHub…");
    await loadSnaps();
    render();
})();
