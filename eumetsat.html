<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Спутник EUMETSAT — Одесса</title>
<link rel="stylesheet" href="current_weather.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
    body{ margin:0; padding-bottom:0 !important; background:#0d0d0d; }
    #eumControls{
        position:fixed; top:0; left:0; right:0; z-index:900;
        background:#161616; border-bottom:1px solid #262626;
        box-sizing:border-box; padding:6px 10px;
    }
    #eumControls .titleRow{
        display:flex; align-items:center; justify-content:space-between; height:32px;
    }
    #eumControls .title{ font-size:14px; font-weight:700; color:#eee; }
    #eumTimestamp{ font-size:12px; color:#72c8ff; font-weight:600; }
    #eumLayerTabs{ display:flex; flex-wrap:wrap; gap:5px; margin-top:4px; }
    #eumLayerTabs button{
        flex:1 1 auto; min-width:30%; padding:6px 3px; border-radius:8px; border:1px solid #333;
        background:#1d1d1d; color:#bbb; font-size:11px; cursor:pointer; white-space:nowrap;
    }
    #eumLayerTabs button.active{ background:#2a4d63; color:#fff; border-color:#3d7ca6; }
    #mapid{ position:fixed; top:128px; left:0; right:0; bottom:150px; z-index:1; }
    #eumSliderWrap{
        position:fixed; left:0; right:0; bottom:56px; z-index:900;
        background:#161616; border-top:1px solid #262626;
        padding:8px 14px 6px;
        box-sizing:border-box;
    }
    #eumSlider{ width:100%; }
    #eumSliderLabels{
        display:flex; justify-content:space-between; font-size:10px; color:#888; margin-top:2px;
    }
    #eumControlsBtns{ display:flex; justify-content:center; gap:8px; margin-top:4px; }
    #eumControlsBtns button{
        width:34px; height:28px; border-radius:8px; border:1px solid #333;
        background:#232323; color:#eee; font-size:14px; cursor:pointer;
    }
    #eumLegendWrap{
        position:fixed; top:132px; left:8px; z-index:800;
        background:rgba(22,22,22,0.92); border:1px solid #262626; border-radius:8px;
        padding:6px 8px; max-width:62vw; font-size:10px; color:#ccc; line-height:1.4;
    }
    #eumLegendWrap .swatchRow{ display:flex; align-items:center; gap:5px; margin:2px 0; }
    #eumLegendWrap .swatch{ width:12px; height:12px; border-radius:3px; flex:0 0 auto; border:1px solid #444; }
    #eumLegendWrap .gradBar{ width:100%; height:10px; border-radius:3px; margin:2px 0; }
    #eumCompareBtn{
        position:fixed; top:132px; right:8px; z-index:800;
        background:rgba(22,22,22,0.92); border:1px solid #262626; border-radius:8px;
        color:#72c8ff; font-size:11px; padding:6px 8px; cursor:pointer;
    }
    #eumCompareModal{
        position:fixed; inset:0; z-index:1500; background:#0d0d0d;
        display:none; flex-direction:column;
    }
    #eumCompareModal.open{ display:flex; }
    #eumCompareModal .compareHeader{
        display:flex; justify-content:space-between; align-items:center;
        padding:8px 12px; background:#161616; border-bottom:1px solid #262626;
        font-size:13px; color:#eee;
    }
    #eumCompareModal .compareHeader button{
        background:#232323; border:1px solid #333; color:#eee; border-radius:8px;
        padding:6px 12px; font-size:14px;
    }
    #eumCompareModal .compareBody{ flex:1; display:flex; flex-direction:column; }
    .compareRow{ flex:1; position:relative; border-bottom:1px solid #262626; min-height:0; }
    .compareRow .compareMap{ position:absolute; inset:0; }
    .compareRow .compareLabel{
        position:absolute; top:6px; left:6px; z-index:900;
        background:rgba(22,22,22,0.85); color:#72c8ff; font-size:11px;
        padding:3px 7px; border-radius:6px;
    }
    #eumAttribution{
        position:fixed; bottom:160px; right:8px; z-index:800;
        font-size:10px; color:#888; background:rgba(22,22,22,0.85);
        padding:3px 6px; border-radius:6px;
    }
    #eumAttribution a{ color:#72c8ff; }
    .leaflet-control-attribution{ font-size:9px !important; }
</style>
</head>
<body>

<div id="eumControls">
    <div class="titleRow">
        <span class="title">Спутник EUMETSAT</span>
        <span id="eumTimestamp">Загрузка…</span>
    </div>
    <div id="eumLayerTabs">
        <button data-layer="clm" class="active">Облачность</button>
        <button data-layer="cth">Высота облаков</button>
        <button data-layer="h60b">Осадки</button>
        <button data-layer="gii_kindex">Грозоопасность</button>
        <button data-layer="li_afa">Молнии</button>
        <button data-layer="geocolour">Естественный цвет</button>
    </div>
</div>

<div id="mapid"></div>

<div id="eumLegendWrap"><div id="eumLegendContent"></div></div>
<button id="eumCompareBtn">⇄ 2 кадра</button>

<div id="eumCompareModal">
    <div class="compareHeader">
        <span id="eumCompareTitle">Сравнение 2 последних снимков</span>
        <button id="eumCompareCloseBtn">✕ Закрыть</button>
    </div>
    <div class="compareBody">
        <div class="compareRow"><div id="compareMapPrev" class="compareMap"></div><div id="compareLabelPrev" class="compareLabel"></div></div>
        <div class="compareRow"><div id="compareMapNow" class="compareMap"></div><div id="compareLabelNow" class="compareLabel"></div></div>
    </div>
</div>

<div id="eumAttribution">Data: <a href="https://www.eumetsat.int/" target="_blank" rel="noopener">EUMETSAT</a></div>

<div id="eumSliderWrap">
    <input id="eumSlider" type="range" min="0" max="0" value="0" step="1">
    <div id="eumSliderLabels">
        <span>-2ч</span>
        <span id="eumNowLabel">сейчас</span>
    </div>
    <div id="eumControlsBtns">
        <button id="eumPrevBtn">‹</button>
        <button id="eumPlayBtn">▶</button>
        <button id="eumNextBtn">›</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="eumetsat.js"></script>
<script src="nav.js"></script>
</body>
</html>
