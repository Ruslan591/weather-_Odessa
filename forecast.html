<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="forecast.css">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>

<div class="header">
    <div class="nav">
        <a href="index.html">ГМЦ ЧАМ</a>
        <a href="pws.html">PWS</a>
    </div>
    <div class="headerTitle">Прогноз</div>
    <div class="nav">
        <a href="verify.html">Рейтинг</a>
        <a href="verify_pws.html">Рейтинг pws</a>
        <a href="ensemble_pws.html">Ансамбль pws</a>
        <a href="update_status.html">🔄</a>
    </div>
</div>
<!-- СТАЛО -->
<div class="main-title">
  <button class="sel-btn" onclick="toggleForecastMenu(event)">
    <span id="forecastDays">24 часа</span> <span class="sel-arrow">▾</span>
  </button>
  <button class="sel-btn" onclick="toggleModelMenu(event)">
    <span id="modelName">ECMWF</span> <span class="sel-arrow">▾</span>
  </button>
</div>
<!-- Bottom sheet: период -->
<div id="forecastSheet" class="bottom-sheet" onclick="closeSheet('forecastSheet')">
  <div class="sheet-panel" onclick="event.stopPropagation()">
    <div class="sheet-item" onclick="setForecastHours(24)">24 часа</div>
<div class="sheet-item" onclick="setForecastHours(48)">48 часов</div>
<div class="sheet-item" onclick="setForecastHours(72)">72 часа</div>
<div class="sheet-item" onclick="setForecastHours(120)">120 часов</div>
<div class="sheet-item" onclick="setForecastHours(168)">168 часов</div>
<div class="sheet-item" onclick="setForecastHours(240)">240 часов</div>
  </div>
</div>

<!-- Bottom sheet: модель -->
<div id="modelSheet" class="bottom-sheet" onclick="closeSheet('modelSheet')">
  <div class="sheet-panel" onclick="event.stopPropagation()">
    <div class="sheet-title">Модель прогноза</div>
    <div id="modelSheetItems"></div>
  </div>
</div>
<div id="content">
  <div id="fcChart" style="max-width:340px; margin:0 auto; padding: 0 8px;">
    <div class="fc-day-row" id="fcDayRow"></div>
    <div id="fcChartWrap" style="background:#161616;border-radius:10px;overflow:hidden;padding:4px 0 0;"></div>
    <div id="fcStats" class="fc-stats" style="display:none;margin-top:4px;"></div>
    <div class="fc-param-row" id="fcParamRow" style="margin-top:10px;"></div>
    <div id="fcAlertsBlock" style="margin-top:8px;"></div>
    <!-- AI-анализ вкладка -->
    <div style="margin-top:10px;max-width:340px;margin-left:auto;margin-right:auto;">
        <a href="ai_analysis.html"
            style="width:100%;padding:9px 14px;border-radius:10px;border:1px solid #252525;
            background:#111;color:#888;font-size:12px;cursor:pointer;text-align:left;
            touch-action:manipulation;display:flex;align-items:center;gap:8px;
            text-decoration:none;box-sizing:border-box;">
            <span style="font-size:14px;">🤖</span>
            <span>Синоптический анализ ИИ</span>
            <span style="margin-left:auto;font-size:10px;color:#555;">→</span>
        </a>
    </div>
</div>
<div id="forecast"></div>
<div id="ensembleDebug" style="display:none;padding:0 8px;max-width:340px;margin:0 auto;"></div>


</div>
<script src="nav.js"></script>

<script src="models.js"></script>
<script src="modelCheck.js"></script>
<script src="js/fc-utils.js"></script>
<script src="js/fc-params.js"></script>
<script src="js/fc-day.js"></script>
<script src="js/fc-tooltip.js"></script>
<script src="js/fc-charts-atmo.js"></script>
<script src="js/fc-charts-basic.js"></script>
<script src="js/fc-ensemble.js"></script>
<script src="js/fc-alerts.js"></script>
<script src="js/fc-forecast.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function(){
    if(weatherModel === "ensemble") loadEnsemble();
    else load();
});
</script>

<div id="_dbg" style="position:fixed;bottom:0;left:0;right:0;background:#1a0000;
color:#ff6b6b;font-size:11px;padding:6px;z-index:9999;display:none;
max-height:40vh;overflow:auto;white-space:pre-wrap;"></div>
<script>
window.onerror = function(msg, src, line, col){
    var d = document.getElementById('_dbg');
    d.style.display = 'block';
    d.textContent += src.split('/').pop() + ':' + line + '\n' + msg + '\n\n';
};
window.addEventListener('unhandledrejection', function(e){
    var d = document.getElementById('_dbg');
    d.style.display = 'block';
    d.textContent += 'Promise: ' + e.reason + '\n';
});
</script>

</body>
</html>
