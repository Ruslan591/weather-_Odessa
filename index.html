<!-- Фоновая запись SYNOP наблюдений на GitHub -->
<script>
(async function syncSynopObs() {
    const TOKEN = localStorage.getItem("ghToken") || "";
    if (!TOKEN) return;

    const OWNER   = "ruslan591";
    const REPO    = "weather-_Odessa";
    const FILE    = "data/synop_obs.json";
    const PROXIES = [
        "https://corsproxy.io/?",
        "https://api.allorigins.win/raw?url=",
        "https://proxy.cors.sh/",
        "https://cors.x2u.in/"
    ];

    function formatOgimetDate(d) {
        return d.getUTCFullYear()
            + String(d.getUTCMonth()+1).padStart(2,"0")
            + String(d.getUTCDate()).padStart(2,"0")
            + String(d.getUTCHours()).padStart(2,"0") + "00";
    }

    function parseSynopLine(line) {
        const m = line.match(/^33837,(\d{4}),(\d{2}),(\d{2}),(\d{2}),(\d{2}),(AAXX\s.+)$/);
        if (!m) return null;
        const [,y,mo,dd,hh,,synopLine] = m;
        if (synopLine.includes("NILL")) return null;
        const synopTime = y+mo+dd+hh+"00";
        const parts = synopLine.trim().split(/\s+/);
        const sec333 = parts.indexOf("333");
        const mainParts = parts.slice(0, sec333 !== -1 ? sec333 : parts.length);
        let temp=null, dew=null, pressure=null, wind=null, windDir=null,
            cloudcover=null, precip=null, ww=null, visibility=null;
        let iR = null;
        const grp3 = mainParts[3];
        if (grp3 && grp3.length === 5) {
            iR = parseInt(grp3[0]);
            const VV = grp3.slice(3,5);
            if (VV !== "//" && !isNaN(parseInt(VV))) {
                const vv = parseInt(VV);
                if (vv <= 50)       visibility = vv * 100;
                else if (vv <= 80)  visibility = (vv - 50) * 1000;
                else if (vv === 89) visibility = 70000;
            }
        }
        const grp4 = mainParts[4];
        if (grp4 && /^\d{5}$/.test(grp4)) {
            const N = parseInt(grp4[0]);
            cloudcover = N <= 8 ? Math.round(N / 8 * 100) : null;
            windDir = parseInt(grp4.slice(1,3)) * 10;
            wind    = parseInt(grp4.slice(3,5));
            if (isNaN(windDir)) windDir = null;
            if (isNaN(wind))    wind    = null;
        }
        for (let i = 5; i < mainParts.length; i++) {
            const g = mainParts[i];
            if (!g || g.length !== 5) continue;
            if (/^1[01]\d{3}$/.test(g))
                temp = (g[1]==="1"?-1:1) * parseInt(g.slice(2)) / 10;
            else if (/^2[01]\d{3}$/.test(g))
                dew  = (g[1]==="1"?-1:1) * parseInt(g.slice(2)) / 10;
            else if (/^4\d{4}$/.test(g)) {
                const val = parseInt(g.slice(1)) / 10;
                pressure = val < 500 ? 1000 + val : 900 + val;
                if (pressure < 920 || pressure > 1050) pressure = null;
            } else if (/^6\d{4}$/.test(g) && (iR === 0 || iR === 1 || iR === 2)) {
                const RRR = parseInt(g.slice(1,4));
                if (RRR === 990) precip = 0;
                else if (RRR >= 991 && RRR <= 999) precip = (RRR-990) * 0.1;
                else if (RRR === 0) precip = 0;
                else precip = RRR;
            } else if (/^7\d{4}$/.test(g))
                ww = parseInt(g.slice(1,3));
        }
        if (temp === null) return null;
        // Влажность из точки росы
        let humidity = null;
        if (temp !== null && dew !== null) {
            humidity = Math.round(100
                * Math.exp((17.625*dew)/(243.04+dew))
                / Math.exp((17.625*temp)/(243.04+temp)));
        }
        return { synopTime, obs: { temp, dew, humidity, pressure, wind, windDir,
                                   cloudcover, precip, ww, visibility } };
    }

    async function ghGet() {
        const url = "https://api.github.com/repos/"+OWNER+"/"+REPO+"/contents/"+FILE;
        const r = await fetch(url, { headers:{"Accept":"application/vnd.github+json", ...(TOKEN ? {"Authorization":"Bearer "+TOKEN} : {})}, cache:"no-store" });
        if (r.status === 404) return { data: [], sha: null };
        if (!r.ok) throw new Error("GitHub GET " + r.status);
        const resp = await r.json();
        const content = decodeURIComponent(escape(atob(resp.content.replace(/\n/g,""))));
        return { data: JSON.parse(content), sha: resp.sha };
    }

    async function ghPut(data, sha) {
        const sorted = data.sort((a,b) => a.synopTime > b.synopTime ? 1 : -1);
        const encoded = btoa(unescape(encodeURIComponent(
    "[\n" + sorted.map(s => JSON.stringify(s)).join(",\n") + "\n]"
)));
        const body = { message: "synop obs update", content: encoded };
        if (sha) body.sha = sha;
        const r = await fetch("https://api.github.com/repos/"+OWNER+"/"+REPO+"/contents/"+FILE, {
            method: "PUT",
            headers: {
                "Authorization": "Bearer " + TOKEN,
                "Content-Type": "application/json",
                "Accept": "application/vnd.github+json"
            },
            body: JSON.stringify(body)
        });
        if (!r.ok) throw new Error("GitHub PUT " + r.status);
    }

    async function fetchSynop(days) {
        const now = new Date();
        const end = formatOgimetDate(now);
        const from = new Date(now.getTime() - days * 24 * 3600 * 1000);
        const begin = formatOgimetDate(from);
        const url = "https://www.ogimet.com/cgi-bin/getsynop?block=33837&begin="+begin+"&end="+end;
        const requests = PROXIES.map(proxy => {
            return new Promise(async (resolve, reject) => {
                const ctrl = new AbortController();
                const timer = setTimeout(() => ctrl.abort(), 10000);
                try {
                    const r = await fetch(proxy + encodeURIComponent(url), {signal:ctrl.signal, cache:"no-store"});
                    if (!r.ok) throw new Error("HTTP " + r.status);
                    const text = await r.text();
                    if (!text.trim()) throw new Error("Пустой ответ");
                    resolve(text);
                } catch(e) { reject(e); } finally { clearTimeout(timer); }
            });
        });
        const settled = await Promise.allSettled(requests);
        const ok = settled.filter(r => r.status === "fulfilled").map(r => r.value);
        if (!ok.length) throw new Error("Все прокси не ответили");
        ok.sort((a,b) => b.length - a.length);
        return ok[0];
    }

function showToast(msg, color) {
        let t = document.getElementById("synopToast");
        if (!t) {
            t = document.createElement("div");
            t.id = "synopToast";
            t.style.cssText = "position:fixed;bottom:20px;left:50%;transform:translateX(-50%);" +
                "background:#1e1e1e;border:1px solid #333;border-radius:10px;" +
                "padding:10px 18px;font-size:13px;color:#eee;z-index:9999;" +
                "box-shadow:0 4px 16px rgba(0,0,0,0.5);transition:opacity 0.4s;white-space:nowrap;";
            document.body.appendChild(t);
        }
        t.style.color = color || "#eee";
        t.style.opacity = "1";
        t.textContent = msg;
        clearTimeout(t._timer);
        t._timer = setTimeout(() => { t.style.opacity = "0"; }, 2000);
    }

    try {
        showToast("⏳ Проверяем SYNOP...", "#aaa");
        const { data: existing, sha } = await ghGet();

        const existKeys = new Set(existing.map(r => r.synopTime));
        let daysToFetch = 3;
        if (existing.length) {
            const last = existing[existing.length - 1].synopTime;
            const lastMs = Date.UTC(
                parseInt(last.slice(0,4)), parseInt(last.slice(4,6))-1,
                parseInt(last.slice(6,8)), parseInt(last.slice(8,10))
            );
            const diffDays = (Date.now() - lastMs) / (24 * 3600 * 1000);
            daysToFetch = Math.min(Math.ceil(diffDays) + 1, 16);
        }

        const text = await fetchSynop(daysToFetch);

        const newRecs = [];
        for (const line of text.split("\n").map(l => l.trim()).filter(Boolean)) {
            const rec = parseSynopLine(line);
            if (!rec) continue;
            if (!existKeys.has(rec.synopTime)) {
                newRecs.push(rec);
                existKeys.add(rec.synopTime);
            }
        }

        if (!newRecs.length) {
            showToast("✓ SYNOP актуален", "#8bc34a");
            return;
        }

        showToast("⬆ Сохраняем " + newRecs.length + " сводок...", "#aaa");
        await ghPut([...existing, ...newRecs], sha);
        showToast("✓ SYNOP: добавлено " + newRecs.length + " сводок", "#8bc34a");
    } catch(e) {
        showToast("❌ SYNOP: " + e.message, "#ff6b6b");
    }
})();
</script>
