<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="verify.css">
<meta name="theme-color" content="#121212">
<title>Рейтинг моделей</title> 
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body> 

<!-- =========================
     ВЕРХНЯЯ ПАНЕЛЬ
========================= -->
<div class="header">
    <div class="nav">
        <a href="current_weather.html">Погода сейчас</a>
        <a href="forecast.html">Прогноз</a>
    </div>
    <div class="headerTitle">Рейтинг</div>
</div>

<div class="container">
    <!-- Последнее обновление -->
    <div id="lastUpdate" style="color:#aaa;font-size:0.9em;">
        Последнее обновление: нет
    </div>
    <br>

    <!-- График -->
    <canvas id="chart" height="260"></canvas> 

    <!-- Кнопки фильтров -->
    <div style="text-align:center">
        <button onclick="setPeriod('24h')">24 часа</button>
        <button onclick="setPeriod('3d')">3 дня</button>
        <button onclick="setPeriod('all')">Всё время</button>
        <br>
        <button onclick="setParam('temp')">Температура</button>
        <button onclick="setParam('pressure')">Давление</button>
        <button onclick="setParam('wind')">Ветер</button>
        <button onclick="setParam('windDir')">Направление</button>
        <button onclick="setMode('error')">Ошибка</button>
        <button onclick="setMode('value')">Значение</button>
        <br><br>
        <button onclick="showData()">Показать данные</button>
        <button onclick="verifyAll()">Обновить проверку</button>
        <br><br>
        <button onclick="initFile()">Выбрать файл</button>
        <button onclick="exportDB()">Сохранить (перезаписать)</button>
    </div>

    <div id="rating">Загрузка...</div> 
</div>

<script>
/* ==========================
   Глобальные переменные
========================== */
let db; // IndexedDB
let chartInstance = null; // Chart.js
let currentPeriod = "all"; // "24h", "3d", "all"
let currentParam = "temp"; // "temp", "pressure", "wind", "windDir"
let chartMode = "error"; // "error" или "value"
const models=[  
    "ecmwf_ifs",  
    "icon_eu",  
    "ukmo_global_deterministic_10km",  
    "meteofrance_arpege_europe",  
    "jma_gsm",  
    "gfs_global"  
];

/* ==========================
   HELPER: Подписи моделей
========================== */
function modelLabel(m){
    switch(m){
        case "ecmwf_ifs": return "ECMWF";
        case "icon_eu": return "ICON";
        case "ukmo_global_deterministic_10km": return "UKMO";
        case "meteofrance_arpege_europe": return "ARPEGE";
        case "jma_gsm": return "JMA";
        case "gfs_global": return "GFS";
    }
}

/* ==========================
   IndexedDB: инициализация
========================== */
function initDB(){
    return new Promise((resolve,reject)=>{
        const req = indexedDB.open("modelStats",1);

        req.onupgradeneeded = e=>{
            db = e.target.result;
            db.createObjectStore("stats",{keyPath:"time"});
        };

        req.onsuccess = e=>{
            db = e.target.result;
            resolve();
        };

        req.onerror = reject;
    });
}

/* ==========================
   IndexedDB: запись данных
========================== */
function saveData(data){
    const tx = db.transaction("stats","readwrite");
    const store = tx.objectStore("stats");
    store.put(data);
}

/* ==========================
   IndexedDB: загрузка всех данных
========================== */
function loadStats(){
    return new Promise(res=>{
        const tx=db.transaction("stats","readonly");
        const store=tx.objectStore("stats");
        const r=store.getAll();
        r.onsuccess=()=>res(r.result);
    });
}

/* ==========================
   LocalStorage: fetch с таймаутом
========================== */
function fetchWithTimeout(url, ms = 10000){
    return Promise.race([
        fetch(url),
        new Promise((_, reject) => setTimeout(() => reject("Timeout"), ms))
    ]);
}

/* ==========================
   SYNOP: загрузка телеграммы с прокси
   + сохранение статистики прокси в LocalStorage
========================== */
async function loadSynop() {
    const ogimet = "https://www.ogimet.com/display_synops2.php?lang=en&lugar=33837&tipo=ALL&ord=REV&nil=SI&fmt=txt";

    const proxies = [
        "https://api.allorigins.win/raw?url=",
        "https://corsproxy.io/?",
        "https://proxy.cors.sh/",
        "https://cors.x2u.in/"
    ];

    let proxyTimes = JSON.parse(localStorage.getItem("proxyTimes") || "{}");
    proxies.forEach(p => { if (!proxyTimes[p]) proxyTimes[p] = []; });

    const requests = proxies.map(proxy => {
        return new Promise(async (resolve, reject) => {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), 8000);
            const started = performance.now();

            try {
                const url = proxy + encodeURIComponent(ogimet);
                const r = await fetch(url, { signal: controller.signal });
                if (!r.ok) throw new Error("HTTP " + r.status);

                const text = await r.text();
                if (!text || !text.trim()) throw new Error("Пустой ответ");

                const line = text.split("\n").find(l => l.includes("AAXX"));
                if (!line) throw new Error("SYNOP не найден");

                const ms = performance.now() - started;
                proxyTimes[proxy].push(ms);

                console.log(`SYNOP proxy ok: ${proxy} (${Math.round(ms)} мс)`);

                resolve({ line, text, proxy, ms });
            } catch (e) {
                const ms = performance.now() - started;
                proxyTimes[proxy].push(ms);
                console.log(`Proxy fail: ${proxy} (${Math.round(ms)} мс)`, e);
                reject(e);
            } finally {
                clearTimeout(timer);
            }
        });
    });

    let result;
    try {
        result = await Promise.any(requests);
    } catch {
        localStorage.setItem("proxyTimes", JSON.stringify(proxyTimes));
        throw new Error("Все прокси SYNOP не ответили");
    }

    localStorage.setItem("proxyTimes", JSON.stringify(proxyTimes));

    const telegramKey = result.line.slice(0, 12);

    if (!db) await initDB();
    const exists = await synopExists(telegramKey);
    if (exists) {
        console.log("Телеграмма уже есть в IndexedDB, пропускаем обработку");
        return parseSynop(result.line);
    }

    return parseSynop(result.line);
}

/* ==========================
   SYNOP: парсер телеграммы
========================== */
function parseSynop(line){
    const parts = line.trim().split(" ");
    const synopTime = parts[0];
    
    let temp = null;
    let pressure = null;
    let wind = null;
    let windDir = null;

    // температура и давление
    parts.forEach((g, i) => {
        if(g.startsWith("1")) {
            const sign = g[1] === "1" ? -1 : 1;
            temp = sign * parseInt(g.slice(2)) / 10;
        }
        if(g.startsWith("4")) {
            pressure = 1000 + parseInt(g.slice(1)) / 10;
        }
    });

    // ветер: 4-я группа после AAXX
    const aaxxi = parts.indexOf("AAXX");
    if(aaxxi >= 0 && parts.length > aaxxi + 4){
        const windGroup = parts[aaxxi + 4];
        windDir = parseInt(windGroup.slice(1,3)) * 10;
        wind = parseInt(windGroup.slice(3,5));
    }

    return { time: synopTime, temp, pressure, wind, windDir, synop: line };
}

/* ==========================
   Проверка существования SYNOP в IndexedDB
========================== */
async function synopExists(synopTime){
    const tx = db.transaction("stats","readonly");
    const store = tx.objectStore("stats");
    const req = store.getAll();

    return new Promise(res=>{
        req.onsuccess = ()=>{
            const exists = req.result.some(r => r.synopTime === synopTime);
            res(exists);
        };
    });
}

/* ==========================
   Загрузка прогноза модели
========================== */
async function loadForecast(model){
    const url =
    `https://api.open-meteo.com/v1/forecast?latitude=46.4406&longitude=30.7703&hourly=temperature_2m,pressure_msl,wind_speed_10m,wind_direction_10m&models=${model}&forecast_days=1&timezone=UTC&wind_speed_unit=ms`;

    const r = await fetchWithTimeout(url);
    const d = await r.json();
    return d.hourly;
}

/* ==========================
   Вычисление ошибки направления ветра
========================== */
function windDirError(a,b){
    let diff = Math.abs(a - b);
    if(diff > 180) diff = 360 - diff;
    return diff;
}

/* ==========================
   Обновление всех данных (SYNOP + модели)
========================== */
async function verifyAll(){
    if(!db) await initDB();
    const rating = document.getElementById("rating");
    rating.innerHTML="Загрузка...";

    try{
        rating.innerHTML = "Загрузка SYNOP...";
        const synop = await loadSynop();

        const exists = await synopExists(synop.time);
        if(exists){
            rating.innerHTML = "Данные уже есть (обновление не требуется)";
            return;
        }

        rating.innerHTML = "Загрузка моделей...";
        const forecasts = {};
        const results = await Promise.all(models.map(m => loadForecast(m)));

        models.forEach((m,i)=>{ forecasts[m] = results[i]; });

        // находим час, соответствующий SYNOP
        const forecastTimes = forecasts[models[0]].time;
        const targetTime =
            synop.time.slice(0,4)+"-"+synop.time.slice(4,6)+"-"+synop.time.slice(6,8)+"T"+
            synop.time.slice(8,10)+":00";

        const hourIndex = forecastTimes.findIndex(t => t.startsWith(targetTime));
        if(hourIndex === -1) throw "Не найдено совпадение времени прогноза и SYNOP";

        const modelsData = {};
        for(const m of models){
            const h = forecasts[m];
            modelsData[m] = {
                temp: h.temperature_2m[hourIndex],
                pressure: h.pressure_msl[hourIndex],
                wind: h.wind_speed_10m[hourIndex],
                windDir: Math.round(h.wind_direction_10m[hourIndex]/10)*10
            };
        }

        const record = {
            time: new Date().toISOString(),
            synopTime: synop.time,
            obs: synop,
            models: modelsData,
            hourIndex: hourIndex
        };

        saveData(record);
        rating.innerHTML = "Данные записаны";

    }catch(e){
        rating.innerHTML="Ошибка: "+e;
    }
}

/* ==========================
   Рендер графика и рейтинга моделей
========================== */
async function drawChart(){
    let stats = await loadStats();
    const now = Date.now();

    stats = stats.filter(d => {
        const t = new Date(d.time).getTime();
        if(currentPeriod === "24h") return now - t <= 24*3600*1000;
        if(currentPeriod === "3d") return now - t <= 3*24*3600*1000;
        return true;
    });

    if(!stats.length) return;

    const labels = stats.map(d => {
        const t = d.synopTime;
        return `${t.slice(6,8)}.${t.slice(4,6)} ${t.slice(8,10)}:00`;
    });

    const datasets = models.map(m => {
        const data = stats.map(d=>{
            const model = d.models[m];
            if(!model) return null;
            switch(currentParam){
                case "temp": return chartMode==="error"?Math.abs(model.temp - d.obs.temp):model.temp;
                case "pressure": return chartMode==="error"?Math.abs(model.pressure - d.obs.pressure):model.pressure;
                case "wind": return chartMode==="error"?Math.abs(model.wind - d.obs.wind):model.wind;
                case "windDir": return chartMode==="error"?windDirError(model.windDir,d.obs.windDir):model.windDir;
            }
        });
        return { label:modelLabel(m), data:data, borderWidth:2, fill:false };
    });

    // если показываем фактические значения SYNOP
    if(chartMode==="value"){
        const synopData = stats.map(d => {
            switch(currentParam){
                case "temp": return d.obs.temp;
                case "pressure": return d.obs.pressure;
                case "wind": return d.obs.wind;
                case "windDir": return d.obs.windDir;
            }
        });
        datasets.push({
            label:"SYNOP",
            data:synopData,
            borderWidth:2,
            fill:false,
            pointRadius:3,
            tension:0.1
        });
    }

    const ctx = document.getElementById("chart");
    if(chartInstance) chartInstance.destroy();

    chartInstance = new Chart(ctx,{
        type:"line",
        data:{ labels, datasets },
        options:{
            responsive:true,
            plugins:{
                legend:{ position:"bottom", labels:{ color:"#eee", boxWidth:12, padding:15 }, maxHeight:60 }
            },
            scales:{
                x:{ ticks:{ color:"#eee", maxRotation:45, minRotation:45, autoSkip:true, maxTicksLimit:8 } },
                y:{
                    beginAtZero:false,
                    ticks:{ color:"#eee" },
                    title:{ display:true, text:getYAxisLabel(), color:"#eee" }
                }
            }
        }
    });
}

function getYAxisLabel(){
    switch(currentParam){
        case "temp": return chartMode==="error"?"Ошибка температуры °C":"Температура °C";
        case "pressure": return chartMode==="error"?"Ошибка давления hPa":"Давление hPa";
        case "wind": return chartMode==="error"?"Ошибка ветра м/с":"Ветер м/с";
        case "windDir": return chartMode==="error"?"Ошибка направления °":"Направление °";
    }
}

/* ==========================
   Кнопки фильтров
========================== */
function setPeriod(p){ currentPeriod=p; render(); drawChart(); }
function setParam(p){ currentParam=p; drawChart(); }
function setMode(mode){ chartMode=mode; drawChart(); }

/* ==========================
   Показать данные из IndexedDB
========================== */
async function showData(){
    if(!db) await initDB();
    const tx = db.transaction("stats","readonly");
    const store = tx.objectStore("stats");
    const req = store.getAll();

    req.onsuccess=()=>{
        const data = req.result;
        data.sort((a,b)=> Number(b.synopTime) - Number(a.synopTime));
        let html = "<h3>Сохранённые данные</h3>";
        if(!data.length){ html+="Нет записей"; document.getElementById("rating").innerHTML=html; return; }
        data.forEach(d=>{
            html += `<br><b>Записано:</b> ${d.time}<br>`;
            html += `<b>SYNOP:</b> ${d.synopTime}<br><br>`;
            html += `SYNOP<br>${d.obs.synop}<br><br>
                     T ${d.obs.temp}<br>P ${d.obs.pressure}<br>W ${d.obs.wind}<br>Wd ${d.obs.windDir}<br><br>`;
            for(const m in d.models){
                const v=d.models[m];
                html+=`${modelLabel(m)}<br>T ${v.temp}<br>P ${v.pressure}<br>W ${v.wind}<br>WD ${v.windDir}<br><br>`;
            }
            html+="<hr>";
        });
        document.getElementById("rating").innerHTML=html;
    };
}

/* ==========================
   Автообновление каждые 30 минут
========================== */
async function autoUpdate(){
    try{
        if(!db) await initDB();
        await verifyAll();
    }catch(e){ console.log("Auto update error:", e); }

    try{
        await render();
        await drawChart();
        document.getElementById("lastUpdate").innerText = "Последнее обновление: " + new Date().toLocaleTimeString();
    }catch(e){ console.log("Render error:", e); }

    setTimeout(autoUpdate, 1800000); // 30 минут
}

// первый запуск
autoUpdate();

</script>
</body>
</html>
