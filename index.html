<!-- Фоновая запись SYNOP телеграмм на GitHub -->
<script>
(async function syncSynopTxt() {
    const TOKEN = localStorage.getItem("ghToken") || "";
    if (!TOKEN) return;

    const OWNER   = "ruslan591";
    const REPO    = "weather-_Odessa";
    const PROXIES = [
        "https://corsproxy.io/?",
        "https://api.allorigins.win/raw?url=",
        "https://proxy.cors.sh/",
        "https://cors.x2u.in/"
    ];

    const now  = new Date();
    const year = now.getUTCFullYear();
    const FILE = "data/synop_" + year + ".txt";

    function showToast(msg, color) {
        let t = document.getElementById("synopToast");
        if (!t) {
            t = document.createElement("div");
            t.id = "synopToast";
            t.style.cssText = "position:fixed;bottom:20px;left:50%;transform:translateX(-50%);" +
                "background:#1e1e1e;border:1px solid #333;border-radius:10px;" +
                "padding:10px 18px;font-size:13px;color:#eee;z-index:9999;" +
                "box-shadow:0 4px 16px rgba(0,0,0,0.5);transition:opacity 0.4s;white-space:nowrap;";
            document.body.appendChild(t);
        }
        t.style.color = color || "#eee";
        t.style.opacity = "1";
        t.textContent = msg;
        clearTimeout(t._timer);
        t._timer = setTimeout(() => { t.style.opacity = "0"; }, 2000);
    }

    // Извлекает synopTime из строки "33837,YYYY,MM,DD,HH,mm,AAXX..."
    function getSynopTime(line) {
        const m = line.match(/^33837,(\d{4}),(\d{2}),(\d{2}),(\d{2}),(\d{2}),/);
        if (!m) return null;
        return m[1] + m[2] + m[3] + m[4] + m[5]; // YYYYMMDDHHmm
    }

    async function ghGet() {
        const url = "https://api.github.com/repos/" + OWNER + "/" + REPO + "/contents/" + FILE;
        const r = await fetch(url, {
            headers: {
                "Accept": "application/vnd.github+json",
                ...(TOKEN ? { "Authorization": "Bearer " + TOKEN } : {})
            },
            cache: "no-store"
        });
        if (r.status === 404) return { text: "", sha: null };
        if (!r.ok) throw new Error("GitHub GET " + r.status);
        const resp = await r.json();
        // Большой файл — через download_url
        if (!resp.content || !resp.content.trim()) {
            const dl = await fetch(resp.download_url, { cache: "no-store" });
            return { text: await dl.text(), sha: resp.sha };
        }
        const text = atob(resp.content.replace(/\n/g, ""));
        return { text, sha: resp.sha };
    }

    async function ghPut(text, sha) {
        const encoded = btoa(unescape(encodeURIComponent(text)));
        const body = { message: "synop txt update", content: encoded };
        if (sha) body.sha = sha;
        const r = await fetch(
            "https://api.github.com/repos/" + OWNER + "/" + REPO + "/contents/" + FILE,
            {
                method: "PUT",
                headers: {
                    "Authorization": "Bearer " + TOKEN,
                    "Content-Type": "application/json",
                    "Accept": "application/vnd.github+json"
                },
                body: JSON.stringify(body)
            }
        );
        if (!r.ok) throw new Error("GitHub PUT " + r.status);
    }

    async function fetchSynop(days) {
        const end   = now.getUTCFullYear()
            + String(now.getUTCMonth()+1).padStart(2,"0")
            + String(now.getUTCDate()).padStart(2,"0")
            + String(now.getUTCHours()).padStart(2,"0") + "00";
        const from  = new Date(now.getTime() - days * 24 * 3600 * 1000);
        const begin = from.getUTCFullYear()
            + String(from.getUTCMonth()+1).padStart(2,"0")
            + String(from.getUTCDate()).padStart(2,"0")
            + String(from.getUTCHours()).padStart(2,"0") + "00";
        const url = "https://www.ogimet.com/cgi-bin/getsynop?block=33837&begin=" + begin + "&end=" + end;

        const requests = PROXIES.map(proxy =>
            new Promise(async (resolve, reject) => {
                const ctrl  = new AbortController();
                const timer = setTimeout(() => ctrl.abort(), 10000);
                try {
                    const r = await fetch(proxy + encodeURIComponent(url), { signal: ctrl.signal, cache: "no-store" });
                    if (!r.ok) throw new Error("HTTP " + r.status);
                    const text = await r.text();
                    if (!text.trim()) throw new Error("Пустой ответ");
                    resolve(text);
                } catch(e) { reject(e); } finally { clearTimeout(timer); }
            })
        );
        const settled = await Promise.allSettled(requests);
        const ok = settled.filter(r => r.status === "fulfilled").map(r => r.value);
        if (!ok.length) throw new Error("Все прокси не ответили");
        ok.sort((a, b) => b.length - a.length);
        return ok[0];
    }

    try {
        showToast("⏳ Проверяем SYNOP...", "#aaa");
        const { text: existing, sha } = await ghGet();

        // Собираем уже известные ключи из текущего файла
        const existKeys = new Set();
        let lastKey = null;
        for (const line of existing.split("\n").map(l => l.trim()).filter(Boolean)) {
            const k = getSynopTime(line);
            if (k) { existKeys.add(k); lastKey = k; }
        }

        // Определяем сколько дней загружать
        let daysToFetch = 3;
        if (lastKey) {
            const lastMs = Date.UTC(
                parseInt(lastKey.slice(0,4)), parseInt(lastKey.slice(4,6))-1,
                parseInt(lastKey.slice(6,8)), parseInt(lastKey.slice(8,10))
            );
            daysToFetch = Math.min(Math.ceil((Date.now() - lastMs) / (24*3600*1000)) + 1, 16);
        }

        const raw = await fetchSynop(daysToFetch);

        const newLines = [];
        for (const line of raw.split("\n").map(l => l.trim()).filter(Boolean)) {
            if (!line.startsWith("33837,")) continue;
            if (line.includes("NILL")) continue;
            const k = getSynopTime(line);
            if (!k || existKeys.has(k)) continue;
            newLines.push(line);
            existKeys.add(k);
        }

        if (!newLines.length) {
            if (lastKey) {
                const lastMs = Date.UTC(
                    parseInt(lastKey.slice(0,4)), parseInt(lastKey.slice(4,6))-1,
                    parseInt(lastKey.slice(6,8)), parseInt(lastKey.slice(8,10)),
                    parseInt(lastKey.slice(10,12))
                );
                const ageMin = Math.round((Date.now() - lastMs) / 60000);
                const ageStr = ageMin < 60 ? `${ageMin} мин` : `${Math.round(ageMin/60)} ч`;
                const fresh  = ageMin < 240; // SYNOP раз в 3ч → порог 4ч
                showToast(
                    `${fresh ? "✓" : "⚠"} SYNOP · ${lastKey.slice(6,8)}.${lastKey.slice(4,6)} ${lastKey.slice(8,10)}:${lastKey.slice(10,12)} UTC · ${ageStr} назад`,
                    fresh ? "#8bc34a" : "#ff9800"
                );
            } else {
                showToast("✓ SYNOP актуален", "#8bc34a");
            }
            return;
        }

        showToast("⬆ Сохраняем " + newLines.length + " строк...", "#aaa");
        const merged = existing.trimEnd() + "\n" + newLines.join("\n") + "\n";
        await ghPut(merged, sha);
        showToast("✓ SYNOP: добавлено " + newLines.length + " строк", "#8bc34a");
    } catch(e) {
        showToast("❌ SYNOP: " + e.message, "#ff6b6b");
    }
})();
</script>
