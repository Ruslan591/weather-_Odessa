<script>
/* =========================================================
   СОСТОЯНИЕ
========================================================= */
var currentPeriod  = "7d";
var currentParam   = "temp";
var currentTab     = "main";
var currentStation = "all";
var currentModel   = "all";
var _modelChartParam   = "temp";
var _modelChartInst    = null;

var currentSeason  = getCurrentSeason();
var db;
var _stopRequested = false;

// Кэш — один раз читаем БД, держим в памяти
var _cachedAll = null;

var models = modelIds();

var BIAS_THRESHOLDS = {
    temp: 0.3, pressure: 0.3, wind: 0.5, windDir: 10, humidity: 3
};

var LEAD_GROUPS = [
    { label: "0–24 ч",   min: 0,   max: 24  },
    { label: "24–48 ч",  min: 24,  max: 48  },
    { label: "48–72 ч",  min: 48,  max: 72  },
    { label: "72–120 ч", min: 72,  max: 120 }
];

var SEASON_MONTHS = {
    winter: [12,1,2], spring: [3,4,5], summer: [6,7,8], autumn: [9,10,11]
};
var SEASON_LABELS = {
    winter: "Зима (дек–фев)", spring: "Весна (мар–май)",
    summer: "Лето (июн–авг)", autumn: "Осень (сен–ноя)"
};
var MONTH_NAMES = ["Январь","Февраль","Март","Апрель","Май","Июнь",
                   "Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];

function getCurrentSeason() {
    var m = new Date().getMonth() + 1;
    if ([12,1,2].indexOf(m) >= 0) return "winter";
    if ([3,4,5].indexOf(m)  >= 0) return "spring";
    if ([6,7,8].indexOf(m)  >= 0) return "summer";
    return "autumn";
}

/* =========================================================
   ВСПОМОГАТЕЛЬНЫЕ
========================================================= */
function modelLabel(m) { return (typeof modelShort === "function" ? modelShort(m) : null) || m; }

function setStatus(msg, spinning) {
    var el = document.getElementById("lastUpdate");
    el.innerHTML = '<span>' + (spinning ? '<span class="spin">⏳</span> ' : '') + msg + '</span>';
    el.classList.remove("running");
    requestAnimationFrame(function() { requestAnimationFrame(function() {
        var s = el.querySelector("span");
        if (s && s.scrollWidth > el.clientWidth) el.classList.add("running");
    }); });
}

function windDirError(a, b) {
    var d = Math.abs(a - b);
    return d > 180 ? 360 - d : d;
}

// pwsTime = "YYYYMMDDhh" + stationId
// Быстрое извлечение timestamp без new Date() — просто числовое сравнение строк
function pwsTimePrefix(tk) {
    // "202604221400IODESS44" -> "202604221400"
    return tk.slice(0, 12);
}
function pwsTimeMonth(tk) { return parseInt(tk.slice(4,6)); }
// Для фильтра по времени: "YYYYMMDDhh" (10 символов) — сравниваем строки (лексикографически = хронологически)
function pwsTimestamp(tk) { return tk.slice(0, 12); } // "202604221400"

function nowTimestamp() {
    var n = new Date();
    return n.getUTCFullYear() +
           String(n.getUTCMonth()+1).padStart(2,"0") +
           String(n.getUTCDate()).padStart(2,"0") +
           String(n.getUTCHours()).padStart(2,"0") +
           String(n.getUTCMinutes()).padStart(2,"0");
}

function subtractHoursTimestamp(hours) {
    var t = new Date(Date.now() - hours * 3600000);
    return t.getUTCFullYear() +
           String(t.getUTCMonth()+1).padStart(2,"0") +
           String(t.getUTCDate()).padStart(2,"0") +
           String(t.getUTCHours()).padStart(2,"0") +
           String(t.getUTCMinutes()).padStart(2,"0");
}

/* =========================================================
   INDEXEDDB
========================================================= */
function initDB() {
    return new Promise(function(resolve, reject) {
        var req = indexedDB.open("pwsModelStats", 1);
        req.onupgradeneeded = function(e) {
            db = e.target.result;
            if (!db.objectStoreNames.contains("stats"))
                db.createObjectStore("stats", { keyPath: "pwsTime" });
        };
        req.onsuccess = function(e) { db = e.target.result; resolve(); };
        req.onerror   = reject;
    });
}

function saveDataBatch(records) {
    if (!db || !records.length) return Promise.resolve();
    return new Promise(function(resolve, reject) {
        var tx    = db.transaction("stats", "readwrite");
        var store = tx.objectStore("stats");
        tx.oncomplete = resolve;
        tx.onerror    = reject;
        tx.onabort    = function() { reject(new Error("Transaction aborted")); };
        for (var i = 0; i < records.length; i++) store.put(records[i]);
    });
}

// Читаем БД один раз, кэшируем
async function getCachedAll(forceRefresh) {
    if (!forceRefresh && _cachedAll !== null) return _cachedAll;
    if (!db) return [];
    _cachedAll = await new Promise(function(res) {
        var req = db.transaction("stats","readonly").objectStore("stats").getAll();
        req.onsuccess = function() { res(req.result || []); };
        req.onerror   = function() { res([]); };
    });
    return _cachedAll;
}

/* =========================================================
   ЗАГРУЗКА PWS
========================================================= */
function pwsFetchDay(stationId, dateYMD) {
    var key = pwsNextKey();
    var url = "https://api.weather.com/v2/pws/history/all" +
        "?stationId=" + encodeURIComponent(stationId) +
        "&format=json&units=m&numericPrecision=decimal" +
        "&date=" + dateYMD +
        "&apiKey=" + key;
    return fetch(url, { cache: "no-store" })
        .then(function(r) {
            if (r.status === 401 || r.status === 403) { pwsBumpKey(); }
            if (!r.ok) throw new Error("HTTP " + r.status);
            return r.json();
        })
        .then(function(data) {
            if (!data || !data.observations || !data.observations.length)
                throw new Error("Нет данных");
            return pwsPickHourly(data.observations);
        });
}

function pwsPickHourly(observations) {
    var byHour = {};
    observations.forEach(function(o) {
        var t = new Date(o.obsTimeUtc);
        if (isNaN(t)) return;
        var min  = t.getUTCMinutes();
        var dist = Math.min(min, 60 - min);
        // Округляем к ближайшему часу
        var roundedHour = (min >= 30)
            ? new Date(t.getTime() + (60 - min) * 60000)
            : new Date(t.getTime() - min * 60000);
        var h = roundedHour.getUTCFullYear() + "-" +
            String(roundedHour.getUTCMonth()+1).padStart(2,"0") + "-" +
            String(roundedHour.getUTCDate()).padStart(2,"0") + "T" +
            String(roundedHour.getUTCHours()).padStart(2,"0");
        var m    = o.metric || {};
        var pt   = m.precipTotal != null ? m.precipTotal : null;

        if (!byHour[h]) {
            byHour[h] = { dist: Infinity, obs: null, ptMin: pt, ptMax: pt };
        }
        // Ближайшее к часу — для темп/ветра/давления
        if (dist < byHour[h].dist) {
            byHour[h].dist = dist;
            byHour[h].obs  = o;
        }
        // Min/max precipTotal за час — для суммы осадков
        if (pt != null) {
            if (byHour[h].ptMin == null || pt < byHour[h].ptMin) byHour[h].ptMin = pt;
            if (byHour[h].ptMax == null || pt > byHour[h].ptMax) byHour[h].ptMax = pt;
        }
    });

    var result = [];
    Object.keys(byHour).sort().forEach(function(h) {
        var entry = byHour[h];
        if (!entry.obs) return;
        var o = entry.obs;
        var m = o.metric || {};
        var kmhToMs = function(v) { return v != null ? Math.round(v / 3.6 * 10) / 10 : null; };
        var pressure = m.pressureMin != null ? m.pressureMin : (m.pressureMax != null ? m.pressureMax : null);

        // Осадки за час = разница накопленного total внутри часа
        // Если данные с полуночи сбросились (ptMax < ptMin) — берём ptMax
        var precip = null;
        if (entry.ptMax != null && entry.ptMin != null) {
            precip = Math.round((entry.ptMax - entry.ptMin) * 10) / 10;
            if (precip < 0) precip = entry.ptMax; // сброс счётчика в полночь
        }

        result.push({
            hourKey:    h,
            obsTimeUtc: o.obsTimeUtc,
            temp:       m.tempAvg     != null ? m.tempAvg     : null,
            humidity:   o.humidityAvg != null ? o.humidityAvg : null,
            windSpeed:  kmhToMs(m.windspeedAvg),
            windDir:    o.winddirAvg  != null ? o.winddirAvg  : null,
            pressure:   pressure,
            precip:     precip   // мм за час
        });
    });
    return result;
}

function fetchWithTimeout(url, ms) {
    ms = ms || 15000;
    return Promise.race([
        fetch(url),
        new Promise(function(_,r){ setTimeout(function(){r(new Error("Timeout"));}, ms); })
    ]);
}

function loadForecastPast(model, pastDays) {
    var url = "https://api.open-meteo.com/v1/forecast?latitude=46.4406&longitude=30.7703" +
        "&hourly=temperature_2m,pressure_msl,wind_speed_10m,wind_direction_10m," +
        "wind_gusts_10m,cloud_cover,precipitation,weather_code,relative_humidity_2m" +
        "&models=" + model +
        "&forecast_days=1&past_days=" + pastDays +
        "&timezone=UTC&wind_speed_unit=ms";
    return fetchWithTimeout(url, 15000)
        .then(function(r) { return r.json(); })
        .then(function(d) { return d.hourly || null; });
}

function buildModelsData(forecasts, hourIndex) {
    var modelsData = {};
    models.forEach(function(m) {
        var h = forecasts[m];
        if (!h) return;
        function getVal(arr) {
            if (!arr || hourIndex < 0 || hourIndex >= arr.length) return null;
            var v = arr[hourIndex];
            return (v === null || v === undefined || isNaN(v)) ? null : v;
        }
        modelsData[m] = {
            temp:        getVal(h.temperature_2m),
            pressure:    getVal(h.pressure_msl),
            wind:        getVal(h.wind_speed_10m),
            windDir:     getVal(h.wind_direction_10m) != null
                             ? Math.round(getVal(h.wind_direction_10m) / 10) * 10 : null,
            humidity:    getVal(h.relative_humidity_2m)
        };
    });
    return modelsData;
}

var _loadAbort = false;

function stopLoading() {
    _loadAbort = true;
    document.getElementById("stopBtn").style.display = "none";
    setStatus("⏹ Остановлено");
}

async function loadPWSData() {
    if (!db) await initDB();
    _loadAbort = false;
    document.getElementById("stopBtn").style.display = "inline-block";

    var now      = new Date();
    var y        = now.getUTCFullYear();
    var mo       = now.getUTCMonth() + 1;
    var day1     = new Date(Date.UTC(y, mo - 1, 1));
    var daysSince = Math.ceil((now - day1) / 86400000) + 1;

    // Читаем существующие — строим Set ключей O(1) поиск
    var existing  = await getCachedAll(true);
    var existKeys = new Set(existing.map(function(d) { return d.pwsTime; }));

    // Строим Set дней+станций для быстрой проверки
    // ключ: "YYYYMMDDstationId"
    var existDays = new Set();
    existing.forEach(function(d) {
        existDays.add(d.pwsTime.slice(0, 8) + d.stationId);
    });

    var dates = [];
    for (var d = new Date(day1); d <= now; d.setUTCDate(d.getUTCDate() + 1)) {
        dates.push(d.toISOString().slice(0,10).replace(/-/g,""));
    }
    var todayYMD = now.toISOString().slice(0,10).replace(/-/g,"");

    setStatus("🌐 Загрузка моделей...", true);
    var forecasts = {};
    for (var mi = 0; mi < models.length; mi++) {
        if (_loadAbort) { document.getElementById("stopBtn").style.display="none"; return; }
        try { forecasts[models[mi]] = await loadForecastPast(models[mi], daysSince); }
        catch(e) { console.warn("Модель", models[mi], e); }
    }

    var timeArr = null;
    for (var mi2 = 0; mi2 < models.length; mi2++) {
        if (forecasts[models[mi2]] && forecasts[models[mi2]].time) {
            timeArr = forecasts[models[mi2]].time; break;
        }
    }
    if (!timeArr) {
        setStatus("❌ Нет данных моделей");
        document.getElementById("stopBtn").style.display="none";
        return;
    }

    var timeIndex = {};
    timeArr.forEach(function(t, i) { timeIndex[t.slice(0,13)] = i; });

    var toSave   = [];
    var skipped  = 0;
    var added    = 0;

    for (var si = 0; si < PWS_STATIONS.length; si++) {
        if (_loadAbort) break;
        var station = PWS_STATIONS[si];
        setStatus("📡 " + station.name + " (" + (si+1) + "/" + PWS_STATIONS.length + ")...", true);

        for (var di = 0; di < dates.length; di++) {
            if (_loadAbort) break;
            var ymd     = dates[di];
            var isToday = ymd === todayYMD;
            var dayKey  = ymd + station.id;

            if (!isToday && existDays.has(dayKey)) continue;

            if (di > 0 || si > 0) await new Promise(function(r){ setTimeout(r, 400); });

            var hourlyObs;
            try {
                hourlyObs = await pwsFetchDay(station.id, ymd);
            } catch(e) {
                console.warn("PWS", station.id, ymd, e);
                continue;
            }

            hourlyObs.forEach(function(obs) {
                var hk      = obs.hourKey; // "2026-04-01T14"
                var pwsTime = hk.replace(/-/g,"").replace("T","") + "00" + station.id;
                // "202604011400" + stationId

                if (!isToday && existKeys.has(pwsTime)) return;

                var hourIndex = timeIndex[hk]; // O(1)
                if (hourIndex === undefined) { skipped++; return; }

                var modelsData = buildModelsData(forecasts, hourIndex);

                var pressure = obs.pressure != null
                    ? Math.round((obs.pressure + station.pressureOffset) * 100) / 100
                    : null;

                toSave.push({
                    pwsTime:      pwsTime,
                    stationId:    station.id,
                    stationName:  station.name,
                    hourKey:      hk,
                    forecastHour: hourIndex,
                    obs: {
    temp:     obs.temp,
    pressure: pressure,
    wind:     obs.windSpeed,
    windDir:  obs.windDir,
    humidity: obs.humidity,
    precip:   obs.precip   // мм за час
},
                    models: modelsData
                });
                added++;
            });
        }
    }

    document.getElementById("stopBtn").style.display = "none";

    if (toSave.length) {
        await saveDataBatch(toSave);
        if (_cachedAll !== null) {
            toSave.forEach(function(r) { _cachedAll.push(r); });
        }
        setStatus("✅ Добавлено: " + added + " · пропущено: " + skipped + " · всего: " + (_cachedAll ? _cachedAll.length : "?"));
    } else if (skipped > 0) {
        // Были обработаны наблюдения, но ни одно не попало в сетку модели
        setStatus("⚠️ Записей не добавлено · пропущено: " + skipped + " (нет совпадения с сеткой модели)");
    } else {
        setStatus("✅ Данные актуальны");
    }

    await render();
}

/* =========================================================
   ФИЛЬТРАЦИЯ — работает с кэшем, без dbGetAll
========================================================= */
async function loadStats() {
    var all = await getCachedAll();

    if (currentStation !== "all") {
        all = all.filter(function(d) { return d.stationId === currentStation; });
    }

    // Фильтр по времени: лексикографическое сравнение строк "YYYYMMDDhhmm"
    if (currentPeriod === "24h" || currentPeriod === "3d" || currentPeriod === "7d") {
        var hours = { "24h": 24, "3d": 72, "7d": 168 }[currentPeriod];
        var cutoff = subtractHoursTimestamp(hours);
        return all.filter(function(d) { return d.pwsTime.slice(0,12) >= cutoff; });
    }
    if (currentPeriod === "month") {
        return all.filter(function(d) { return pwsTimeMonth(d.pwsTime) === currentMonth; });
    }
    if (currentPeriod === "season") {
        var months = SEASON_MONTHS[currentSeason];
        return all.filter(function(d) { return months.indexOf(pwsTimeMonth(d.pwsTime)) >= 0; });
    }
    return all;
}

/* =========================================================
   ВЫЧИСЛЕНИЕ ОШИБОК
========================================================= */
function computeErrors(stats) {
    var errors = {};
    models.forEach(function(m) {
        errors[m] = {
            temp: [], tempRaw: [],
            pressure: [], pressureRaw: [],
            wind: [], windRaw: [],
            windDir: [], windDirRaw: [],
            humidity: [], humidityRaw: []
        };
    });

    stats.forEach(function(d) {
        var obs = d.obs;
        models.forEach(function(m) {
            var mod = d.models[m]; if (!mod) return;
            function push(key, rawKey, val, obsVal) {
                if (val == null || obsVal == null) return;
                errors[m][key].push(Math.abs(val - obsVal));
                errors[m][rawKey].push(val - obsVal);
            }
            push("temp",     "tempRaw",     mod.temp,     obs.temp);
            push("pressure", "pressureRaw", mod.pressure, obs.pressure);
            push("wind",     "windRaw",     mod.wind,     obs.wind);
            push("humidity", "humidityRaw", mod.humidity, obs.humidity);
            if (mod.windDir != null && obs.windDir != null) {
                var wd = windDirError(mod.windDir, obs.windDir);
                errors[m].windDir.push(wd);
                errors[m].windDirRaw.push(wd);
            }
        });
    });
    return errors;
}

function computeRating(errors) {
    function avg(arr) { return arr.length ? arr.reduce(function(a,b){return a+b;},0)/arr.length : null; }
    function getMax(p) {
        var max = 0;
        models.forEach(function(m) {
            if (errors[m][p].length) max = Math.max(max, Math.max.apply(null, errors[m][p]));
        });
        return max || 1;
    }
    function avgNorm(arr,mx){ return arr.length ? arr.reduce(function(a,b){return a+b/mx;},0)/arr.length : 1; }

    var maxT  = getMax("temp"), maxP = getMax("pressure"),
        maxW  = getMax("wind"), maxWd = getMax("windDir"), maxH = getMax("humidity");

    function buildRating(param, max) {
        return models.map(function(m) {
            return {
                model: m,
                avg:   avg(errors[m][param]),
                bias:  avg(errors[m][param+"Raw"]),
                norm:  avgNorm(errors[m][param], max),
                n:     errors[m][param].length
            };
        }).sort(function(a,b){ return a.norm - b.norm; });
    }

    var tempR    = buildRating("temp",     maxT);
    var pressR   = buildRating("pressure", maxP);
    var windR    = buildRating("wind",     maxW);
    var windDirR = buildRating("windDir",  maxWd);
    var humR     = buildRating("humidity", maxH);

    var totalR = models.map(function(m) {
        return {
            model: m,
            value: avgNorm(errors[m].temp,    maxT)  * 2.0 +
                   avgNorm(errors[m].pressure, maxP)  * 1.5 +
                   avgNorm(errors[m].wind,     maxW)  * 1.5 +
                   avgNorm(errors[m].windDir,  maxWd) * 1.0 +
                   avgNorm(errors[m].humidity, maxH)  * 0.5
        };
    }).sort(function(a,b){ return a.value - b.value; });

    return { tempR: tempR, pressR: pressR, windR: windR, windDirR: windDirR, humR: humR, totalR: totalR };
}

/* =========================================================
   ДЕТАЛЬНЫЙ ВИД МОДЕЛИ
========================================================= */
var MODEL_PARAMS = [
    { key:"temp",     label:"Темп",  unit:"°C",  color:"#ff8f00" },
    { key:"pressure", label:"Давл",  unit:"гПа", color:"#4aa3ff" },
    { key:"wind",     label:"Ветер", unit:"м/с", color:"#8bc34a" },
    { key:"windDir",  label:"Напр",  unit:"°",   color:"#74b9ff" },
    { key:"humidity", label:"Влаж",  unit:"%",   color:"#00bcd4" }
];

function computeModelErrors(stats, modelId) {
    var errs = { temp:[], pressure:[], wind:[], windDir:[], humidity:[] };
    stats.forEach(function(d) {
        var mod = d.models[modelId]; if (!mod) return;
        var obs = d.obs;
        function push(k, val, obsVal) {
            if (val == null || obsVal == null) return;
            errs[k].push(val - obsVal);
        }
        push("temp",     mod.temp,     obs.temp);
        push("pressure", mod.pressure, obs.pressure);
        push("wind",     mod.wind,     obs.wind);
        push("humidity", mod.humidity, obs.humidity);
        if (mod.windDir != null && obs.windDir != null)
            errs.windDir.push(windDirError(mod.windDir, obs.windDir));
    });
    return errs;
}

function calcModelStat(arr) {
    if (!arr.length) return null;
    var mae  = arr.reduce(function(s,v){ return s + Math.abs(v); }, 0) / arr.length;
    var bias = arr.reduce(function(s,v){ return s + v; }, 0) / arr.length;
    var rmse = Math.sqrt(arr.reduce(function(s,v){ return s + v*v; }, 0) / arr.length);
    return { mae: mae, bias: bias, rmse: rmse, n: arr.length };
}

function computeModelByDay(stats, modelId) {
    var byDay = {};
    stats.forEach(function(d) {
        var mod = d.models[modelId]; if (!mod) return;
        var day = d.pwsTime.slice(0,8); // "20260422"
        if (!byDay[day]) {
            byDay[day] = { temp:[], pressure:[], wind:[], windDir:[], humidity:[] };
        }
        var obs = d.obs;
        function push(k, val, obsVal) {
            if (val == null || obsVal == null) return;
            byDay[day][k].push(val - obsVal);
        }
        push("temp",     mod.temp,     obs.temp);
        push("pressure", mod.pressure, obs.pressure);
        push("wind",     mod.wind,     obs.wind);
        push("humidity", mod.humidity, obs.humidity);
        if (mod.windDir != null && obs.windDir != null)
            byDay[day].windDir.push(windDirError(mod.windDir, obs.windDir));
    });
    return byDay;
}

function renderModelDetail(stats) {
    var detail = document.getElementById("modelDetail");
    if (currentModel === "all") { detail.style.display = "none"; return; }
    detail.style.display = "";

    var errs  = computeModelErrors(stats, currentModel);
    var byDay = computeModelByDay(stats, currentModel);

    // Карточки
    var cardsHtml = '<div class="model-detail-cards" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">';
    MODEL_PARAMS.forEach(function(p) {
        var st = calcModelStat(errs[p.key]);
        var biasCol = "#aaa";
        var thr = BIAS_THRESHOLDS[p.key] || 0.3;
        if (st && st.bias >  thr) biasCol = "#e57373";
        if (st && st.bias < -thr) biasCol = "#64b5f6";
        cardsHtml += '<div style="background:#1a1a1a;border-radius:8px;padding:10px 12px;">' +
            '<div style="font-size:11px;color:#555;margin-bottom:4px;">' + p.label + '</div>' +
            (st
                ? '<div style="font-size:18px;font-weight:800;color:' + p.color + ';">' + st.mae.toFixed(2) + ' ' + p.unit + '</div>' +
                  '<div style="font-size:11px;color:#666;">bias <span style="color:' + biasCol + ';">' +
                  (st.bias >= 0 ? "+" : "") + st.bias.toFixed(2) + '</span> · rmse ' + st.rmse.toFixed(2) + ' · n=' + st.n + '</div>'
                : '<div style="color:#444;">—</div>'
            ) + '</div>';
    });
    cardsHtml += '</div>';

    // Кнопки параметров
    var paramRowHtml = MODEL_PARAMS.map(function(p) {
        var isActive = p.key === _modelChartParam;
        return '<button class="cp-btn' + (isActive ? ' active' : '') + '"' +
            (isActive ? ' style="border-color:' + p.color + ';color:' + p.color + ';"' : '') +
            ' onclick="setModelChartParam(\'' + p.key + '\')">' + p.label + '</button>';
    }).join("");

    // Вставляем всё в контейнер
    var inner = detail.firstElementChild;
    var paramRow = document.getElementById("modelDetailParamRow");
    // Удаляем старые карточки
    var old = inner.querySelectorAll(".model-detail-cards");
    for (var i = 0; i < old.length; i++) old[i].remove();
    // Вставляем карточки перед строкой параметров
    var tmpDiv = document.createElement("div");
    tmpDiv.innerHTML = cardsHtml;
    inner.insertBefore(tmpDiv.firstElementChild, paramRow);
    paramRow.innerHTML = paramRowHtml;

    renderModelChart(byDay);
}

function setModelChartParam(p) {
    _modelChartParam = p;
    // Обновляем кнопки
    document.querySelectorAll("#modelDetailParamRow .cp-btn").forEach(function(b, i) {
        var mp = MODEL_PARAMS[i];
        b.classList.toggle("active", mp.key === p);
        b.style.borderColor = mp.key === p ? mp.color : "";
        b.style.color       = mp.key === p ? mp.color : "";
    });
    // Перерисовываем только график
    getCachedAll().then(function(all) {
        var stats = filterStats(all);
        renderModelChart(computeModelByDay(stats, currentModel));
    });
}

function filterStats(all) {
    var result = all;
    if (currentStation !== "all")
        result = result.filter(function(d){ return d.stationId === currentStation; });
    if (currentPeriod === "24h" || currentPeriod === "3d" || currentPeriod === "7d") {
        var hours = { "24h": 24, "3d": 72, "7d": 168 }[currentPeriod];
        var cutoff = subtractHoursTimestamp(hours);
        result = result.filter(function(d){ return d.pwsTime.slice(0,12) >= cutoff; });
    } else if (currentPeriod === "month") {
        result = result.filter(function(d){ return pwsTimeMonth(d.pwsTime) === currentMonth; });
    } else if (currentPeriod === "season") {
        var months = SEASON_MONTHS[currentSeason];
        result = result.filter(function(d){ return months.indexOf(pwsTimeMonth(d.pwsTime)) >= 0; });
    }
    return result;
}

function renderModelChart(byDay) {
    var p = MODEL_PARAMS.filter(function(x){ return x.key === _modelChartParam; })[0] || MODEL_PARAMS[0];
    var days = Object.keys(byDay).sort();
    var maes = days.map(function(day) {
        var arr = byDay[day][p.key];
        if (!arr.length) return null;
        return arr.reduce(function(s,v){ return s + Math.abs(v); }, 0) / arr.length;
    });
    var labels = days.map(function(d) {
        return d.slice(6,8) + "." + d.slice(4,6);
    });

    var canvas = document.getElementById("modelDayChart");
    if (_modelChartInst) { _modelChartInst.destroy(); _modelChartInst = null; }
    if (!days.length) return;

    _modelChartInst = new Chart(canvas, {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{ label: "MAE " + p.unit, data: maes, backgroundColor: p.color + "99", borderColor: p.color, borderWidth: 1 }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                x: { ticks: { color: "#666", font: { size: 10 } }, grid: { color: "#222" } },
                y: { ticks: { color: "#666", font: { size: 10 } }, grid: { color: "#222" }, beginAtZero: true }
            }
        }
    });
}

/* =========================================================
   РЕНДЕР
========================================================= */
function makeCard(title, data, unit, param) {
    var thr  = (param && BIAS_THRESHOLDS[param] != null) ? BIAS_THRESHOLDS[param] : 0.3;
    var html = '<div class="rating-card"><h3>' + title + '</h3>';
    data.forEach(function(r, i) {
        var col    = "#aaa";
        if (r.bias != null) col = r.bias > thr ? "#e57373" : (r.bias < -thr ? "#64b5f6" : "#aaa");
        var sanity = (unit === "hPa" && r.avg != null && r.avg > 10) ? " ⚠️" : "";
        var val    = r.avg != null
            ? '<span style="color:'+col+'">'+r.avg.toFixed(2)+" "+unit+"</span>"+sanity
            : "—";
        html += '<div class="row"><div>'+(i+1)+". "+modelLabel(r.model)+"</div>"+
                "<div>"+val+' <span style="color:#444;font-size:0.8em">n='+r.n+"</span></div></div>";
    });
    return html + "</div>";
}

function makeTotalCard(data) {
    var html = '<div class="rating-card"><h3>Итоговый рейтинг</h3>';
    data.forEach(function(r,i) {
        html += '<div class="row"><div>'+(i+1)+". "+modelLabel(r.model)+"</div><div>"+r.value.toFixed(3)+"</div></div>";
    });
    return html + "</div>";
}

function renderLeadTab(stats) {
    var hasLead = stats.some(function(d){ return d.forecastHour != null; });
    if (!hasLead) return '<div style="color:#666;padding:16px 0;font-size:0.9em">Данные накапливаются.</div>';

    var html = "";
    LEAD_GROUPS.forEach(function(g) {
        var subset = stats.filter(function(d){
            return d.forecastHour != null && d.forecastHour >= g.min && d.forecastHour < g.max;
        });
        html += '<div class="lead-section"><h4>' + g.label + " — " + subset.length + " зап.</h4>";
        if (subset.length < 5) { html += '<div style="color:#555;font-size:0.85em">Мало данных</div></div>'; return; }
        var errors = computeErrors(subset);
        var totalR = computeRating(errors).totalR;
        totalR.forEach(function(r,i) {
            html += '<div class="row"><div>'+(i+1)+". "+modelLabel(r.model)+"</div><div>"+r.value.toFixed(3)+"</div></div>";
        });
        html += "</div>";
    });
    return html;
}

async function render() {
    var el = document.getElementById("rating");
    el.innerHTML = "Загрузка...";

    var stats = await loadStats();

    var periodTitle = {
        "24h":   "24 часа",
        "3d":    "3 дня",
        "7d":    "7 дней",
        "month": MONTH_NAMES[currentMonth-1] + " — все годы",
        "season": SEASON_LABELS[currentSeason]
    }[currentPeriod] || "";

    var stLabel = currentStation === "all" ? "Все станции" :
        (PWS_STATIONS.find(function(s){ return s.id === currentStation; }) || {}).name || currentStation;

    if (!stats.length) {
        el.innerHTML = '<div style="color:#666;padding:16px 0">' + periodTitle + " · " + stLabel + " — нет данных</div>";
        return;
    }

    var html = '<div style="margin-bottom:12px"><b>' + periodTitle + "</b>" +
               '<span style="color:#888;font-size:0.85em;margin-left:8px">' + stLabel + "</span>" +
               '<span style="color:#555;font-size:0.85em;margin-left:8px">записей: ' + stats.length + "</span></div>";

    renderModelDetail(stats);

    if (currentTab === "main") {
        var errors = computeErrors(stats);
        var rating = computeRating(errors);
        html += makeCard("Температура",       rating.tempR,    "°C",  "temp");
        html += makeCard("Давление",          rating.pressR,   "hPa", "pressure");
        html += makeCard("Ветер",             rating.windR,    "м/с", "wind");
        html += makeCard("Направление ветра", rating.windDirR, "°",   "windDir");
        html += makeCard("Влажность",         rating.humR,     "%",   "humidity");
        html += makeTotalCard(rating.totalR);
    } else {
        html += renderLeadTab(stats);
    }

    el.innerHTML = html;
}

/* =========================================================
   УПРАВЛЕНИЕ БАЗОЙ
========================================================= */
async function exportDB() {
    var all = await getCachedAll();
    if (!all.length) { alert("База пустая"); return; }
    all.sort(function(a,b){ return a.pwsTime.localeCompare(b.pwsTime); });
    var now  = new Date();
    var name = "pwsStats_" + now.getUTCFullYear() +
               String(now.getUTCMonth()+1).padStart(2,"0") + ".json";
    var blob = new Blob([JSON.stringify(all, null, 2)], { type:"application/json" });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement("a");
    a.href = url; a.download = name; a.click();
    URL.revokeObjectURL(url);
    setStatus("✅ Сохранено: " + all.length + " записей → " + name);
}

function importDBFile() {
    document.getElementById("importFile").click();
}

document.addEventListener("DOMContentLoaded", function() {
    document.getElementById("importFile").addEventListener("change", async function(e) {
        var file = e.target.files[0];
        if (!file) return;
        setStatus("📂 Читаем файл...", true);
        var text = await file.text();
        var data;
        try { data = JSON.parse(text); } catch(ex) { setStatus("❌ Ошибка JSON: " + ex.message); return; }
        if (!Array.isArray(data)) { setStatus("❌ Неверный формат"); return; }

        if (!db) await initDB();
        var existing = await getCachedAll(true);
        var existKeys = new Set(existing.map(function(d) { return d.pwsTime; }));

        var toAdd = data.filter(function(r) { return r.pwsTime && !existKeys.has(r.pwsTime); });
        if (!toAdd.length) { setStatus("✅ Все записи уже есть в базе"); return; }

        setStatus("💾 Записываем " + toAdd.length + " записей...", true);
        await saveDataBatch(toAdd);
        _cachedAll = null; // сбрасываем кэш
        var all = await getCachedAll(true);
        setStatus("✅ Загружено: +" + toAdd.length + " · итого: " + all.length);
        await render();
        e.target.value = "";
    });
});

async function checkDB() {
    var all = await getCachedAll();
    var byStation = {};
    PWS_STATIONS.forEach(function(s) { byStation[s.id] = 0; });
    all.forEach(function(d) { if (byStation[d.stationId] !== undefined) byStation[d.stationId]++; });
    var lines = ["Всего записей: " + all.length];
    PWS_STATIONS.forEach(function(s) { lines.push(s.name + ": " + byStation[s.id]); });
    alert(lines.join("\n"));
}

async function clearAllDB() {
    if (!confirm("Удалить ВСЕ записи?\nЭто действие необратимо.")) return;
    if (!db) { alert("БД не открыта"); return; }
    var tx = db.transaction("stats","readwrite");
    tx.objectStore("stats").clear();
    tx.oncomplete = async function() {
        _cachedAll = [];
        setStatus("База очищена");
        await render();
    };
}

}
